# =============================================================================
# dictionaries/pl/gui/ui.yaml – tłumaczenia interfejsu użytkownika (POLSKI).
#
# To jest plik bazowy dla wszystkich innych języków. Każdy inny folder
# `dictionaries/<kod>/gui/ui.yaml` (np. `en`, `fi`, `ru`) zachowuje
# DOKŁADNIE TĘ SAMĄ STRUKTURĘ KLUCZY – tłumaczone są tylko wartości.
#
# Konwencje:
#   * Parametry dynamiczne: `{nazwa_parametru}` (snake_case, patrz
#     `.clinerules` sekcja "Struktura YAML dla tłumaczeń UI").
#   * `&` w etykietach = akcelerator menu/przycisku (Alt+litera).
#     W tłumaczeniu przesuwamy `&` na literę występującą w przetłumaczonym
#     słowie, dbając, by nie kolidowała z innymi akceleratorami tego menu.
#   * `\tCtrl+…` w etykietach menu = skrót klawiszowy; `Ctrl`, `Alt`,
#     `Shift` oraz litery/cyfry pozostają literalnie identyczne we
#     wszystkich językach.
#   * Emoji (🎬 📄 📚 🌍 ✅ ⚠️ 🚨 ℹ️ ✂️ 🎭 🔄 📝 📋 🧠 🎙️ 🔐 🎛️ 🏁 📜 📖)
#     zachowane 1:1.
#   * Literały techniczne (`golden_key.env`, `.docx`, `sk-`, `dictionaries/`,
#     `NVDA`, `OpenAI gpt-4o` itp.) – nie tłumaczymy.
# =============================================================================

