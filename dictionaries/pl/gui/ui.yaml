# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name:            "Panel startowy – Strona główna"
  welcome_text: |-
    To jest Twoje zintegrowane studio nagraniowe.
    Wybierz narzędzie z paska przycisków lub z menu Narzędzia:

      •  Reżyser       –  Pisz skrypty i prozę z AI; dynamicznie zarządzaj Księgą Świata.
      •  Poliglota     –  Nakładaj twarde akcenty pod lokalne syntezatory (NVDA/Vocalizer) i tłumacz teksty.
      •  Konwerter     –  Szybko twórz profesjonalne pliki Word z nagłówkami poziomu 1.
      •  Manager Reguł –  Przeglądaj i twórz reguły słownikowe bez wchodzenia w pliki YAML ręcznie.
  heading_system_check:  "System Check"
  checking:              "Sprawdzanie konfiguracji…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Brak pliku konfiguracji środowiskowej!

    Wykryto pierwsze uruchomienie programu. Moduły są zablokowane ze względów bezpieczeństwa.
    Aby odblokować wszystkie narzędzia, kliknij przycisk poniżej — program automatycznie wygeneruje plik golden_key.env i otworzy go w domyślnym edytorze tekstu.
  err_odczyt:            "🚨 Nie udało się odczytać pliku golden_key.env:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Błąd struktury pliku!
    Brakuje wymaganego parametru OPENAI_API_KEY=.
    Prawdopodobnie skasowałeś znak równości lub nazwę zmiennej.
    Usuń plik, wygeneruj go ponownie i wklej klucz ostrożniej.
  err_tekst_zastepczy: |-
    ⚠️ Klucz nie został wprowadzony!
    W pliku golden_key.env nadal znajduje się tekst zastępczy.
    Otwórz plik w edytorze tekstu, usuń tekst zastępczy i wklej swój prawdziwy klucz API.
  err_cudzyslowy: |-
    🚨 Zbędne cudzysłowy wokół klucza!
    Klucz API wklejono w cudzysłowach (np. "sk-…").
    Otwórz plik w edytorze tekstu i usuń znaki cudzysłowu —
    klucz musi być wpisany bezpośrednio po znaku '=', bez żadnych dodatkowych znaków.
  err_niedozwolone_znaki: |-
    🚨 Niedozwolone znaki wokół klucza!
    Przed lub za kluczem API wykryto spację bądź inny niewidoczny znak.
    Otwórz plik w edytorze tekstu i upewnij się, że wartość zaczyna się
    natychmiast po znaku '=', bez żadnych spacji.
  err_format: |-
    🚨 Podejrzany format klucza!
    Poprawny klucz OpenAI zawsze zaczyna się od znaków sk- (np. sk-proj-…).
    Upewnij się, że skopiowałeś właściwy ciąg znaków i nie ma przed nim żadnych spacji.
  err_zbyt_krotki: |-
    ⚠️ Klucz wydaje się zbyt krótki (wykryto {liczba_znakow} znaków, oczekiwano co najmniej {minimum_znakow}).
    Prawdopodobnie skopiowałeś tylko fragment klucza.

    Jeśli zamknąłeś już okienko z kluczem na platform.openai.com,
    musisz wrócić na konto, użyć opcji 'Revoke secret key' dla tego
    uciętego klucza i wygenerować nowy. Pamiętaj, by następnym razem
    skopiować klucz w całości przed kliknięciem 'Done'.
  ok_klucz_wykryty: |-
    ✅ Klucz API (golden_key.env) wykryty i poprawnie sformatowany.
    Wszystkie moduły są gotowe do pracy.
  # Przyciski akcji panelu startowego
  btn_generate:          "Wygeneruj plik golden_key.env i otwórz edytor tekstu"
  btn_open:              "📝 Otwórz plik golden_key.env w edytorze tekstu"
  blad_tworzenia_env_tytul: "Błąd"
  blad_tworzenia_env_tresc: "Nie udało się utworzyć pliku golden_key.env:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Plik {nazwa_pliku} został wygenerowany!
    Edytor tekstu otwiera się automatycznie.
    Wklej swój klucz API, zapisz plik (Ctrl+S) i uruchom aplikację ponownie.
  blad_otwarcia_pliku_tytul: "Informacja"
  blad_otwarcia_pliku_tresc: "Nie udało się automatycznie otworzyć pliku.\nOtwórz go ręcznie:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Narzędzia słownikowe"
  narzedzia_slownikowe_name: "Opis narzędzi słownikowych"
  tools_info: |-
    Chcesz dodać nowy akcent, szyfr albo tryb Reżysera?
    Otwórz Manager Reguł (Ctrl+4) – znajdziesz tam drzewo wszystkich plików YAML w dictionaries/ oraz kreator, który sam utworzy szablon lub wygeneruje prompt dla chatbota AI.

    Po dodaniu nowego AKCENTU kliknij dodatkowo przycisk „Odśwież akcenty Reżysera z YAML" poniżej – pozwoli to Trybowi Reżysera zauważyć nowy akcent (Poliglota wykrywa YAML-e automatycznie). Po odświeżeniu uruchom aplikację ponownie.
  btn_open_manager_label:   "📚 Otwórz Manager Reguł"
  btn_open_manager_name:    "Przycisk Otwórz Manager Reguł"
  btn_open_manager_tooltip: "Przechodzi do Managera Reguł – eksploratora plików YAML i kreatora nowych akcentów / trybów / szyfrów (Ctrl+4)."
  btn_odswiez_label:        "🔄 Odśwież akcenty Reżysera z YAML"
  btn_odswiez_name:         "Przycisk Odśwież akcenty Reżysera z YAML"
  btn_odswiez_tooltip:      "Skanuje dictionaries/*/akcenty/ i regeneruje wrappery akcent_* w core_poliglota.py oraz core_rezyser.py. Po udanym odświeżeniu należy uruchomić aplikację ponownie."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Błąd odświeżania akcentów"
  raport_niespodziewany_tresc: "Wystąpił nieoczekiwany błąd:\n{tresc_bledu}"
  raport_tytul_blad:        "Odśwież akcenty Reżysera – BŁĄD"
  raport_header_blad:       "⛔ Generator napotkał błędy – patrz log poniżej."
  raport_tytul_sukces:      "Odśwież akcenty Reżysera – Sukces"
  raport_header_sukces: |-
    ✅ Zmodyfikowano pliki dla {liczba_akcentow} akcentów.
    Aby nowe akcenty pojawiły się w Trybie Reżysera, uruchom aplikację ponownie.
  raport_tytul_bez_zmian:   "Odśwież akcenty Reżysera – Bez zmian"
  raport_header_bez_zmian:  "ℹ️ Brak zmian. Wykryto {liczba_akcentow} akcentów – wrappery są już aktualne."
  raport_lbl_log:           "Pełny log (Ctrl+A, Ctrl+C kopiuje do schowka):"
  raport_log_name:          "Log generatora akcentów Reżysera"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name:            "Panel Reżysera Audio GPT"
  heading:               "🎬  Reżyser Audio GPT – Hybrydowe Studio Twórcze"
  description_name:      "Opis modułu Reżyser Audio GPT"
  tool_description: |-
    Reżyser Audio GPT to hybrydowe studio twórcze.

    Tryb Burzy Mózgów  – planuj fabułę, generuj 3 opcje (BEZ zapisu do pliku).
    Tryb Skryptu        – pisz surowy skrypt dźwiękowy z tagami [SFX] i [Postać: emocja] (ZAPIS DO PLIKU).
    Tryb Audiobooka     – generuj gęstą, klasyczną prozę literacką (ZAPIS DO PLIKU).

    Projekty zapisywane są w podfolderze 'skrypty/' obok programu.
    Podaj nazwę projektu BEZ rozszerzenia (np. kroniki_arkonii).
    Aby zmienić projekt, musisz najpierw wyczyścić pamięć bieżącą.
  prompt_architekta_content: |-
    Jesteś wybitnym architektem światów (Worldbuilder) i konsultantem literackim. Mam luźny pomysł na fabułę: [TUTAJ WPISZ SWÓJ POMYSŁ]. Twoim zadaniem jest rozbudowanie tego do profesjonalnej „Księgi Świata".
    Dostosuj ton i zasady do mojego pomysłu. Unikaj tanich, baśniowych skrótów i klisz AI.

    ZASADY FORMATOWANIA (KRYTYCZNE):
    Musisz zwrócić odpowiedź w dwóch oddzielnych częściach:

    CZĘŚĆ 1: KSIĘGA ŚWIATA
    Tę część musisz bezwzględnie zamknąć w JEDNYM bloku kodu Markdown (użyj znaczników ```markdown na początku i ``` na końcu). Wewnątrz bloku kodu zastosuj te reguły:
    1. Rozpocznij od emotki otwartej książki i roboczego tytułu, np. 📖 Księga Świata: [Tytuł].
    2. Używaj pojedynczego hashtagu (#) dla głównych sekcji (np. # Zasady Świata, # Postacie).
    3. Używaj podwójnego hashtagu (##) dla podsekcji.
    4. Używaj myślników (-) do tworzenia czytelnych list.
    5. Używaj podwójnych gwiazdek (**tekst**), by pogrubić absolutne, nienaruszalne zasady (np. **Bohater NIGDY nie kłamie**).
    6. Opisz psychologię postaci, ich największe wady i motywacje. W przypadku postaci obcojęzycznych, dodaj informację o akcencie bezpośrednio przy tagu, np. `[Speaker 1: Imię] - sepleni i ma akcent francuski`. **Wskazówka techniczna:** Użycie słowa kluczowego `akcent` jest bezwzględnie wymagane, ponieważ to na jego podstawie zewnętrzny skrypt aplikacji automatycznie wykrywa i nakłada poprawne reguły fonetyczne na dialogi danej postaci.

    CZĘŚĆ 2: REKOMENDACJA TRYBU
    Tę część umieść POZA blokiem kodu, jako zwykły tekst pod spodem. Doradź mi, który z trybów mojej aplikacji będzie najlepszy do realizacji tego pomysłu: 🎬 Tryb Surowego Skryptu (słuchowiska, SFX, fonetyka), czy 📖 Tryb Tradycyjnego Audiobooka (klasyczna proza literacka).

  # Pasek pliku
  lbl_nazwa_pliku:       "Nazwa pliku projektu (bez rozszerzenia, np. kroniki_arkonii):"
  txt_nazwa_pliku_name:  "Pole nazwy pliku projektu"
  txt_nazwa_pliku_hint:  "np. kroniki_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Wpisz nazwę projektu BEZ rozszerzenia.
    Plik historii zapisywany jako: skrypty/<nazwa>.txt
    Pole zablokowane, gdy pamięć jest zajęta.
  btn_wczytaj_label:     "Wczytaj historię"
  btn_wczytaj_tooltip: |-
    Wczytuje istniejący plik projektu (skrypty/<nazwa>.txt) do pamięci.
    Aktywny tylko gdy pamięć jest pusta i podano nazwę.
  btn_wyczysc_biezaca_label: "Wyczyść bieżącą (zostaw Streszczenie)"
  btn_wyczysc_biezaca_tooltip: |-
    Czyści wyłącznie historię bieżącą z pamięci.
    Streszczenie (Pamięć Długotrwała) i Księga Świata zostają zachowane.
    Używaj do kontynuacji długiej książki po wygenerowaniu streszczenia.
  btn_hard_reset_label:  "Zamknij Projekt (Twardy Reset)"
  btn_hard_reset_tooltip: |-
    CAŁKOWITE wyczyszczenie projektu: historia, streszczenie, Księga Świata.
    Zeruje wszystkie liczniki i odblokowuje pole nazwy pliku.
    Używaj przy zmianie projektu lub zupełnie nowej historii.
  # Sidebar
  sidebar_heading:       "📖 Pasek Boczny projektu"
  lbl_ksiega_swiata:     "Księga Świata – Zasady i Postacie:"
  txt_ksiega_name:       "Pole Księgi Świata – zasady i postacie"
  txt_ksiega_hint: |-
    Wpisz zasady świata, opis postaci i ich akcenty fonetyczne…
    Np. [Geralt: akcent islandzki]
    Zawartość dołączana jest do każdego zapytania AI.
  txt_ksiega_tooltip: |-
    Kontekst stale dołączany do AI: zasady świata, postacie, akcenty fonetyczne.
    Zapis na dysk wymaga podania nazwy pliku projektu.
  btn_zapisz_ksiege_label: "💾 Zapisz Księgę na stałe"
  btn_zapisz_ksiege_tooltip: |-
    Zapisuje Księgę Świata do pliku: skrypty/<nazwa>.md
    Wymaga podania nazwy pliku projektu.
  btn_prompt_architekta_label: "📖 Prompt Architekta dla AI…"
  btn_prompt_architekta_name:  "Przycisk Pokaż Prompt Architekta dla zewnętrznego chatbota"
  btn_prompt_architekta_tooltip: |-
    Otwiera okno z gotowym promptem dla zewnętrznego chatbota (ChatGPT, Claude).
    Wklej swój pomysł fabularny, a AI wygeneruje profesjonalną Księgę Świata sformatowaną w Markdown – do wklejenia do pola „Księga Świata" powyżej.
  lbl_pamiec_dlugotrwala: "🧠 Pamięć Długotrwała (Streszczenie):"
  txt_pamiec_name:       "Pole Pamięci Długotrwałej – streszczenie wydarzeń"
  txt_pamiec_hint: |-
    Tu AI zapisze streszczenie przy przepełnieniu pamięci.
    Możesz je też edytować ręcznie.
  txt_pamiec_tooltip: |-
    Streszczenie poprzednich wydarzeń dołączane do każdego zapytania AI.
    Pozwala kontynuować historię bez ograniczeń okna kontekstowego modelu.
  btn_zapisz_pamiec_label:   "💾 Zapisz Streszczenie"
  btn_zapisz_pamiec_tooltip: |-
    Zapisuje streszczenie do pliku: skrypty/<nazwa>_streszczenie.txt
    Po zapisie możesz bezpiecznie wyczyścić pamięć bieżącą.
  # Obszar roboczy
  main_heading:          "🎬 Obszar Roboczy"
  rb_tryb_label:         "Tryb pracy:"
  rb_tryb_name:          "Wybór trybu pracy AI"
  rb_tryb_tooltip: |-
    Burza Mózgów – planowanie bez zapisu do pliku.
    Skrypt        – surowy skrypt dźwiękowy (zapisywany do pliku).
    Audiobook     – tradycyjna proza literacka (zapisywana do pliku).
  # Panel struktury
  struktura_heading:     "✂️ Zarządzanie Strukturą"
  btn_prolog_label:      "📜 Wstaw Prolog"
  btn_prolog_name:       "Przycisk Wstaw Prolog"
  btn_prolog_tooltip: |-
    Wstawia nagłówek 'Prolog' na samym początku historii.
    Możliwy tylko gdy historia jest pusta. Wymaga nazwy projektu.
  btn_epilog_label:      "🏁 Wstaw Epilog"
  btn_epilog_name:       "Przycisk Wstaw Epilog"
  btn_epilog_tooltip: |-
    Wstawia nagłówek 'Epilog' na końcu historii.
    Blokuje dalsze dopisywanie treści po Epilogu.
  btn_rozdzial_label:    "✂️ Wstaw cięcie (Rozdział {numer_rozdzialu})"
  btn_rozdzial_name:     "Przycisk Wstaw Rozdział"
  btn_rozdzial_tooltip: |-
    Wstawia nagłówek kolejnego rozdziału do historii i pliku.
    Dostępny wyłącznie w trybie Audiobooka.
  btn_akt_label:         "🎭 Wstaw Akt {numer_aktu}"
  btn_akt_name:          "Przycisk Wstaw Akt"
  btn_akt_tooltip: |-
    Wstawia nagłówek 'Akt N' oraz automatycznie 'Scena 1' do historii i pliku.
    Dostępny wyłącznie w trybie Skryptu.
  btn_scena_label:       "🎬 Wstaw Scenę {numer_sceny}"
  btn_scena_name:        "Przycisk Wstaw Scenę"
  btn_scena_tooltip: |-
    Wstawia nagłówek kolejnej sceny do historii i pliku.
