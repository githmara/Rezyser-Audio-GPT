manager:
  panel_name:            "Panel Managera Reguł – eksplorator słowników"
  desc: |-
    Manager Reguł pozwala przeglądać i edytować pliki YAML w folderze dictionaries/ bez wchodzenia w Eksploratora plików systemu. Wybierz plik w drzewie po lewej, a następnie skorzystaj z przycisków po prawej: otwórz w edytorze tekstu, utwórz nowy plik, duplikuj lub usuń.

    Dla trudniejszych zadań (nowy język, akcent obcej fonetyki, szyfr algorytmiczny) Manager wygeneruje prompt dla chatbota AI – wystarczy wkleić go do ChatGPT lub Claude i zapisać odpowiedź.
  desc_name:             "Opis Managera Reguł"
  # Drzewo
  tree_name:             "Drzewo plików dictionaries"
  tree_tooltip: |-
    Drzewo wszystkich plików YAML w folderze dictionaries/. Rozwiń język, potem kategorię, a następnie wybierz plik. Strzałki i Enter działają standardowo dla NVDA.
  tree_root:             "Słowniki (dictionaries/)"
  tree_brak_folderu:     "⚠️  Brak folderu dictionaries/ – utwórz pierwszy język przyciskiem „Nowy plik reguł…\"."
