# =============================================================================
#  PODSTAWY JĘZYKA POLSKIEGO
# =============================================================================
#
#  Ten plik zawiera wspólne dane wykorzystywane przez WSZYSTKIE akcenty
#  i szyfry w podfolderach akcenty/ i szyfry/.
#
#  Edytuj OSTROŻNIE – zmiana tutaj wpływa na każdy akcent z flagą
#  `usun_polskie_znaki: true` oraz na szyfr Cezara.
# =============================================================================

id: podstawy
jezyk: pl
# 13.4.3: identyfikator lingua-language-detector używany przez detektor języka
# silnika Poligloty. Wartość MUSI być nazwą enum-a `lingua.Language` (bez
# prefiksu, wielkimi literami) — pełna lista na https://github.com/pemistahl/lingua-py
# (POLISH, GERMAN, SPANISH, …). Brak tego pola wyłącza dany język z detektora
# (sticky-fallback w core_poliglota), folder pozostaje w dictionaries widoczny.
lingua: POLISH
etykieta: "Polski – podstawy fonetyczne"
opis: |
  Bazowe reguły dla języka polskiego:
    1. Transliteracja polskich diakrytyków (ą→on, ę→en, ł→l, ó→u, ś→s,
       ć→c, ń→n, ż→z, ź→z) – używana jako pierwszy krok przez większość
       akcentów fonetycznych, gdy syntezator mowy nie obsługuje polskich
       znaków specjalnych.
    2. Alfabet polski (35 liter, wielkie) – używany przez szyfr Cezara.

# -----------------------------------------------------------------------------
# Zamiana polskich znaków diakrytycznych na odpowiedniki łacińskie.
# Wykonywana PRZED listą `zamiany` danego akcentu (jeśli ten ma włączone
# `usun_polskie_znaki: true`).
# -----------------------------------------------------------------------------
polskie_znaki:
  - { wzor: "ą", zamiana: "on" }
  - { wzor: "ę", zamiana: "en" }
  - { wzor: "ł", zamiana: "l"  }
  - { wzor: "ó", zamiana: "u"  }
  - { wzor: "ś", zamiana: "s"  }
  - { wzor: "ć", zamiana: "c"  }
  - { wzor: "ń", zamiana: "n"  }
  - { wzor: "ż", zamiana: "z"  }
  - { wzor: "ź", zamiana: "z"  }
  - { wzor: "Ą", zamiana: "On" }
  - { wzor: "Ę", zamiana: "En" }
  - { wzor: "Ł", zamiana: "L"  }
  - { wzor: "Ó", zamiana: "U"  }
  - { wzor: "Ś", zamiana: "S"  }
  - { wzor: "Ć", zamiana: "C"  }
  - { wzor: "Ń", zamiana: "N"  }
  - { wzor: "Ż", zamiana: "Z"  }
  - { wzor: "Ź", zamiana: "Z"  }
  # 13.3: rozszerzenie listy o diakrytyki europejskich zapożyczeń
  # (Pokémon, café, jalapeño, façade, Schrödinger, naïve...). Bez tych
  # reguł szyfr Cezara pomijał obce znaki, łamiąc spójność szyfrowania
  # tekstów wielojęzycznych. Każdy znak mapowany do najprostszej
  # reprezentacji ASCII zgodnie z polską intuicją czytelnika.
  # -- → a --
  - { wzor: "á", zamiana: "a"  }
  - { wzor: "à", zamiana: "a"  }
  - { wzor: "â", zamiana: "a"  }
  - { wzor: "ã", zamiana: "a"  }
  - { wzor: "ä", zamiana: "a"  }
  - { wzor: "å", zamiana: "a"  }
  - { wzor: "Á", zamiana: "A"  }
  - { wzor: "À", zamiana: "A"  }
  - { wzor: "Â", zamiana: "A"  }
  - { wzor: "Ã", zamiana: "A"  }
  - { wzor: "Ä", zamiana: "A"  }
  - { wzor: "Å", zamiana: "A"  }
  # -- → ae --
  - { wzor: "æ", zamiana: "ae" }
  - { wzor: "Æ", zamiana: "Ae" }
  # -- → c --
  - { wzor: "ç", zamiana: "c"  }
  - { wzor: "Ç", zamiana: "C"  }
  # -- → d --
  - { wzor: "ð", zamiana: "d"  }
  - { wzor: "Ð", zamiana: "D"  }
  # -- → e --
  - { wzor: "é", zamiana: "e"  }
  - { wzor: "è", zamiana: "e"  }
  - { wzor: "ê", zamiana: "e"  }
  - { wzor: "ë", zamiana: "e"  }
  - { wzor: "É", zamiana: "E"  }
  - { wzor: "È", zamiana: "E"  }
  - { wzor: "Ê", zamiana: "E"  }
  - { wzor: "Ë", zamiana: "E"  }
  # -- → i --
  - { wzor: "í", zamiana: "i"  }
  - { wzor: "ì", zamiana: "i"  }
  - { wzor: "î", zamiana: "i"  }
  - { wzor: "ï", zamiana: "i"  }
  - { wzor: "Í", zamiana: "I"  }
  - { wzor: "Ì", zamiana: "I"  }
  - { wzor: "Î", zamiana: "I"  }
  - { wzor: "Ï", zamiana: "I"  }
  # -- → n --
  - { wzor: "ñ", zamiana: "n"  }
  - { wzor: "Ñ", zamiana: "N"  }
  # -- → o (zachowane ó→u w sekcji polskiej powyżej; obce → o) --
  - { wzor: "ò", zamiana: "o"  }
  - { wzor: "ô", zamiana: "o"  }
  - { wzor: "õ", zamiana: "o"  }
  - { wzor: "ö", zamiana: "o"  }
  - { wzor: "ø", zamiana: "o"  }
  - { wzor: "Ò", zamiana: "O"  }
  - { wzor: "Ô", zamiana: "O"  }
  - { wzor: "Õ", zamiana: "O"  }
  - { wzor: "Ö", zamiana: "O"  }
  - { wzor: "Ø", zamiana: "O"  }
  # -- → oe --
  - { wzor: "œ", zamiana: "oe" }
  - { wzor: "Œ", zamiana: "Oe" }
  # -- → ss (niemiecki) --
  - { wzor: "ß", zamiana: "ss" }
  # -- → th (islandzki Þ/þ) --
  - { wzor: "þ", zamiana: "th" }
  - { wzor: "Þ", zamiana: "Th" }
  # -- → u --
  - { wzor: "ú", zamiana: "u"  }
  - { wzor: "ù", zamiana: "u"  }
  - { wzor: "û", zamiana: "u"  }
  - { wzor: "ü", zamiana: "u"  }
  - { wzor: "Ú", zamiana: "U"  }
  - { wzor: "Ù", zamiana: "U"  }
  - { wzor: "Û", zamiana: "U"  }
  - { wzor: "Ü", zamiana: "U"  }
  # -- → y --
  - { wzor: "ý", zamiana: "y"  }
  - { wzor: "ÿ", zamiana: "y"  }
  - { wzor: "Ý", zamiana: "Y"  }
  - { wzor: "Ÿ", zamiana: "Y"  }

# -----------------------------------------------------------------------------
# Alfabet polski – 35 wielkich liter, bez znaków białych.
# Używany przez szyfr Cezara (plik szyfry/cezar.yaml).
# -----------------------------------------------------------------------------
alfabet: "AĄBCĆDEĘFGHIJKLŁMNŃOÓPQRSTUVWXYZŹŻ"

# -----------------------------------------------------------------------------
# Słowa-wyzwalacze parsera akcentów w Księdze Świata (13.3+).
# core_rezyser.zastosuj_akcenty_uniwersalne buduje z tej listy regex
# wyłapujący frazy „<słowo> X" lub „X <słowo>" (np. „akcent islandzki"
# albo „islandzki akcent"). Wszystkie wpisy małymi literami — porównujemy
# z opisem lower-cased.
# -----------------------------------------------------------------------------
slowo_akcent:
  - "akcent"
