  - { wzor: "szcz", zamiana: "щ"  }
  - { wzor: "Szcz", zamiana: "Щ"  }
  - { wzor: "SZCZ", zamiana: "Щ"  }
  - { wzor: "ść",   zamiana: "щ"  }
