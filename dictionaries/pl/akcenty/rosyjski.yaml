# -----------------------------------------------------------------------------
#  AKCENT ROSYJSKI
#  Dla syntezatorów: Milena / Irina / Yuri / Pavel (rosyjski TTS).
# -----------------------------------------------------------------------------
id: rosyjski
etykieta: "Rosyjski (np. Milena / Irina / Yuri / Pavel)"
opis: |
  Transliteruje polski tekst do cyrylicy z rosyjską wymową – dzięki temu
  rosyjski syntezator mowy (NVDA → Vocalizer Milena, eSpeak „ru", OneCore
  Irina/Pavel/Yuri) będzie w stanie odczytać polski tekst głosem rosyjskim.

  Mapowanie:
    - dwuznaki polskie → pojedyncze litery cyrylicy:
        „sz" → „ш", „cz" → „ч", „rz" → „ж", „ch" → „х",
        „ść" → „щ", „szcz" → „щ", „dż" → „дж", „dz" → „дз";
    - jotowane „j" + samogłoska → pojedyncze litery jotowane:
        „ja" → „я", „je" → „е", „jo" → „ё", „ju" → „ю", „ji" → „и";
    - „j" bez samogłoski po → „й";
    - polskie zmiękczenia si/ci/ni/zi + samogłoska → rosyjskie jotowane
        („siano" → „сяно", „nie" → „не", „ciocia" → „цёця", …);
    - „ń", „ś", „ć" bez samogłoski po → litera + miękki znak „ь";
    - nosowe „ą" → „он", „ę" → „эн";
    - „ź" → „ж" (niektóre dialekty normalizują do „зь"; z perspektywy
        syntezatora mowy różnica jest pomijalna, dlatego zostajemy przy
        wariancie prostszym, identycznym z „ż");
    - resztę liter łacińskich odwzorowujemy 1:1 w cyrylicy.

  UWAGA dla językoznawców: Ten akcent nie jest rosyjską transliteracją
  akademicką (ISO 9, GOST, BGN/PCGN). Celem jest wyłącznie brzmieniowe
  upodobnienie polskiego tekstu do rosyjskiego, tak by syntezator TTS
  wymówił go z rosyjskim akcentem. Do poprawnej transliteracji nazw
  własnych używaj dedykowanych narzędzi.
iso: ru
kategoria: akcent
kolejnosc: 45

# --- Pipeline przetwarzania ---
czysc_tekst_tts: true
normalizuj_liczby: true
# Nie usuwamy polskich diakrytyków „latynizująco" – zrobimy to ręcznie
# w sekcji `zamiany`, zamieniając je na litery cyrylicy.
usun_polskie_znaki: false
# Scalanie pojedynczych liter łacińskich jest bezsensowne po transliteracji
# na cyrylicę (regex w `sklej_pojedyncze_litery` szuka klasy [a-z]).
skleja_pojedyncze_litery: false

# -----------------------------------------------------------------------------
# KOLEJNOŚĆ ZAMIAN – KRYTYCZNA:
#   1. Trójznaki i dwuznaki spółgłoskowe (szcz, ść, sz, cz, rz, ch, dż, dz)
#   2. Zmiękczenia si/ci/ni/zi + samogłoska
#   3. Jotowane „j" + samogłoska (ja, je, jo, ju, ji)
#   4. Pozostałe „j" → „й"
#   5. Polskie diakrytyki jednoliterowe (ą, ę, ł, ó, ś, ć, ń, ż, ź)
#   6. Łacińskie litery → cyrylica
# Dwuznaki PRZED jednoznakami – inaczej zamiana „s" → „с" rozwali „sz", „ś".
# -----------------------------------------------------------------------------
zamiany:
