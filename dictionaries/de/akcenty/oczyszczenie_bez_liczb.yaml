  Wendet keinen phonetischen Akzent an. Führt die Textbereinigung für
  Sprachsynthesizer durch, BEHÄLT aber Ziffern in ihrer ursprünglichen Form.
  Verwende diese Option für technische Texte, bei denen „123" wichtiger ist
  als „einhundertdreiundzwanzig".
