# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Startbildschirm – Startseite"
  welcome_text: |-
    Dies ist Ihr integriertes Aufnahmestudio.
    Wählen Sie ein Werkzeug aus der Schaltflächenleiste oder dem Menü Werkzeuge:

      •  Regisseur       –  Schreibe Skripte und Prosa mit KI; verwalte das Buch der Welt dynamisch.
      •  Polyglott     –  Setze harte Akzente für lokale Synthesizer (NVDA/Vocalizer) und übersetze Texte.
      •  Konverter     –  Erstelle schnell professionelle Word-Dokumente mit Überschriften der Ebene 1.
      •  Regelmanager –  Durchsuche und erstelle Wörterbuchregeln, ohne manuell in YAML-Dateien einzugreifen.
  heading_system_check: "Systemprüfung"
  checking: "Konfiguration wird überprüft…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Keine Umgebungs-Konfigurationsdatei gefunden!

    Erster Programmstart erkannt. Module sind aus Sicherheitsgründen gesperrt.
    Um alle Werkzeuge freizuschalten, klicken Sie auf die Schaltfläche unten — das Programm generiert automatisch die Datei golden_key.env und öffnet sie im Standard-Texteditor.
  err_odczyt: "🚨 Die Datei golden_key.env konnte nicht gelesen werden:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Dateistrukturfehler!
    Der erforderliche Parameter OPENAI_API_KEY= fehlt.
    Wahrscheinlich haben Sie das Gleichheitszeichen oder den Variablennamen gelöscht.
    Löschen Sie die Datei, generieren Sie sie erneut und fügen Sie den Schlüssel vorsichtiger ein.
  err_tekst_zastepczy: |-
    ⚠️ Schlüssel wurde nicht eingegeben!
    In der Datei golden_key.env befindet sich noch ein Platzhaltertext.
    Öffnen Sie die Datei im Texteditor, entfernen Sie den Platzhaltertext und fügen Sie Ihren echten API-Schlüssel ein.
  err_cudzyslowy: |-
    🚨 Überflüssige Anführungszeichen um den Schlüssel!
    Der API-Schlüssel wurde in Anführungszeichen eingefügt (z.B. "sk-…").
    Öffnen Sie die Datei im Texteditor und entfernen Sie die Anführungszeichen —
    der Schlüssel muss direkt nach dem '='-Zeichen eingegeben werden, ohne zusätzliche Zeichen.
  err_niedozwolone_znaki: |-
    🚨 Unzulässige Zeichen um den Schlüssel!
    Vor oder nach dem API-Schlüssel wurde ein Leerzeichen oder ein anderes unsichtbares Zeichen erkannt.
    Öffnen Sie die Datei im Texteditor und stellen Sie sicher, dass der Wert
    sofort nach dem '='-Zeichen beginnt, ohne Leerzeichen.
  err_format: |-
    🚨 Verdächtiges Schlüssel-Format!
    Ein gültiger OpenAI-Schlüssel beginnt immer mit den Zeichen sk- (z.B. sk-proj-…).
    Stellen Sie sicher, dass Sie die richtige Zeichenfolge kopiert haben und dass keine Leerzeichen davor stehen.
  err_zbyt_krotki: |-
    ⚠️ Der Schlüssel scheint zu kurz zu sein ({liczba_znakow} Zeichen erkannt, mindestens {minimum_znakow} erwartet).
    Wahrscheinlich haben Sie nur einen Teil des Schlüssels kopiert.

    Wenn Sie das Fenster mit dem Schlüssel auf platform.openai.com bereits geschlossen haben,
    müssen Sie zu Ihrem Konto zurückkehren, die Option 'Geheimen Schlüssel widerrufen' für diesen
    abgeschnittenen Schlüssel verwenden und einen neuen generieren. Denken Sie daran, den Schlüssel beim nächsten Mal
    vollständig zu kopieren, bevor Sie auf 'Fertig' klicken.
  ok_klucz_wykryty: |-
    ✅ API-Schlüssel (golden_key.env) erkannt und korrekt formatiert.
    Alle Module sind einsatzbereit.
  # Przyciski akcji panelu startowego
  btn_generate: "Generiere die Datei golden_key.env und öffne den Texteditor"
  btn_open: "📝 Öffne die Datei golden_key.env im Texteditor"
  blad_tworzenia_env_tytul: "Fehler"
  blad_tworzenia_env_tresc: "Die Datei golden_key.env konnte nicht erstellt werden:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Datei {nazwa_pliku} wurde generiert!
    Der Texteditor öffnet sich automatisch.
    Fügen Sie Ihren API-Schlüssel ein, speichern Sie die Datei (Strg+S) und starten Sie die Anwendung neu.
  blad_otwarcia_pliku_tytul: "Information"
  blad_otwarcia_pliku_tresc: "Die Datei konnte nicht automatisch geöffnet werden.\nÖffnen Sie sie manuell:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Wörterbuchwerkzeuge"
  narzedzia_slownikowe_name: "Beschreibung der Wörterbuchwerkzeuge"
  tools_info: |-
    Möchten Sie einen neuen Akzent, eine Chiffre oder einen Regisseur-Modus hinzufügen?
    Öffnen Sie den Regelmanager (Strg+4) – dort finden Sie den Baum aller YAML-Dateien in dictionaries/ sowie einen Ersteller, der automatisch eine Vorlage erstellt oder einen Prompt für den Chatbot generiert.

    Nach dem Hinzufügen eines neuen AKZENTS klicken Sie zusätzlich auf die Schaltfläche „Regisseur-Akzente aus YAML aktualisieren“ unten – dies ermöglicht es dem Regisseur-Modus, den neuen Akzent zu erkennen (Polyglott erkennt YAMLs automatisch). Nach der Aktualisierung starten Sie die Anwendung neu.
  btn_open_manager_label: "📚 Öffne Regelmanager"
  btn_open_manager_name: "Schaltfläche Öffne Regelmanager"
  btn_open_manager_tooltip: "Wechselt zum Regelmanager – YAML-Dateiexplorer und Ersteller neuer Akzente / Modi / Chiffren (Strg+4)."
  btn_odswiez_label: "🔄 Regisseur-Akzente aus YAML aktualisieren"
  btn_odswiez_name: "Schaltfläche Regisseur-Akzente aus YAML aktualisieren"
  btn_odswiez_tooltip: "Scannt dictionaries/*/akzente/ und regeneriert Akzent-Wrapper in core_poliglota.py und core_rezyser.py. Nach erfolgreicher Aktualisierung muss die Anwendung neu gestartet werden."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Fehler beim Aktualisieren der Akzente"
  raport_niespodziewany_tresc: "Ein unerwarteter Fehler ist aufgetreten:\n{tresc_bledu}"
  raport_tytul_blad: "Regisseur-Akzente aktualisieren – FEHLER"
  raport_header_blad: "⛔ Generator hat Fehler festgestellt – siehe Protokoll unten."
  raport_tytul_sukces: "Regisseur-Akzente aktualisieren – Erfolg"
  raport_header_sukces: |-
    ✅ Dateien für {liczba_akcentow} Akzente wurden modifiziert.
    Um die neuen Akzente im Regisseur-Modus anzuzeigen, starten Sie die Anwendung neu.
  raport_tytul_bez_zmian: "Regisseur-Akzente aktualisieren – Keine Änderungen"
  raport_header_bez_zmian: "ℹ️ Keine Änderungen. {liczba_akcentow} Akzente erkannt – Wrapper sind bereits aktuell."
  raport_lbl_log: "Vollständiges Protokoll (Strg+A, Strg+C kopiert in die Zwischenablage):"
  raport_log_name: "Protokoll des Akzentgenerators des Regisseurs"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Audio GPT Regisseur-Panel"
  heading: "🎬  Audio GPT Regisseur – Hybrides Kreativstudio"
  description_name: "Beschreibung des Moduls Audio GPT Regisseur"
  tool_description: |-
    Audio GPT Regisseur ist ein hybrides Kreativstudio.

    Brainstorming-Modus  – plane die Handlung, generiere 3 Optionen (KEINE Dateispeicherung).
    Skript-Modus        – schreibe ein Rohskript mit [SFX]- und [Charakter: Emotion]-Tags (DATEISPEICHERUNG).
    Hörbuch-Modus     – generiere dichte, klassische literarische Prosa (DATEISPEICHERUNG).

    Projekte werden im Unterordner 'skripte/' neben dem Programm gespeichert.
    Geben Sie den Projektnamen OHNE Erweiterung an (z.B. kroniken_arkonii).
    Um das Projekt zu ändern, müssen Sie zuerst den aktuellen Speicher löschen.
  prompt_architekta_content: |-
    Sie sind ein herausragender Weltenarchitekt (Worldbuilder) und literarischer Berater. Ich habe eine lose Idee für eine Handlung: [HIER IHRE IDEE EINFÜGEN]. Ihre Aufgabe ist es, dies zu einem professionellen „Buch der Welt“ auszubauen.
    Passen Sie Ton und Regeln an meine Idee an. Vermeiden Sie billige, märchenhafte Abkürzungen und KI-Klischees.

    FORMATIERUNGSREGELN (KRITISCH):
    Sie müssen die Antwort in zwei getrennten Teilen zurückgeben:

    TEIL 1: BUCH DER WELT
    Diesen Teil müssen Sie unbedingt in EINEM Markdown-Codeblock abschließen (verwenden Sie die Markierungen ```markdown am Anfang und ``` am Ende). Innerhalb des Codeblocks befolgen Sie diese Regeln:
    1. Beginnen Sie mit einem offenen Buch-Emoji und einem Arbeitstitel, z.B. 📖 Buch der Welt: [Titel].
    2. Verwenden Sie ein einzelnes Hashtag (#) für Hauptabschnitte (z.B. # Weltregeln, # Charaktere).
    3. Verwenden Sie doppelte Hashtags (##) für Unterabschnitte.
    4. Verwenden Sie Bindestriche (-), um übersichtliche Listen zu erstellen.
    5. Verwenden Sie doppelte Sternchen (**Text**), um absolute, unveränderliche Regeln hervorzuheben (z.B. **Der Held LÜGT NIE**).
    6. Beschreiben Sie die Psychologie der Charaktere, ihre größten Schwächen und Motivationen. Bei fremdsprachigen Charakteren fügen Sie die Akzentinformation direkt beim Tag hinzu, z.B. `[Sprecher 1: Name] - lispelt und hat einen französischen Akzent`. **Technischer Hinweis:** Die Verwendung des Schlüsselworts `Akzent` ist unbedingt erforderlich, da ein externer Anwendungsskript automatisch die richtigen phonetischen Regeln auf die Dialoge des jeweiligen Charakters anwendet.

    TEIL 2: MODUSEMPFEHLUNG
    Diesen Teil platzieren Sie AUSSERHALB des Codeblocks, als normalen Text darunter. Empfehlen Sie mir, welcher Modus meiner Anwendung am besten geeignet ist, um diese Idee umzusetzen: 🎬 Rohskript-Modus (Hörspiele, SFX, Phonetik) oder 📖 Traditioneller Hörbuch-Modus (klassische literarische Prosa).

  # Pasek pliku
  lbl_nazwa_pliku: "Projektdateiname (ohne Erweiterung, z.B. kroniken_arkonii):"
  txt_nazwa_pliku_name: "Projektdateinamenfeld"
  txt_nazwa_pliku_hint: "z.B. kroniken_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Geben Sie den Projektnamen OHNE Erweiterung ein.
    Geschichtsdatei wird gespeichert als: skripte/<name>.txt
    Feld gesperrt, wenn Speicher belegt ist.
  btn_wczytaj_label: "Geschichte laden"
  btn_wczytaj_tooltip: |-
    Lädt eine bestehende Projektdatei (skripte/<name>.txt) in den Speicher.
    Nur aktiv, wenn der Speicher leer ist und ein Name angegeben wurde.
  btn_wyczysc_biezaca_label: "Aktuellen Speicher löschen (Zusammenfassung behalten)"
  btn_wyczysc_biezaca_tooltip: |-
    Löscht nur die aktuelle Geschichte aus dem Speicher.
    Zusammenfassung (Langzeitspeicher) und Buch der Welt bleiben erhalten.
    Verwenden Sie dies, um eine lange Geschichte nach der Generierung der Zusammenfassung fortzusetzen.
  btn_hard_reset_label: "Projekt schließen (Harter Reset)"
  btn_hard_reset_tooltip: |-
    VOLLSTÄNDIGES Löschen des Projekts: Geschichte, Zusammenfassung, Buch der Welt.
    Setzt alle Zähler zurück und entsperrt das Dateinamenfeld.
    Verwenden Sie dies bei Projektwechsel oder einer völlig neuen Geschichte.
  # Sidebar
  sidebar_heading: "📖 Projekt-Sidebar"
  lbl_ksiega_swiata: "Buch der Welt – Regeln und Charaktere:"
  txt_ksiega_name: "Feld Buch der Welt – Regeln und Charaktere"
  txt_ksiega_hint: |-
    Geben Sie die Weltregeln, Charakterbeschreibungen und ihre phonetischen Akzente ein…
    Z.B. [Geralt: isländischer Akzent]
    Inhalt wird zu jeder KI-Anfrage hinzugefügt.
  txt_ksiega_tooltip: |-
    Kontext, der ständig zur KI hinzugefügt wird: Weltregeln, Charaktere, phonetische Akzente.
    Speichern auf der Festplatte erfordert die Angabe des Projektnamens.
  btn_zapisz_ksiege_label: "💾 Buch dauerhaft speichern"
  btn_zapisz_ksiege_tooltip: |-
    Speichert das Buch der Welt in einer Datei: skripte/<name>.md
    Erfordert die Angabe des Projektnamens.
  btn_prompt_architekta_label: "📖 Architekten-Prompt für KI…"
  btn_prompt_architekta_name: "Schaltfläche Architekten-Prompt für externen Chatbot anzeigen"
  btn_prompt_architekta_tooltip: |-
    Öffnet ein Fenster mit einem fertigen Prompt für einen externen Chatbot (ChatGPT, Claude).
    Fügen Sie Ihre Handlungsidee ein, und die KI generiert ein professionelles Buch der Welt, formatiert in Markdown – zum Einfügen in das Feld „Buch der Welt“ oben.
  lbl_pamiec_dlugotrwala: "🧠 Langzeitspeicher (Zusammenfassung):"
  txt_pamiec_name: "Feld Langzeitspeicher – Ereigniszusammenfassung"
  txt_pamiec_hint: |-
    Hier speichert die KI die Zusammenfassung bei Speicherüberlauf.
    Sie können sie auch manuell bearbeiten.
  txt_pamiec_tooltip: |-
    Zusammenfassung vorheriger Ereignisse, die zu jeder KI-Anfrage hinzugefügt wird.
    Ermöglicht die Fortsetzung der Geschichte ohne Einschränkungen des Kontextfensters des Modells.
  btn_zapisz_pamiec_label: "💾 Zusammenfassung speichern"
  btn_zapisz_pamiec_tooltip: |-
    Speichert die Zusammenfassung in einer Datei: skripte/<name>_zusammenfassung.txt
    Nach dem Speichern können Sie den aktuellen Speicher sicher löschen.
  # Obszar roboczy
  main_heading: "🎬 Arbeitsbereich"
  rb_tryb_label: "Arbeitsmodus:"
  rb_tryb_name: "Auswahl des KI-Arbeitsmodus"
  rb_tryb_tooltip: |-
    Brainstorming – Planung ohne Dateispeicherung.
    Skript        – Rohes Tonskript (wird in Datei gespeichert).
    Hörbuch     – Traditionelle literarische Prosa (wird in Datei gespeichert).
  # 13.2: komunikaty fallbacku reżysera (gdy brak reguł dla języka UI ani EN)
  brak_trybow_dla_jezyka: |-
    Für die Sprache „{jezyk}“ wurden keine Regisseur-Modi oder englische Fallbacks gefunden
    (dictionaries/en/rezyser/). Fügen Sie eine YAML-Datei mit dem Modus
    zum Sprachregelordner hinzu oder stellen Sie das englische Standardpaket wieder her.
  brak_trybow_tytul: "Keine Regisseur-Modi"
  placeholder_brak_trybow: "(keine Modi zur Auswahl)"
  # Panel struktury
  struktura_heading: "✂️ Strukturverwaltung"
  btn_prolog_label: "📜 Prolog einfügen"
  btn_prolog_name: "Schaltfläche Prolog einfügen"
  btn_prolog_tooltip: |-
    Fügt die Überschrift 'Prolog' am Anfang der Geschichte ein.
    Nur möglich, wenn die Geschichte leer ist. Erfordert Projektnamen.
  btn_epilog_label: "🏁 Epilog einfügen"
  btn_epilog_name: "Schaltfläche Epilog einfügen"
  btn_epilog_tooltip: |-
