  btn_duplikuj_label: "📋  &Ausgewählte Datei duplizieren"
  btn_duplikuj_name: "Schaltfläche Duplizieren Sie die ausgewählte Datei"
  btn_duplikuj_tooltip: "Erstellt eine Kopie der ausgewählten YAML-Datei unter einem neuen Namen – ein schneller Start für eine Variante einer bestehenden Regel."
  btn_usun_label: "🗑️  &Ausgewählte Datei löschen"
  btn_usun_name: "Schaltfläche Löschen Sie die ausgewählte Datei"
