# -----------------------------------------------------------------------------
# UPDATER – auto-aktualizacja (core_updater.py + wątek tła w main.py)
# -----------------------------------------------------------------------------
updater:
  # Powiadomienie o nowej wersji (wx.MessageBox Tak/Nie)
  nowa_wersja_tytul: "Update verfügbar"
  nowa_wersja_tresc: |-
    Eine neue Version ist verfügbar: {nowa_wersja}.
    Ihre Version: {aktualna_wersja}.

    Möchten Sie das Update jetzt herunterladen und installieren?
  # Pobieranie (wx.ProgressDialog)
  pobieranie_tytul: "Update wird heruntergeladen {nowa_wersja}"
  pobieranie_tresc: "Herunterladen {nazwa_pliku}…"
  # Zakończenie pobierania i uruchomienie instalatora
  instalacja_tytul: "Download abgeschlossen"
  instalacja_tresc: |-
    Download abgeschlossen. Der Installer wird gestartet.
    Die Anwendung wird geschlossen.
  # Błędy
  blad_pobierania_tytul: "Download-Fehler"
  blad_pobierania_tresc: "Update konnte nicht heruntergeladen werden:\n{tresc_bledu}"
  blad_uruchomienia_tytul: "Fehler beim Starten des Installers"
  blad_uruchomienia_tresc: "Installer konnte nicht gestartet werden:\n{sciezka_pliku}\n\n{tresc_bledu}"
  dev_info_tresc: |-
    Eine neue Version ist verfügbar: {nowa_wersja}.

    Diese Installation verwendet kein Runtime-Paket — das Herunterladen des Installers ist nicht verfügbar.
    Besuchen Sie die Release-Seite auf GitHub und laden Sie das Archiv „Source code" herunter oder klonen Sie das Repository:

    {url_release}
