  opcja_wszystkie_jezyki: "🌍  Alle Sprachen"
  tree_jezyk: "🌐  {kod_jezyka}  ({nazwa_jezyka})"
  tree_podstawy: "📄  grundlagen.yaml  (Diakritika + Alphabet)"
  tree_kategoria: "{etykieta}  [{liczba_plikow}]"
  tree_plik: "📄  {nazwa_pliku}"
