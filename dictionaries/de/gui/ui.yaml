    Blockiert weiteres Hinzufügen von Inhalten nach dem Epilog.
  btn_rozdzial_label: "✂️ Schnitt einfügen (Kapitel {numer_rozdzialu})"
  btn_rozdzial_name: "Schaltfläche Kapitel einfügen"
  btn_rozdzial_tooltip: |-
    Fügt die Überschrift des nächsten Kapitels zur Geschichte und Datei hinzu.
    Nur im Hörbuchmodus verfügbar.
  btn_akt_label: "🎭 Akt {numer_aktu} einfügen"
  btn_akt_name: "Schaltfläche Akt einfügen"
  btn_akt_tooltip: |-
    Fügt die Überschrift 'Akt N' und automatisch 'Szene 1' zur Geschichte und Datei hinzu.
    Nur im Skriptmodus verfügbar.
  btn_scena_label: "🎬 Szene {numer_sceny} einfügen"
