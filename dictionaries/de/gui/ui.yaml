# -----------------------------------------------------------------------------
# MANAGER – panel Managera Reguł (gui_manager_regul.py)
# -----------------------------------------------------------------------------
manager:
  panel_name: "Panel des Regelmanagers – Wörterbuch-Explorer"
  desc: |-
    Der Regelmanager ermöglicht das Durchsuchen und Bearbeiten von YAML-Dateien im dictionaries/-Ordner, ohne den Datei-Explorer des Systems zu öffnen. Wählen Sie eine Datei im Baum links aus und verwenden Sie dann die Schaltflächen rechts: im Texteditor öffnen, neue Datei erstellen, duplizieren oder löschen.

    Für schwierigere Aufgaben (neue Sprache, fremder phonetischer Akzent, algorithmisches Chiffre) generiert der Manager ein Prompt für den AI-Chatbot – einfach in ChatGPT oder Claude einfügen und die Antwort speichern.
  desc_name: "Beschreibung des Regelmanagers"
  # Drzewo
  tree_name: "Dateibaum dictionaries"
  tree_tooltip: |-
    Baum aller YAML-Dateien im dictionaries/-Ordner. Erweitern Sie die Sprache, dann die Kategorie und wählen Sie dann die Datei aus. Pfeile und Enter funktionieren standardmäßig für NVDA.
  tree_root: "Wörterbücher (dictionaries/)"
  tree_brak_folderu: "⚠️  Kein dictionaries/-Ordner – erstellen Sie die erste Sprache mit der Schaltfläche „Neue Regeldatei…\"."
  # 13.2: filtr języka — domyślnie pokazujemy tylko aktywny język UI (A11y),
  # a osobna opcja „Wszystkie języki" jest dla autorów paczek językowych.
  dropdown_jezyk_label: "&Sprache:"
  dropdown_jezyk_tooltip: |-
