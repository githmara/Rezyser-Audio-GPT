  # Podgląd historii
  lbl_podglad_historii: "Aktuelle Geschichte im Speicher (nur lesbar – mit Pfeiltasten navigieren):"
  txt_podglad_name: "Vorschau des gesamten Verlaufs im Speicher – nur lesbar"
