  - { wzor: "Ÿ", zamiana: "Y"  }

# -----------------------------------------------------------------------------
# Deutsches Alphabet — 29 Großbuchstaben (A–Z + Ä, Ö, Ü am Ende).
# ß ist NICHT enthalten (wächst beim .upper(): ß→SS).
# Verwendet vom Caesar-Chiffre.
# -----------------------------------------------------------------------------
alfabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ"

# -----------------------------------------------------------------------------
# Trigger-Wörter des Akzent-Parsers in der Weltbibel (13.3+).
# core_rezyser.zastosuj_akcenty_uniwersalne erstellt aus dieser Liste eine
# Regex, die Phrasen „<Wort> X" oder „X <Wort>" erkennt.
# -----------------------------------------------------------------------------
slowo_akcent:
  - "akzent"
  - "aussprache"
