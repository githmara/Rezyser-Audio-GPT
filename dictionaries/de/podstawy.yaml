  - { wzor: "Ë", zamiana: "E"  }
  - { wzor: "í", zamiana: "i"  }
  - { wzor: "ì", zamiana: "i"  }
  - { wzor: "î", zamiana: "i"  }
  - { wzor: "ï", zamiana: "i"  }
  - { wzor: "Í", zamiana: "I"  }
  - { wzor: "Ì", zamiana: "I"  }
  - { wzor: "Î", zamiana: "I"  }
  - { wzor: "Ï", zamiana: "I"  }
  - { wzor: "ñ", zamiana: "n"  }
  - { wzor: "Ñ", zamiana: "N"  }
  - { wzor: "ò", zamiana: "o"  }
  - { wzor: "ô", zamiana: "o"  }
