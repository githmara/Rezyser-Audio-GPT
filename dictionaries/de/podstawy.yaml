  - { wzor: "ø", zamiana: "o"  }
  - { wzor: "Ò", zamiana: "O"  }
  - { wzor: "Ô", zamiana: "O"  }
  - { wzor: "Õ", zamiana: "O"  }
  - { wzor: "Ø", zamiana: "O"  }
  - { wzor: "œ", zamiana: "oe" }
  - { wzor: "Œ", zamiana: "Oe" }
  - { wzor: "þ", zamiana: "th" }
  - { wzor: "Þ", zamiana: "Th" }
  - { wzor: "ú", zamiana: "u"  }
  - { wzor: "ù", zamiana: "u"  }
  - { wzor: "û", zamiana: "u"  }
  - { wzor: "Ú", zamiana: "U"  }
