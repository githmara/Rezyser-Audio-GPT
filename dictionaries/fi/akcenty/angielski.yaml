# -----------------------------------------------------------------------------
#  ENGLANNIN AKSENTTI (suomi → englantilainen TTS)
#  Syntetisaattoreille: David / Zira / Samantha / Hazel (englantilainen TTS).
# -----------------------------------------------------------------------------
id: angielski
etykieta: "Englanti (esim. David / Zira)"
opis: |
  Mukauttaa suomenkielisen tekstin englantilaiselle puhesyntetisaattorille
  (David / Zira / Samantha / Hazel). Muuttaa j-kirjaimen y-kirjaimeksi
  oikean ääntämisen varmistamiseksi.

  Ainoa kriittinen ongelma on kirjain "j": englantilainen TTS lukee sen
  /dʒ/:nä (kuten sanassa "jump"), kun taas suomen j = /j/ (kuten englannin
  "y" sanassa "yes"). Korjaus: j → y.

  Englantilainen TTS käsittelee useita suomen piirteitä muita paremmin:
    - h   → /h/ (OIKEIN suomelle!) — ei muutosta tarvita
    - v   → /v/ (OIKEIN) — ei muutosta
    - kk/tt/pp — kirjoitusasussa näkyvät geminaatat

  Muutokset:
    - j (/j/) → y   KRIITTINEN: englannin "y" = /j/ = suomen j
    - ä (/æ/) → a   Englannin /æ/ sanassa "cat" ≈ suomen /æ/
    - ö (/ø/) → e   /ø/ → /ɛ/ — parempi kuin diftongi /oʊ/
    - å (/ɔ/) → o
  Pitkät ää → aa, öö → ee — fonologinen pituus säilyy.
iso: en
kategoria: akcent
kolejnosc: 40

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: true
skleja_pojedyncze_litery: true

# --- Fonetiset korvaukset ---
# KRIITTINEN JÄRJESTYS:
#   1. j → y  (ensin, jotta suomen "j" ei joudu myöhempiin sääntöihin)
#   2. Pitkät ää/öö ENNEN lyhyitä ä/ö (suoja kaksinkertaiselta korvaukselta)
#   3. Lyhyet ä/ö/å lopuksi
zamiany:
  # --- 1. Kriittinen korjaus j → y (ENSIMMÄINEN) ---
  - { wzor: "j",  zamiana: "y"  }
  - { wzor: "J",  zamiana: "Y"  }

  # --- 2. Pitkät suomen vokaalit (pituus säilyy) ---
  - { wzor: "ää", zamiana: "aa" }
  - { wzor: "Ää", zamiana: "Aa" }
  - { wzor: "ÄÄ", zamiana: "AA" }
  - { wzor: "öö", zamiana: "ee" }
  - { wzor: "Öö", zamiana: "Ee" }
  - { wzor: "ÖÖ", zamiana: "EE" }

  # --- 3. Lyhyet suomen natiivivokaalit → lähimmät englantilaiset ---
  - { wzor: "ä",  zamiana: "a"  }
  - { wzor: "Ä",  zamiana: "A"  }
  - { wzor: "ö",  zamiana: "e"  }
  - { wzor: "Ö",  zamiana: "E"  }
  - { wzor: "å",  zamiana: "o"  }
  - { wzor: "Å",  zamiana: "O"  }
