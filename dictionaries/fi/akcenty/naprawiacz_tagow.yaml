opis: |
  Tämä "korostus" EI muokkaa tekstin sisältöä eikä sen fonetiikkaa.
  Se syöttää ainoastaan kielen ISO-koodin tulostiedostoon:
    - HTML: lang="..." -attribuutti <html>-tunnisteessa
    - DOCX: <w:lang w:val="..."/> -elementti jokaiseen tekstijaksoon
  Näin näytönlukija (NVDA/JAWS) vaihtaa puhesyntetisaattorin äänen
  oikealle kielelle.

  ISO-koodi syötetään käsin GUI:ssa ("ISO-koodi" -kenttä), ei tästä
  tiedostosta — siksi `iso`-arvo on tyhjä.
