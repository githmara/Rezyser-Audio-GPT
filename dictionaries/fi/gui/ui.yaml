# -----------------------------------------------------------------------------
home:
  panel_name: "Aloituspaneeli – Etusivu"
  welcome_text: |-
    Tämä on integroitu äänitysstudiosi.
    Valitse työkalu painikepalkista tai Työkalut-valikosta:

      •  Ohjaaja       –  Kirjoita käsikirjoituksia ja proosaa AI:n avulla; hallitse Księga Świataa dynaamisesti.
      •  Polyglootti     –  Lisää kovia aksentteja paikallisiin synteettisiin ääniin (NVDA/Vocalizer) ja käännä tekstejä.
      •  Muunnin     –  Luo nopeasti ammattimaisia Word-tiedostoja tason 1 otsikoilla.
      •  Sääntöjen Hallinta –  Tutki ja luo sanakirjasääntöjä ilman, että sinun tarvitsee käsitellä YAML-tiedostoja manuaalisesti.
  heading_system_check: "System Check"
  checking: "Konfiguraation tarkistus…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Ympäristökonfiguraatiotiedosto puuttuu!

    Ohjelman ensimmäinen käynnistys havaittu. Moduulit on lukittu turvallisuussyistä.
    Voit avata kaikki työkalut napsauttamalla alla olevaa painiketta — ohjelma luo automaattisesti golden_key.env-tiedoston ja avaa sen oletustekstieditorissa.
  err_odczyt: "🚨 golden_key.env-tiedoston lukeminen epäonnistui:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Tiedoston rakennevirhe!
    Pakollinen parametri OPENAI_API_KEY= puuttuu.
    Olet todennäköisesti poistanut yhtäsuuruusmerkin tai muuttujan nimen.
    Poista tiedosto, luo se uudelleen ja liitä avain huolellisemmin.
  err_tekst_zastepczy: |-
    ⚠️ Avain ei ole syötetty!
    Tiedostossa golden_key.env on edelleen paikkamerkkiteksti.
    Avaa tiedosto tekstieditorissa, poista paikkamerkkiteksti ja liitä oikea API-avaimesi.
  err_cudzyslowy: |-
    🚨 Avain on lainausmerkeissä!
    API-avain on liitetty lainausmerkkeihin (esim. "sk-…").
    Avaa tiedosto tekstieditorissa ja poista lainausmerkit —
    avain on kirjoitettava suoraan yhtäsuuruusmerkin jälkeen ilman ylimääräisiä merkkejä.
  err_niedozwolone_znaki: |-
    🚨 Kiellettyjä merkkejä avaimen ympärillä!
    API-avaimen edessä tai takana on havaittu välilyönti tai muu näkymätön merkki.
    Avaa tiedosto tekstieditorissa ja varmista, että arvo alkaa
    heti yhtäsuuruusmerkin jälkeen ilman välilyöntejä.
  err_format: |-
    🚨 Epäilyttävä avaimen muoto!
    Oikea OpenAI-avain alkaa aina merkeillä sk- (esim. sk-proj-…).
    Varmista, että olet kopioinut oikean merkkijonon eikä sen edessä ole välilyöntejä.
  err_zbyt_krotki: |-
    ⚠️ Avain vaikuttaa liian lyhyeltä (havaittu {liczba_znakow} merkkiä, odotettiin vähintään {minimum_znakow}).
    Olet todennäköisesti kopioinut vain osan avaimesta.

    Jos olet jo sulkenut avainikkunan platform.openai.com-sivustolla,
    sinun on palattava tilillesi, käytettävä 'Revoke secret key' -vaihtoehtoa tälle
    katkaistulle avaimelle ja luotava uusi. Muista kopioida avain kokonaisuudessaan ennen kuin napsautat 'Done'.
  ok_klucz_wykryty: |-
    ✅ API-avain (golden_key.env) havaittu ja oikein muotoiltu.
    Kaikki moduulit ovat valmiita käyttöön.
  # Przyciski akcji panelu startowego
  btn_generate: "Luo golden_key.env-tiedosto ja avaa tekstieditori"
  btn_open: "📝 Avaa golden_key.env-tiedosto tekstieditorissa"
  blad_tworzenia_env_tytul: "Virhe"
  blad_tworzenia_env_tresc: "golden_key.env-tiedoston luominen epäonnistui:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
