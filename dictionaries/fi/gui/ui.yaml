# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Audio GPT -ohjaajan paneeli"
  heading: "🎬  Audio GPT -ohjaaja – Hybridi Luova Studio"
  description_name: "Audio GPT -ohjaajan moduulin kuvaus"
  tool_description: |-
    Audio GPT -ohjaaja on hybridi luova studio.

    Aivoriihi-tila  – suunnittele juoni, luo 3 vaihtoehtoa (EI tallennusta tiedostoon).
    Käsikirjoitus-tila        – kirjoita raakaa äänikäsikirjoitusta tageilla [SFX] ja [Hahmo: tunne] (TALLENNUS TIEDOSTOON).
    Äänikirja-tila     – luo tiheää, klassista kirjallista proosaa (TALLENNUS TIEDOSTOON).

    Projektit tallennetaan ohjelman viereiseen 'skrypty/'-alikansioon.
    Anna projektin nimi ILMAN laajennusta (esim. kroniki_arkonii).
    Vaihtaaksesi projektia sinun on ensin tyhjennettävä nykyinen muisti.
  prompt_architekta_content: |-
    Olet erinomainen maailmojen arkkitehti (Worldbuilder) ja kirjallinen konsultti. Minulla on löyhä idea juonesta: [KIRJOITA IDEASI TÄHÄN]. Tehtäväsi on laajentaa tämä ammattimaiseksi "Księga Świata".
    Sovita sävy ja säännöt ideani mukaan. Vältä halpoja, satumaisia oikoteitä ja AI-kliseitä.

    MUOTOILUSÄÄNNÖT (KRIITTINEN):
    Sinun on palautettava vastaus kahdessa erillisessä osassa:

    OSA 1: KSIĘGA ŚWIATA
    Tämä osa on ehdottomasti suljettava YHDESSÄ Markdown-koodilohkossa (käytä merkintöjä ```markdown alussa ja ``` lopussa). Koodilohkon sisällä noudata näitä sääntöjä:
    1. Aloita avoimen kirjan emojilla ja työnimellä, esim. 📖 Księga Świata: [Nimi].
    2. Käytä yksittäistä hashtagia (#) pääosioille (esim. # Maailman Säännöt, # Hahmot).
    3. Käytä kaksoishashtagia (##) aliosioille.
    4. Käytä viivoja (-) luodaksesi selkeitä luetteloita.
    5. Käytä kaksoistähtiä (**teksti**), korostaaksesi ehdottomia, rikkomattomia sääntöjä (esim. **Sankari EI KOSKAAN valehtele**).
    6. Kuvaile hahmojen psykologiaa, heidän suurimpia heikkouksiaan ja motiivejaan. Vieraskielisten hahmojen kohdalla lisää tieto aksentista suoraan tagin viereen, esim. `[Puhuja 1: Nimi] - lispaa ja hänellä on ranskalainen aksentti`. **Tekninen vihje:** Avainsanan `akcent` käyttö on ehdottomasti vaadittua, koska sen perusteella sovelluksen ulkoinen skripti tunnistaa ja soveltaa oikeat foneettiset säännöt kyseisen hahmon dialogeihin.

    OSA 2: TILASUOSITUS
    Tämä osa sijoitetaan Koodilohkon ULKOPUOLELLE, tavallisena tekstinä alapuolelle. Suosita minulle, mikä sovellukseni tila on paras tämän idean toteuttamiseen: 🎬 Raaka Käsikirjoitus -tila (kuunnelmat, SFX, fonetiikka) vai 📖 Perinteinen Äänikirja -tila (klassinen kirjallinen proosa).

  # Pasek pliku
  lbl_nazwa_pliku: "Projektitiedoston nimi (ilman laajennusta, esim. kroniki_arkonii):"
  txt_nazwa_pliku_name: "Projektitiedoston nimen kenttä"
  txt_nazwa_pliku_hint: "esim. kroniki_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Anna projektin nimi ILMAN laajennusta.
    Historia tallennetaan tiedostoon: skrypty/<nimi>.txt
    Kenttä on lukittu, kun muisti on käytössä.
  btn_wczytaj_label: "Lataa historia"
  btn_wczytaj_tooltip: |-
    Lataa olemassa oleva projektitiedosto (skrypty/<nimi>.txt) muistiin.
    Aktiivinen vain, kun muisti on tyhjä ja nimi on annettu.
  btn_wyczysc_biezaca_label: "Tyhjennä nykyinen (jätä Yhteenveto)"
  btn_wyczysc_biezaca_tooltip: |-
    Tyhjentää vain nykyisen historian muistista.
    Yhteenveto (Pysyvä Muisti) ja Księga Świata säilyvät.
    Käytä pitkän kirjan jatkamiseen yhteenvedon luomisen jälkeen.
  btn_hard_reset_label: "Sulje Projekti (Kova Nollaus)"
  btn_hard_reset_tooltip: |-
    PROJEKTIN KOKONAISTYHJENNYS: historia, yhteenveto, Księga Świata.
    Nollaa kaikki laskurit ja avaa tiedostonimen kentän.
    Käytä projektin vaihtamiseen tai täysin uuden tarinan aloittamiseen.
  # Sidebar
  sidebar_heading: "📖 Projektin Sivupalkki"
  lbl_ksiega_swiata: "Księga Świata – Säännöt ja Hahmot:"
  txt_ksiega_name: "Księga Świata -kenttä – säännöt ja hahmot"
  txt_ksiega_hint: |-
    Kirjoita maailman säännöt, hahmojen kuvaus ja heidän foneettiset aksenttinsa…
    Esim. [Geralt: islantilainen aksentti]
    Sisältö liitetään jokaiseen AI-pyyntöön.
  txt_ksiega_tooltip: |-
    Konteksti, joka liitetään jatkuvasti AI:lle: maailman säännöt, hahmot, foneettiset aksentit.
    Tallennus levylle vaatii projektitiedoston nimen.
  btn_zapisz_ksiege_label: "💾 Tallenna Księga pysyvästi"
  btn_zapisz_ksiege_tooltip: |-
    Tallentaa Księga Świata -tiedostoon: skrypty/<nimi>.md
    Vaatii projektitiedoston nimen.
  btn_prompt_architekta_label: "📖 Arkkitehdin Kehotus AI:lle…"
  btn_prompt_architekta_name: "Näytä Arkkitehdin Kehotus ulkoiselle chatbotille -painike"
  btn_prompt_architekta_tooltip: |-
    Avaa ikkuna valmiilla kehotuksella ulkoiselle chatbotille (ChatGPT, Claude).
    Liitä juoni-ideasi, ja AI luo ammattimaisen Księga Świata -dokumentin Markdown-muodossa – liitettäväksi yllä olevaan "Księga Świata" -kenttään.
  lbl_pamiec_dlugotrwala: "🧠 Pysyvä Muisti (Yhteenveto):"
  txt_pamiec_name: "Pysyvä Muisti -kenttä – tapahtumien yhteenveto"
  txt_pamiec_hint: |-
    Tänne AI tallentaa yhteenvedon, kun muisti on täynnä.
    Voit myös muokata sitä manuaalisesti.
  txt_pamiec_tooltip: |-
    Aiemman tapahtumien yhteenveto liitetään jokaiseen AI-pyyntöön.
    Mahdollistaa tarinan jatkamisen ilman mallin kontekstin ikkunan rajoituksia.
  btn_zapisz_pamiec_label: "💾 Tallenna Yhteenveto"
  btn_zapisz_pamiec_tooltip: |-
    Tallentaa yhteenvedon tiedostoon: skrypty/<nimi>_yhteenveto.txt
    Tallennuksen jälkeen voit turvallisesti tyhjentää nykyisen muistin.
  # Obszar roboczy
  main_heading: "🎬 Työtila"
  rb_tryb_label: "Työtila:"
  rb_tryb_name: "AI:n työtilan valinta"
  rb_tryb_tooltip: |-
    Aivoriihi – suunnittelu ilman tallennusta tiedostoon.
    Käsikirjoitus        – raaka äänikäsikirjoitus (tallennetaan tiedostoon).
    Äänikirja     – perinteinen kirjallinen proosa (tallennetaan tiedostoon).
  # Panel struktury
  struktura_heading: "✂️ Rakennehallinta"
  btn_prolog_label: "📜 Lisää Prologi"
  btn_prolog_name: "Lisää Prologi -painike"
  btn_prolog_tooltip: |-
