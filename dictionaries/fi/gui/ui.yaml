    Mahdollinen vain, kun tarina on tyhjä. Vaatii projektin nimen.
  btn_epilog_label: "🏁 Lisää Epilogi"
  btn_epilog_name: "Lisää Epilogi -painike"
  btn_epilog_tooltip: |-
