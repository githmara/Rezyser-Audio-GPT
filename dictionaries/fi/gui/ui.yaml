  narzedzia_slownikowe_name: "Sanakirjatyökalujen kuvaus"
  tools_info: |-
    Haluatko lisätä uuden aksentin, salauksen tai Ohjaajan tilan?
    Avaa Sääntöjen Hallinta (Ctrl+4) – löydät sieltä kaikki YAML-tiedostot dictionaries/ sekä luojan, joka luo mallin tai generoi kehotuksen AI-chatbotille.

