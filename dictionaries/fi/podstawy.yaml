# =============================================================================
#  SUOMEN KIELEN PERUSTEET
# =============================================================================
#
#  Perustiedosto kansiolle `dictionaries/fi/`. Poliglota-moottori vaatii, että
#  jokaisella kielellä on tämä tiedosto — ilman sitä uutta kieltä EI tunnisteta
#  lainkaan.
#
#  Rakenne mallinnettu tiedostosta `dictionaries/pl/podstawy.yaml`. Kenttä
#  `polskie_znaki` on jätetty tyhjäksi listaksi — versiossa 13.x emme suunnittele
#  diakriittisten merkkien translitterointia muille kielille kuin puolaksi.
#  Avaimen nimi `polskie_znaki` on historiallinen; sääntöjen hallinta odottaa
#  sen läsnäoloa, joten emme muuta sitä.
# =============================================================================

id: podstawy
jezyk: fi
etykieta: "Suomi – foneettiset perusteet"
opis: |
  Suomen kielen perussäännöt:
    1. Ei diakriittisten merkkien translitterointia (`polskie_znaki: []`) –
       suomi käyttää tavallista latinalaista aakkostoa lisämerkein Å, Ä, Ö.
    2. Suomalainen aakkosto (29 isoa kirjainta, alkuperäisessä järjestyksessä) –
       Caesar-salakirjoituksen käyttämä.

# -----------------------------------------------------------------------------
# Ei translitteroitavia diakriittisiä merkkejä. Tyhjä lista säilyttää
# API-sopimuksen sääntöjen hallinnan kanssa.
# -----------------------------------------------------------------------------
polskie_znaki: []

# -----------------------------------------------------------------------------
# Suomalainen aakkosto – 29 isoa kirjainta alkuperäisessä järjestyksessä
# (Å, Ä, Ö lopussa), ilman välilyöntejä. Caesar-salakirjoituksen käyttämä.
# -----------------------------------------------------------------------------
alfabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ"

# -----------------------------------------------------------------------------
# Maailmankuvaston aksenttijäsentimen liipaisinsanat (13.3+).
# core_rezyser.zastosuj_akcenty_uniwersalne rakentaa tästä listasta
# säännöllisen lausekkeen, joka tunnistaa muotoja "<sana> X" tai
# "X <sana>" (esim. "islantilainen aksentti" tai "aksentti islantilainen").
# Kaikki merkinnät pieninä kirjaimina — vertailemme lower-cased kuvaukseen.
# -----------------------------------------------------------------------------
slowo_akcent:
  - "aksentti"
  - "korostus"
