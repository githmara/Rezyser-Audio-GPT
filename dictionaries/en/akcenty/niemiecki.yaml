# -----------------------------------------------------------------------------
#  GERMAN ACCENT (English source вҶ’ German TTS)
#  For synthesizers: Hedda / Stefan / Marlene (German TTS).
# -----------------------------------------------------------------------------
id: niemiecki
etykieta: "German (e.g. Hedda / Stefan / Marlene)"
opis: |
  Adapts an English script for a German speech synthesizer (Hedda / Stefan
  / Marlene). German phonology has no /w/ and reads native /v/ as /f/ вҖ”
  we steer the German TTS into the same gap so an English listener hears
  the classic German accent:
    - w   вҶ’ v        (no native /w/; "water" вҶ’ "vater" вҖ” the iconic marker)
    - v   вҶ’ f        (German "v" is /f/; "very" вҶ’ "fery", "love" вҶ’ "lofe")
    - wh  вҶ’ v        (must run BEFORE w вҶ’ v)
    - th  вҶ’ z        (no /Оё/ /Г°/; both flatten to /z/ вҖ” "this" вҶ’ "zis",
                      "think" вҶ’ "zink"; the comedic stereotype)
    - j   вҶ’ y        (German /j/ is read as English "y" вҖ” yot)
    - AuslautverhГӨrtung (final-obstruent devoicing вҖ” the iron rule of
      German phonology): b/d/g at end of word вҶ’ p/t/k
        "bag"  вҶ’ "bak"
        "good" вҶ’ "goot"
        "bed"  вҶ’ "bet"

  Things we deliberately do NOT touch:
    - R           вҖ” Hedda renders /КҒ/ uvular fricative natively
    - ch          вҖ” German has ach-laut /x/ vs ich-laut /Г§/, context-dependent
                    and impossible in a flat regex; left to TTS
    - final -er   вҖ” German /-Йҗ/ reduction; would over-modify English nouns
iso: de
kategoria: akcent
kolejnosc: 60

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: false
skleja_pojedyncze_litery: true

# --- Phonetic substitutions ---
# CRITICAL ORDERING:
#   * `v вҶ’ f` MUST run BEFORE `wh вҶ’ v` and `w вҶ’ v`. Otherwise
#     "what" вҶ’ "vat" (via whвҶ’v) вҶ’ "fat" (via vвҶ’f) вҖ” the second pass would
#     cannibalise the first. Running `v вҶ’ f` first consumes only the
#     ORIGINAL v's, leaving newly-produced v's untouched.
#   * `wh вҶ’ v` before `w вҶ’ v` (digraph rule вҖ” same convention as elsewhere).
#   * Final-obstruent devoicing at the end (regex: true).
zamiany:
  - { wzor: "th", zamiana: "z" }
  - { wzor: "Th", zamiana: "Z" }
  - { wzor: "v",  zamiana: "f" }
  - { wzor: "V",  zamiana: "F" }
  - { wzor: "wh", zamiana: "v" }
  - { wzor: "Wh", zamiana: "V" }
  - { wzor: "w",  zamiana: "v" }
  - { wzor: "W",  zamiana: "V" }
  - { wzor: "j",  zamiana: "y" }
  - { wzor: "J",  zamiana: "Y" }

  # --- AuslautverhГӨrtung вҖ” final-obstruent devoicing on Latin ---
  # `regex: true` REQUIRED because str.replace treats `\b` as a literal.
  - { wzor: 'b\b', zamiana: "p", regex: true }
  - { wzor: 'B\b', zamiana: "P", regex: true }
  - { wzor: 'd\b', zamiana: "t", regex: true }
  - { wzor: 'D\b', zamiana: "T", regex: true }
  - { wzor: 'g\b', zamiana: "k", regex: true }
  - { wzor: 'G\b', zamiana: "K", regex: true }
