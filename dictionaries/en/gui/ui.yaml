# dictionaries/en/gui/ui.yaml
#
# Plik wygenerowany automatycznie przez buduj_wielojezyczne_ui.py
# ze źródła dictionaries/pl/gui/ui.yaml
# (język bazowy PL, wersja 13.x). NIE edytuj ręcznie — zmiany
# wprowadzaj w pliku źródłowym PL i uruchom ponownie skrypt.
#
# Tłumaczone są WYŁĄCZNIE wartości; klucze, struktura, komentarze
# sekcyjne i style block-scalar (`|-`, `|`) są zachowane przez
# round-trip ruamel.yaml. Placeholdery {nazwa} i skróty \tCtrl+...
# zostały zamrożone tokenami ⟦P{i}⟧/⟦S{j}⟧ na czas tłumaczenia,
# odtworzone 1:1 po weryfikacji parzystości multisetu markerów.
# =============================================================================

