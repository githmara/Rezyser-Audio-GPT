# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Start Panel – Home Page"
  welcome_text: |-
    This is your integrated recording studio.
    Select a tool from the button bar or the Tools menu:

      •  Director       –  Write scripts and prose with AI; dynamically manage the World Book.
      •  Polyglot     –  Apply hard accents for local synthesizers (NVDA/Vocalizer) and translate texts.
      •  Converter     –  Quickly create professional Word files with level 1 headers.
      •  Rule Manager –  Browse and create dictionary rules without manually entering YAML files.
  heading_system_check: "System Check"
  checking: "Checking configuration…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Missing environment configuration file!

    First program launch detected. Modules are locked for security reasons.
    To unlock all tools, click the button below — the program will automatically generate the golden_key.env file and open it in the default text editor.
  err_odczyt: "🚨 Failed to read the golden_key.env file:\n{tresc_bledu}"
  err_struktura: |-
    🚨 File structure error!
    The required parameter OPENAI_API_KEY= is missing.
    You probably deleted the equals sign or the variable name.
    Delete the file, regenerate it, and paste the key more carefully.
  err_tekst_zastepczy: |-
    ⚠️ Key not entered!
    The golden_key.env file still contains placeholder text.
    Open the file in a text editor, remove the placeholder text, and paste your actual API key.
  err_cudzyslowy: |-
    🚨 Unnecessary quotes around the key!
    The API key was pasted in quotes (e.g., "sk-…").
    Open the file in a text editor and remove the quotation marks —
    the key must be entered directly after the '=', without any additional characters.
  err_niedozwolone_znaki: |-
    🚨 Unauthorized characters around the key!
    A space or other invisible character was detected before or after the API key.
    Open the file in a text editor and ensure the value starts
    immediately after the '=', without any spaces.
  err_format: |-
    🚨 Suspicious key format!
    A valid OpenAI key always starts with sk- (e.g., sk-proj-…).
    Make sure you copied the correct string and there are no spaces before it.
  err_zbyt_krotki: |-
    ⚠️ The key seems too short ({liczba_znakow} characters detected, at least {minimum_znakow} expected).
    You probably copied only a fragment of the key.

    If you have already closed the key window on platform.openai.com,
    you need to return to your account, use the 'Revoke secret key' option for this
    truncated key, and generate a new one. Remember to copy the key in full next time before clicking 'Done'.
  ok_klucz_wykryty: |-
    ✅ API key (golden_key.env) detected and correctly formatted.
    All modules are ready to work.
  # Przyciski akcji panelu startowego
  btn_generate: "Generate the golden_key.env file and open the text editor"
  btn_open: "📝 Open the golden_key.env file in a text editor"
  blad_tworzenia_env_tytul: "Error"
  blad_tworzenia_env_tresc: "Failed to create the golden_key.env file:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ The file {nazwa_pliku} has been generated!
    The text editor opens automatically.
    Paste your API key, save the file (Ctrl+S), and restart the application.
  blad_otwarcia_pliku_tytul: "Information"
  blad_otwarcia_pliku_tresc: "Failed to open the file automatically.\nOpen it manually:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Dictionary Tools"
  narzedzia_slownikowe_name: "Dictionary Tools Description"
  tools_info: |-
    Want to add a new accent, cipher, or Director mode?
    Open the Rule Manager (Ctrl+4) – you'll find a tree of all YAML files in dictionaries/ and a creator that will create a template or generate a prompt for the AI chatbot.

    After adding a new ACCENT, additionally click the "Refresh Director Accents from YAML" button below – this will allow the Director Mode to notice the new accent (Polyglot detects YAMLs automatically). After refreshing, restart the application.
  btn_open_manager_label: "📚 Open Rule Manager"
  btn_open_manager_name: "Open Rule Manager Button"
  btn_open_manager_tooltip: "Goes to the Rule Manager – YAML file explorer and creator of new accents/modes/ciphers (Ctrl+4)."
  btn_odswiez_label: "🔄 Refresh Director Accents from YAML"
  btn_odswiez_name: "Refresh Director Accents from YAML Button"
  btn_odswiez_tooltip: "Scans dictionaries/*/accents/ and regenerates accent_* wrappers in core_poliglota.py and core_rezyser.py. After a successful refresh, restart the application."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Accent Refresh Error"
  raport_niespodziewany_tresc: "An unexpected error occurred:\n{tresc_bledu}"
  raport_tytul_blad: "Refresh Director Accents – ERROR"
  raport_header_blad: "⛔ Generator encountered errors – see log below."
  raport_tytul_sukces: "Refresh Director Accents – Success"
  raport_header_sukces: |-
    ✅ Files for {liczba_akcentow} accents modified.
    To see the new accents in Director Mode, restart the application.
  raport_tytul_bez_zmian: "Refresh Director Accents – No Changes"
  raport_header_bez_zmian: "ℹ️ No changes. {liczba_akcentow} accents detected – wrappers are already up to date."
  raport_lbl_log: "Full log (Ctrl+A, Ctrl+C copies to clipboard):"
  raport_log_name: "Director Accent Generator Log"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Audio Director GPT Panel"
  heading: "🎬  Audio Director GPT – Hybrid Creative Studio"
  description_name: "Audio Director GPT Module Description"
  tool_description: |-
    Audio Director GPT is a hybrid creative studio.

    Brainstorm Mode  – plan the plot, generate 3 options (NO file saving).
    Script Mode        – write raw audio script with [SFX] and [Character: emotion] tags (FILE SAVING).
    Audiobook Mode     – generate dense, classic literary prose (FILE SAVING).

    Projects are saved in the 'scripts/' subfolder next to the program.
    Provide the project name WITHOUT extension (e.g., chronicles_of_arkonia).
    To change the project, you must first clear the current memory.
  prompt_architekta_content: |-
    You are an outstanding world architect (Worldbuilder) and literary consultant. I have a loose idea for a plot: [INSERT YOUR IDEA HERE]. Your task is to expand this into a professional "World Book".
    Adjust the tone and rules to my idea. Avoid cheap, fairy-tale shortcuts and AI clichés.

    FORMATTING RULES (CRITICAL):
    You must return the response in two separate parts:

    PART 1: WORLD BOOK
    This part must be enclosed in ONE Markdown code block (use ```markdown at the beginning and ``` at the end). Inside the code block, apply these rules:
    1. Start with an open book emoji and a working title, e.g., 📖 World Book: [Title].
    2. Use a single hashtag (#) for main sections (e.g., # World Rules, # Characters).
    3. Use double hashtags (##) for subsections.
    4. Use dashes (-) to create readable lists.
    5. Use double asterisks (**text**) to bold absolute, unbreakable rules (e.g., **The hero NEVER lies**).
    6. Describe character psychology, their biggest flaws, and motivations. For foreign-language characters, add information about the accent directly with the tag, e.g., `[Speaker 1: Name] - lisps and has a French accent`. **Technical Tip:** Using the keyword `accent` is absolutely required, as it allows the external application script to automatically detect and apply the correct phonetic rules to the character's dialogues.

    PART 2: MODE RECOMMENDATION
    Place this part OUTSIDE the code block, as plain text below. Advise me on which of my application's modes will be best to realize this idea: 🎬 Raw Script Mode (audio plays, SFX, phonetics), or 📖 Traditional Audiobook Mode (classic literary prose).

  # Pasek pliku
  lbl_nazwa_pliku: "Project file name (without extension, e.g., chronicles_of_arkonia):"
  txt_nazwa_pliku_name: "Project file name field"
  txt_nazwa_pliku_hint: "e.g., chronicles_of_arkonia"
  txt_nazwa_pliku_tooltip: |-
    Enter the project name WITHOUT extension.
    History file saved as: scripts/<name>.txt
    Field locked when memory is occupied.
  btn_wczytaj_label: "Load History"
  btn_wczytaj_tooltip: |-
    Loads an existing project file (scripts/<name>.txt) into memory.
    Active only when memory is empty and a name is provided.
  btn_wyczysc_biezaca_label: "Clear Current (Leave Summary)"
  btn_wyczysc_biezaca_tooltip: |-
    Clears only the current history from memory.
    Summary (Long-Term Memory) and World Book are retained.
    Use to continue a long book after generating a summary.
  btn_hard_reset_label: "Close Project (Hard Reset)"
  btn_hard_reset_tooltip: |-
    COMPLETE project clearance: history, summary, World Book.
    Resets all counters and unlocks the file name field.
    Use when changing projects or starting a completely new story.
  # Sidebar
  sidebar_heading: "📖 Project Sidebar"
  lbl_ksiega_swiata: "World Book – Rules and Characters:"
  txt_ksiega_name: "World Book Field – rules and characters"
  txt_ksiega_hint: |-
    Enter world rules, character descriptions, and their phonetic accents…
    E.g., [Geralt: Icelandic accent]
    Content is included in every AI query.
  txt_ksiega_tooltip: |-
    Context constantly added to AI: world rules, characters, phonetic accents.
    Saving to disk requires providing the project file name.
  btn_zapisz_ksiege_label: "💾 Save the Book Permanently"
  btn_zapisz_ksiege_tooltip: |-
    Saves the World Book to a file: scripts/<name>.md
    Requires providing the project file name.
  btn_prompt_architekta_label: "📖 Architect's Prompt for AI…"
  btn_prompt_architekta_name: "Show Architect's Prompt for external chatbot button"
  btn_prompt_architekta_tooltip: |-
    Opens a window with a ready prompt for an external chatbot (ChatGPT, Claude).
    Paste your plot idea, and AI will generate a professional World Book formatted in Markdown – to paste into the "World Book" field above.
  lbl_pamiec_dlugotrwala: "🧠 Long-Term Memory (Summary):"
  txt_pamiec_name: "Long-Term Memory Field – event summary"
  txt_pamiec_hint: |-
    Here AI will save the summary when memory overflows.
    You can also edit it manually.
  txt_pamiec_tooltip: |-
    Summary of previous events added to every AI query.
    Allows continuing the story without model context window limitations.
  btn_zapisz_pamiec_label: "💾 Save Summary"
  btn_zapisz_pamiec_tooltip: |-
    Saves the summary to a file: scripts/<name>_summary.txt
    After saving, you can safely clear the current memory.
  # Obszar roboczy
  main_heading: "🎬 Workspace"
  rb_tryb_label: "Work Mode:"
  rb_tryb_name: "AI Work Mode Selection"
  rb_tryb_tooltip: |-
    Brainstorm – planning without file saving.
    Script        – raw audio script (saved to file).
    Audiobook     – traditional literary prose (saved to file).
  # 13.2: komunikaty fallbacku reżysera (gdy brak reguł dla języka UI ani EN)
  brak_trybow_dla_jezyka: |-
    No AI director modes or English fallback found for language "{jezyk}"
    (dictionaries/en/rezyser/). Add a YAML file with the mode
    to the language rule folder or restore the default English package.
  brak_trybow_tytul: "No Director Modes"
  placeholder_brak_trybow: "(no modes to choose from)"
  # Panel struktury
  struktura_heading: "✂️ Structure Management"
  btn_prolog_label: "📜 Insert Prologue"
  btn_prolog_name: "Insert Prologue Button"
  btn_prolog_tooltip: |-
    Inserts the 'Prologue' header at the very beginning of the story.
    Possible only when the story is empty. Requires project name.
  btn_epilog_label: "🏁 Insert Epilogue"
  btn_epilog_name: "Insert Epilogue Button"
  btn_epilog_tooltip: |-
    Inserts the 'Epilogue' header at the end of the story.
    Blocks further content writing after the Epilogue.
  btn_rozdzial_label: "✂️ Insert Cut (Chapter {numer_rozdzialu})"
  btn_rozdzial_name: "Insert Chapter Button"
  btn_rozdzial_tooltip: |-
    Inserts the next chapter header into the story and file.
    Available only in Audiobook mode.
  btn_akt_label: "🎭 Insert Act {numer_aktu}"
  btn_akt_name: "Insert Act Button"
  btn_akt_tooltip: |-
    Inserts the 'Act N' header and automatically 'Scene 1' into the story and file.
    Available only in Script mode.
  btn_scena_label: "🎬 Insert Scene {numer_sceny}"
  btn_scena_name: "Insert Scene Button"
  btn_scena_tooltip: |-
    Inserts the next scene header into the story and file.
    Available only in Script mode.
  naglowek_prolog: "Prologue"
  naglowek_epilog: "Epilogue"
  naglowek_rozdzial: "Chapter"
  naglowek_akt: "Act"
  naglowek_scena: "Scene"
  # Podgląd historii
  lbl_podglad_historii: "Current story in memory (read-only – navigate with arrows):"
  txt_podglad_name: "Preview full history in memory – read-only"
  txt_podglad_hint: "(memory is empty – load a project or start a new one)"
  # Pole instrukcji
  lbl_instrukcje: |-
    Instructions for the next fragment (type 'summary' to force save to Long-Term Memory):
  txt_instrukcje_name: "Instruction field for AI – former user_input"
  txt_instrukcje_hint: |-
    Provide instructions for the next fragment of the story…
    (e.g., 'Describe Geralt's meeting with the witch in the forest. High tension.')
  btn_wyslij_label: "Send to AI"
  btn_wyslij_tooltip: |-
    Sends instructions to the gpt-4o model and appends the response to the story.
    Requires an active API key and a completed World Book.
  # Postprodukcja
  postprod_heading: "🎛️ Postproduction"
  postprod_info: |-
    The module iterates over chapters from the saved file and assigns them a short literary title (AI analysis).
  btn_tytuly_ai_label: "📜 Assign Chapter Titles (AI)"
  btn_tytuly_ai_name: "Assign Chapter Titles AI Button"
  btn_tytuly_ai_tooltip: |-
    Iterates over chapters from the saved file and assigns them titles (gpt-4o-mini).
    Requires a saved project file and an active API key.
  # Pamięć modelu
  lbl_pamiec_modelu: "🧠 Model Memory (Context Window State):"
  lbl_pamiec_modelu_start: "🟢 Memory clear. Machine ready for a new story."
  pamiec_modelu_status_name: "AI model memory status"
  # Komunikaty - wczytywanie
  brak_nazwy_tytul: "No name"
  brak_nazwy_tresc: "Provide the project file name before loading."
  plik_nie_istnieje_tytul: "File does not exist"
  plik_nie_istnieje_tresc: |-
    File not found:
    {tresc_bledu}

    If you're starting a new story — just start typing.
    The file will be created automatically on the first send to AI.
  blad_odczytu_tresc: "File read error:\n{tresc_bledu}"
  status_wczytano_tytul: "Project loaded"
  status_wczytano_ksiega: " Also loaded Book: scripts/{nazwa_projektu}.md."
  status_wczytano_streszczenie: |-
    Project summary '{nazwa_projektu}' loaded.{lore_info}
    Current memory remains empty (Infinite Memory mode).
    You can continue the story — AI operates on the summary.
  status_wczytano_historia: "Story '{nazwa_projektu}' loaded ({liczba_znakow} characters).{lore_info}"
  # Komunikaty - czyszczenie
  pamiec_wyczyszczona_tytul: "Memory cleared"
  pamiec_wyczyszczona_tresc: "Current memory cleared."
  pamiec_wyczyszczona_streszczenie_zostaje: "\nSummary in Long-Term Memory has been preserved."
  hard_reset_pytanie_tytul: "Close Project – Hard Reset"
  hard_reset_pytanie: |-
    Are you sure you want to close the project?

    The following will be cleared:
      • current story
      • summary (Long-Term Memory)
      • World Book
      • all counters (chapters, acts, scenes)

    Files on disk will NOT be deleted.
  hard_reset_ok_tytul: "Project closed"
  hard_reset_ok_tresc: "Project closed. All data in memory has been cleared."
  # Zapis Księgi
  brak_nazwy_ksiega_tytul: "No file name"
  brak_nazwy_ksiega_tresc: "Provide the project file name in the name field first."
  ksiega_pusta_tytul: "Empty World Book"
  ksiega_pusta_tresc: "World Book is empty. Nothing to save."
  ksiega_zapisana_tytul: "Book saved"
  ksiega_zapisana_tresc: "World Book saved: scripts/{nazwa_projektu}.md"
  blad_zapisu_ksiegi: "World Book save error:\n{tresc_bledu}"
  # Prompt Architekta dialog
  prompt_arch_dlg_tytul: "Architect's Prompt – paste into an external chatbot"
  prompt_arch_instrukcja: |-
    Paste this ready prompt into an external chatbot (e.g., free ChatGPT or Claude) and replace the text "[INSERT YOUR IDEA HERE]" with your own story seed.

    AI will return a ready World Book in a Markdown code block — copy its content (without surrounding ``` markers) and paste it into the "World Book" field above, then click "Save Book Permanently".
  prompt_arch_instrukcja_name: "Instructions for using the Architect's Prompt"
  prompt_arch_lbl: "Prompt to copy (Ctrl+A, Ctrl+C):"
  prompt_arch_tresc_name: "Full content of the Architect's Prompt"
  prompt_arch_btn_kopiuj: "📋  Copy prompt to clipboard"
