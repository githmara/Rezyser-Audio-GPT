# -----------------------------------------------------------------------------
#  RÚSSNESKUR HREIMUR (íslenska → rússneskur TTS)
#  Fyrir talgervla: Milena / Irina / Yuri / Pavel (rússneskur TTS).
# -----------------------------------------------------------------------------
id: rosyjski
etykieta: "Rússland (t.d. Milena / Irina / Yuri / Pavel)"
opis: |
  Þýðir íslenskan texta yfir á kýrilískt letur þannig að rússneskur talgervill
  (NVDA → Vocalizer Milena, eSpeak "ru", OneCore Irina/Pavel/Yuri) les
  íslenskan texta með rússneskum hreim.

  Séríslenskar sérhljóðar:
    - á  → а   (beint)
    - é  → э   (hart e — palataliserar ekki)
    - í  → и
    - ó  → о
    - ú  → у
    - ý  → и   (íslenskt ý = /iː/ → rússneskt и = /i/)
    - æ  → ай  (íslenskt /ai/ → rússneskur /aj/ ✓)
    - ö  → ё   (/ø/ → /ʲo/, líkt og finnska → rússneskt)

  Séríslenskar samhljóðar:
    - Þ/þ → с   (/θ/ → Rússar nota /s/ sem nálgun)
    - Ð/ð → д   (/ð/ → /d/)
    - h   → х   (rússneskt /x/ sterkara en íslenskt /h/ — hreimáhrif)

  Staðlaðar latneskur → kýrillískt: sömu reglur og finnska.
  j + sérhljóð (ja/je/jo/ju) → jótaðar rúnar ÁÐUR EN j → й-reglan.
iso: ru
kategoria: akcent
kolejnosc: 45

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
# Séríslenskir stafir eru skráðir handvirkt í zamiany — EKKI sjálfvirkt.
usun_polskie_znaki: false
# Tengsl staka latneskra stafa virka ekki eftir kýrillíska þýðingu.
skleja_pojedyncze_litery: false

# -----------------------------------------------------------------------------
# KRITIKAL RÖÐUN SKIPTA:
#   1. Séríslenskir stafir (Þ/þ, Ð/ð, Æ/æ, Á/á, É/é, Í/í, Ó/ó, Ú/ú, Ý/ý, Ö/ö)
#      ÁÐUR EN venjulegar latneskur → kýrillískt (til að koma í veg fyrir
#      tvöfaldar skiptingar).
#   2. j + aðalsérhljóðar (ja/je/jo/ju) ÁÐUR EN j → й.
#   3. j → й (eftir j+sérhljóð-reglur).
#   4. Einstaka sérhljóðar → kýrillískt.
#   5. Samhljóðar → kýrillískt (h → х skapar hreiminn).
# -----------------------------------------------------------------------------
zamiany:
  # --- 1a. Séríslenskt tvíhljóð: Æ/æ → ай ---
  - { wzor: "Æ",  zamiana: "Ай"  }
  - { wzor: "æ",  zamiana: "ай"  }

  # --- 1b. Séríslenskir samhljóðar ---
  - { wzor: "Þ",  zamiana: "С"   }
  - { wzor: "þ",  zamiana: "с"   }
  - { wzor: "Ð",  zamiana: "Д"   }
  - { wzor: "ð",  zamiana: "д"   }

  # --- 1c. Séríslenskir sérhljóðar → kýrillískt ---
  - { wzor: "Á",  zamiana: "А"   }
  - { wzor: "á",  zamiana: "а"   }
  - { wzor: "É",  zamiana: "Э"   }
  - { wzor: "é",  zamiana: "э"   }
  - { wzor: "Í",  zamiana: "И"   }
  - { wzor: "í",  zamiana: "и"   }
  - { wzor: "Ó",  zamiana: "О"   }
  - { wzor: "ó",  zamiana: "о"   }
  - { wzor: "Ú",  zamiana: "У"   }
  - { wzor: "ú",  zamiana: "у"   }
  - { wzor: "Ý",  zamiana: "И"   }
  - { wzor: "ý",  zamiana: "и"   }
  - { wzor: "Ö",  zamiana: "Ё"   }
  - { wzor: "ö",  zamiana: "ё"   }

  # --- 2. j + aðalsérhljóðar (jótaðar rúnar) ---
  - { wzor: "ja", zamiana: "я"   }
  - { wzor: "Ja", zamiana: "Я"   }
  - { wzor: "JA", zamiana: "Я"   }
  - { wzor: "je", zamiana: "е"   }
  - { wzor: "Je", zamiana: "Е"   }
  - { wzor: "JE", zamiana: "Е"   }
  - { wzor: "jo", zamiana: "ё"   }
  - { wzor: "Jo", zamiana: "Ё"   }
  - { wzor: "JO", zamiana: "Ё"   }
  - { wzor: "ju", zamiana: "ю"   }
  - { wzor: "Ju", zamiana: "Ю"   }
  - { wzor: "JU", zamiana: "Ю"   }

  # --- 3. Eftirstandandi j → й ---
  - { wzor: "j",  zamiana: "й"   }
  - { wzor: "J",  zamiana: "Й"   }

  # --- 4. Einstaka sérhljóðar → kýrillískt ---
  - { wzor: "a",  zamiana: "а"   }
  - { wzor: "A",  zamiana: "А"   }
  - { wzor: "e",  zamiana: "э"   }
