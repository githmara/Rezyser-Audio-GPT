id: naprawiacz_tagow
etykieta: "🔧 Merkjaviðgerð (Aðeins ISO-kóðainnskráning)"
opis: |
  Þessi „hreimur" breytir EKKI textainnihaldinu eða hljóðfræðinni.
  Hann sprautar aðeins ISO-kóða tungumáls inn í úttaksskrána:
    - HTML: lang="..." attribútan á <html>-merkinu
    - DOCX: <w:lang w:val="..."/> á sérhverju textariti
  Þannig skiptir skjálesarinn (NVDA/JAWS) rétt yfir á rétta
  talgervilsröddina.

  ISO-kóðinn er settur inn handvirkt í GUI ("ISO-kóði"-reit), ekki
  úr þessari skrá — þess vegna er gildið `iso` autt hér.
iso: ""
