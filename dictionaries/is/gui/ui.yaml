  instalacja_tresc: |-
    Niðurhal lokið. Uppsetningarforritið ræsist.
    Forritið verður lokað.
  blad_pobierania_tytul:    "Villa við niðurhal"
  blad_pobierania_tresc:    "Tókst ekki að hlaða niður uppfærslunni:\n{tresc_bledu}"
  blad_uruchomienia_tytul:  "Villa við ræsingu uppsetningar"
  blad_uruchomienia_tresc:  "Tókst ekki að ræsa uppsetningarforritið:\n{sciezka_pliku}\n\n{tresc_bledu}"
