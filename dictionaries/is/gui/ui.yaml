# -----------------------------------------------------------------------------
# MANAGER – panel Managera Reguł (gui_manager_regul.py)
# -----------------------------------------------------------------------------
manager:
  panel_name: "Reglustjóraspjald – orðabóka könnuður"
  desc: |-
    Reglustjóri gerir þér kleift að skoða og breyta YAML skrám í dictionaries/ möppunni án þess að fara inn í skráarkönnuð kerfisins. Veldu skrá í trénu til vinstri og notaðu síðan hnappana til hægri: opnaðu í textaritli, búðu til nýja skrá, afritaðu eða eyða.

    Fyrir erfiðari verkefni (nýtt tungumál, hreimur erlends framburðar, reiknirit dulmál) mun Reglustjóri búa til prompt fyrir AI spjallmenni – bara límdu það í ChatGPT eða Claude og vistaðu svarið.
  desc_name: "Lýsing á Reglustjóra"
  # Drzewo
  tree_name: "Skráatré dictionaries"
  tree_tooltip: |-
    Tré allra YAML skráa í dictionaries/ möppunni. Stækkaðu tungumál, síðan flokk, og veldu síðan skrá. Örvar og Enter virka venjulega fyrir NVDA.
  tree_root: "Orðabækur (dictionaries/)"
  tree_brak_folderu: "⚠️  Engin dictionaries/ mappa – búðu til fyrsta tungumálið með „Ný skrá reglur…\" hnappinum."
  tree_jezyk: "🌐  {kod_jezyka}  ({nazwa_jezyka})"
  tree_podstawy: "📄  grunnur.yaml  (diakritísk merki + stafróf)"
  tree_kategoria: "{etykieta}  [{liczba_plikow}]"
  tree_plik: "📄  {nazwa_pliku}"
  # Etykiety kategorii drzewa
  kategorie:
    akcenty: "Hreimar (framburður fyrir TTS)  🎙️"
    szyfry: "Dulmál (textaleikir)  🔐"
    rezyser: "Leikstjóri (stillingar og eftirvinnsla)  🎬"
    gui: "Notendaviðmótsþýðingar  🌐"
  # Przyciski akcji
  btn_otworz_label: "📝  &Opna í textaritli"
  btn_otworz_name: "Hnappur Opna valda skrá í textaritli"
  btn_otworz_tooltip: "Opnar valda YAML skrá í sjálfgefnum textaritli kerfisins (Notepad á Windows, TextEdit á macOS)."
  btn_nowy_label: "➕  &Ný skrá reglur…"
  btn_nowy_name: "Hnappur Búa til nýja skrá reglur"
  btn_nowy_tooltip: "Opnar töframann fyrir nýja skrá: þú velur tegund (hreimur, dulmál, Leikstjóri stilling, grunn tungumál), Reglustjóri býr til sniðmát eða býr til prompt fyrir AI."
  btn_duplikuj_label: "📋  &Afrita valda skrá"
  btn_duplikuj_name: "Hnappur Afrita valda skrá"
  btn_duplikuj_tooltip: "Býr til afrit af valinni YAML skrá undir nýju nafni – fljótleg byrjun fyrir afbrigði af núverandi reglu."
  btn_usun_label: "🗑️  &Eyða valda skrá"
  btn_usun_name: "Hnappur Eyða valda skrá"
  btn_usun_tooltip: "Eyðir valinni YAML skrá af diski (með staðfestingu). Aðgerð er óafturkræf – hugsaðu þig tvisvar um."
  btn_odswiez_label: "🔄  &Endurnýja tré"
  btn_odswiez_name: "Hnappur Endurnýja skráatré"
  btn_odswiez_tooltip: "Endurhleður tré af diski – notaðu ef þú breyttir skrám handvirkt í könnuð eða eftir að hafa vistað í textaritli."
  info_stopka: |-
    Eftir að hafa búið til nýjan hreim, farðu aftur á Heimssíðuna
    og smelltu á „Endurnýja hreima Leikstjóra úr YAML".
  # Otwarcie w edytorze
  plik_wne_tytul: "Ekki hægt að opna skrá"
