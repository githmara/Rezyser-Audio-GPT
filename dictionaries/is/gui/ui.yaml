manager:
  panel_name: "Reglustjóra spjaldið – orðabóka könnuður"
  desc: |-
    Reglustjóri leyfir að skoða og breyta YAML skrám í dictionaries/ möppunni án þess að fara inn í skráarkönnuð kerfisins. Veldu skrá í trénu til vinstri og notaðu síðan hnappana til hægri: opna í textaritli, búa til nýja skrá, afrita eða eyða.

    Fyrir erfiðari verkefni (nýtt tungumál, framandi hljóðfræði, dulmál) mun Reglustjóri búa til prompt fyrir AI spjallmenni – bara límdu það í ChatGPT eða Claude og vistaðu svarið.
