# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Upphafsskjár – Heimasíða"
  welcome_text: |-
    Þetta er samþætt upptökustúdíó þitt.
    Veldu verkfæri úr hnappastikunni eða úr Verkfæramenni:

      •  Leikstjóri       –  Skrifa handrit og prósa með AI; stjórna Księga Świata á dýnamískan hátt.
      •  Tungumálamaður  –  Setja á hörð framburð fyrir staðbundna talgervla (NVDA/Vocalizer) og þýða texta.
      •  Breytingartæki  –  Fljótt búa til faglegar Word skrár með fyrirsögnum á stigi 1.
      •  Reglustjóri     –  Skoða og búa til orðabókarreglur án þess að fara handvirkt í YAML skrár.
  heading_system_check: "Kerfisathugun"
  checking: "Athugar stillingar…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Engin umhverfisstillingaskrá!

    Fyrsta gangsetning forrits greind. Einingar eru læstar af öryggisástæðum.
    Til að opna öll verkfæri, smelltu á hnappinn hér að neðan — forritið mun sjálfkrafa búa til skrána golden_key.env og opna hana í sjálfgefnum textaritli.
  err_odczyt: "🚨 Ekki tókst að lesa skrána golden_key.env:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Skjalauppbyggingarvilla!
    Vantar nauðsynlegt breytu OPENAI_API_KEY=.
    Þú hefur líklega eytt jafnaðarmerki eða breytunafni.
    Eyða skránni, búa hana til aftur og líma lykilinn varlega.
  err_tekst_zastepczy: |-
    ⚠️ Lykill ekki sleginn inn!
    Í skránni golden_key.env er enn staðgengilstexti.
    Opnaðu skrána í textaritli, fjarlægðu staðgengilstextann og límdu inn raunverulegan API lykil þinn.
  err_cudzyslowy: |-
    🚨 Óþarfa gæsalappir um lykilinn!
    API lykillinn var límdur í gæsalöppum (t.d. "sk-…").
    Opnaðu skrána í textaritli og fjarlægðu gæsalappirnar —
    lykilinn verður að vera skrifaður beint eftir '=', án nokkurra auka tákna.
  err_niedozwolone_znaki: |-
    🚨 Óleyfileg tákn um lykilinn!
    Bil eða annað ósýnilegt tákn fannst fyrir eða eftir API lykilinn.
    Opnaðu skrána í textaritli og vertu viss um að gildið byrji
    strax eftir '=', án nokkurra bila.
  err_format: |-
    🚨 Grunsamlegt lykilsnið!
    Réttur OpenAI lykill byrjar alltaf á sk- (t.d. sk-proj-…).
    Gakktu úr skugga um að þú hafir afritað réttan streng og að engin bil séu fyrir framan hann.
  err_zbyt_krotki: |-
    ⚠️ Lykillinn virðist of stuttur ({liczba_znakow} tákn fundust, búist var við að minnsta kosti {minimum_znakow}).
    Þú hefur líklega aðeins afritað hluta lykilsins.

    Ef þú hefur þegar lokað glugganum með lykilnum á platform.openai.com,
    þarftu að fara aftur á reikninginn, nota 'Revoke secret key' valkostinn fyrir þennan
    skerta lykil og búa til nýjan. Mundu að afrita lykilinn í heild sinni næst áður en þú smellir á 'Done'.
  ok_klucz_wykryty: |-
    ✅ API lykill (golden_key.env) fannst og er rétt sniðinn.
    Allar einingar eru tilbúnar til notkunar.
  # Przyciski akcji panelu startowego
  btn_generate: "Búa til skrána golden_key.env og opna textaritil"
  btn_open: "📝 Opna skrána golden_key.env í textaritli"
  blad_tworzenia_env_tytul: "Villa"
  blad_tworzenia_env_tresc: "Ekki tókst að búa til skrána golden_key.env:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Skráin {nazwa_pliku} hefur verið búin til!
    Textaritill opnast sjálfkrafa.
    Límdu inn API lykilinn þinn, vistaðu skrána (Ctrl+S) og keyrðu forritið aftur.
  blad_otwarcia_pliku_tytul: "Upplýsingar"
  blad_otwarcia_pliku_tresc: "Ekki tókst að opna skrána sjálfkrafa.\nOpnaðu hana handvirkt:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Orðabókarverkfæri"
  narzedzia_slownikowe_name: "Lýsing á orðabókarverkfærum"
  tools_info: |-
    Viltu bæta við nýjum framburði, dulmáli eða Leikstjórnarstillingu?
    Opnaðu Reglustjóra (Ctrl+4) – þar finnur þú tré allra YAML skráa í dictionaries/ og skapalón sem býr til skapalón eða býr til ábendingu fyrir spjallmenni AI.

    Eftir að hafa bætt við nýjum FRAMBURÐI, smelltu á hnappinn „Endurnýja framburði Leikstjóra úr YAML" hér að neðan – þetta gerir Leikstjórnarstillingu kleift að taka eftir nýjum framburði (Tungumálamaður greinir YAML skrár sjálfkrafa). Eftir endurnýjun skaltu keyra forritið aftur.
  btn_open_manager_label: "📚 Opna Reglustjóra"
  btn_open_manager_name: "Hnappur Opna Reglustjóra"
  btn_open_manager_tooltip: "Fara í Reglustjóra – skoða YAML skrár og búa til nýja framburði / stillingar / dulmál (Ctrl+4)."
  btn_odswiez_label: "🔄 Endurnýja framburði Leikstjóra úr YAML"
  btn_odswiez_name: "Hnappur Endurnýja framburði Leikstjóra úr YAML"
  btn_odswiez_tooltip: "Skannar dictionaries/*/framburðir/ og endurgerir framburðarskálar í core_poliglota.py og core_rezyser.py. Eftir vel heppnaða endurnýjun þarf að keyra forritið aftur."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Villa við endurnýjun framburða"
  raport_niespodziewany_tresc: "Óvænt villa kom upp:\n{tresc_bledu}"
  raport_tytul_blad: "Endurnýja framburði Leikstjóra – VILLA"
  raport_header_blad: "⛔ Villa kom upp í framleiðanda – sjá log hér að neðan."
  raport_tytul_sukces: "Endurnýja framburði Leikstjóra – Árangur"
  raport_header_sukces: |-
    ✅ Skrár fyrir {liczba_akcentow} framburði hafa verið breyttar.
    Til að nýir framburðir birtist í Leikstjórnarstillingu, keyrðu forritið aftur.
  raport_tytul_bez_zmian: "Endurnýja framburði Leikstjóra – Engar breytingar"
  raport_header_bez_zmian: "ℹ️ Engar breytingar. {liczba_akcentow} framburðir fundust – skálar eru nú þegar uppfærðar."
  raport_lbl_log: "Heill log (Ctrl+A, Ctrl+C afritar í klippiborð):"
  raport_log_name: "Log af framburðarframleiðanda Leikstjóra"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Hljóðstjórnarspjald GPT"
  heading: "🎬  Hljóðstjóri GPT – Blönduð Skapandi Stúdíó"
  description_name: "Lýsing á Hljóðstjórnarstillingu GPT"
  tool_description: |-
    Hljóðstjóri GPT er blandað skapandi stúdíó.

    Hugstormunarstilling  – skipuleggja söguþráð, búa til 3 valkosti (ENGIN skráarskráning).
    Handritsstilling       – skrifa hrátt hljóðhandrit með merkjum [SFX] og [Persóna: tilfinning] (SKRÁARSKRÁNING).
    Hljóðbókarstilling     – búa til þétt, klassískt bókmenntaprósa (SKRÁARSKRÁNING).

    Verkefni eru vistuð í undirmöppu 'skrypty/' við hlið forritsins.
    Sláðu inn nafn verkefnis án viðbótar (t.d. kroniki_arkonii).
    Til að breyta verkefni þarftu fyrst að hreinsa núverandi minni.
  prompt_architekta_content: |-
    Þú ert framúrskarandi heimabyggingameistari (Worldbuilder) og bókmenntaráðgjafi. Ég hef lauslega hugmynd um söguþráð: [SETTU HUGMYND ÞÍNA HÉR]. Verkefni þitt er að þróa þetta í faglega „Księga Świata".
    Aðlagaðu tón og reglur að hugmynd minni. Forðastu ódýrar, ævintýralegar styttingar og klisjur AI.

    FORMATREGLUR (MIKILVÆGAR):
    Þú verður að skila svari í tveimur aðskildum hlutum:

    HLUTI 1: KSIĘGA ŚWIATA
    Þennan hluta verður þú að loka í EINUM Markdown kóðablokk (notaðu merkin ```markdown í upphafi og ``` í lokin). Innan kóðablokkarins skaltu fylgja þessum reglum:
    1. Byrjaðu á opnu bókar emoji og vinnutitli, t.d. 📖 Księga Świata: [Titill].
    2. Notaðu einn hashtag (#) fyrir aðalhluta (t.d. # Heimreglur, # Persónur).
    3. Notaðu tvöfalt hashtag (##) fyrir undirhluta.
    4. Notaðu bandstrik (-) til að búa til læsilegar lista.
    5. Notaðu tvöfaldar stjörnur (**texti**) til að feitletra algjörlega óhagganlegar reglur (t.d. **Hetjan LÝGUR ALDREI**).
    6. Lýstu sálfræði persóna, stærstu göllum þeirra og hvötum. Fyrir erlendar persónur, bættu við upplýsingum um framburð beint við merkið, t.d. `[Speaker 1: Nafn] - seplar og hefur franskan framburð`. **Tæknileg ábending:** Notkun lykilorðsins `framburður` er algjörlega nauðsynleg, þar sem ytri skrift forritsins greinir og setur sjálfkrafa réttar hljóðreglur á samtöl viðkomandi persónu.

    HLUTI 2: TILLAGA UM STÖÐU
    Þennan hluta skaltu setja UTAN kóðablokkar, sem venjulegan texta fyrir neðan. Ráðleggðu mér hvaða stilling forritsins míns verður best til að framkvæma þessa hugmynd: 🎬 Hrá Handritsstilling (hljóðleikir, SFX, framburður), eða 📖 Hefðbundin Hljóðbókarstilling (klassísk bókmenntaprósa).

  # Pasek pliku
  lbl_nazwa_pliku: "Skráarnafn verkefnis (án viðbótar, t.d. kroniki_arkonii):"
  txt_nazwa_pliku_name: "Verkefnisskráarnafnareitur"
  txt_nazwa_pliku_hint: "t.d. kroniki_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Sláðu inn nafn verkefnis án viðbótar.
    Söguskrá vistuð sem: skrypty/<nafn>.txt
    Reitur læstur þegar minni er upptekið.
  btn_wczytaj_label: "Hlaða sögu"
  btn_wczytaj_tooltip: |-
    Hleður inn núverandi verkefnisskrá (skrypty/<nafn>.txt) í minni.
    Virkur aðeins þegar minni er tómt og nafn er gefið.
  btn_wyczysc_biezaca_label: "Hreinsa núverandi (skilja eftir Samantekt)"
  btn_wyczysc_biezaca_tooltip: |-
    Hreinsar aðeins núverandi sögu úr minni.
    Samantekt (Langtímaminni) og Księga Świata eru varðveitt.
    Notaðu til að halda áfram með langa bók eftir að samantekt hefur verið búin til.
  btn_hard_reset_label: "Loka Verkefni (Harður Endurstilling)"
  btn_hard_reset_tooltip: |-
    ALGJÖR hreinsun verkefnis: saga, samantekt, Księga Świata.
    Núllstillir alla teljara og opnar skráarnafnareit.
    Notaðu við breytingu á verkefni eða alveg nýja sögu.
  # Sidebar
  sidebar_heading: "📖 Verkefnis Hliðarstika"
  lbl_ksiega_swiata: "Księga Świata – Reglur og Persónur:"
  txt_ksiega_name: "Księga Świata reitur – reglur og persónur"
  txt_ksiega_hint: |-
    Sláðu inn reglur heimsins, lýsingu á persónum og framburði þeirra…
    T.d. [Geralt: framburður íslenskur]
    Innihald er bætt við hverja AI fyrirspurn.
  txt_ksiega_tooltip: |-
    Samhengi stöðugt bætt við AI: reglur heimsins, persónur, framburðir.
    Skráning á disk krefst skráarnafns verkefnis.
  btn_zapisz_ksiege_label: "💾 Vista Księga varanlega"
  btn_zapisz_ksiege_tooltip: |-
    Vista Księga Świata í skrá: skrypty/<nafn>.md
    Krefst skráarnafns verkefnis.
  btn_prompt_architekta_label: "📖 Ábending Arkitekts fyrir AI…"
  btn_prompt_architekta_name: "Hnappur Sýna Ábendingu Arkitekts fyrir ytri spjallmenni"
  btn_prompt_architekta_tooltip: |-
    Opnar glugga með tilbúinni ábendingu fyrir ytri spjallmenni (ChatGPT, Claude).
    Límdu inn hugmynd þína um söguþráð, og AI mun búa til faglega Księga Świata sniðna í Markdown – til að líma í reitinn „Księga Świata" hér að ofan.
  lbl_pamiec_dlugotrwala: "🧠 Langtímaminni (Samantekt):"
  txt_pamiec_name: "Langtímaminni reitur – samantekt atburða"
  txt_pamiec_hint: |-
    Hér mun AI vista samantekt þegar minni er fullt.
    Þú getur líka breytt því handvirkt.
  txt_pamiec_tooltip: |-
    Samantekt fyrri atburða bætt við hverja AI fyrirspurn.
    Leyfir að halda áfram með söguna án takmarkana á samhengi glugga líkansins.
  btn_zapisz_pamiec_label: "💾 Vista Samantekt"
  btn_zapisz_pamiec_tooltip: |-
    Vista samantekt í skrá: skrypty/<nafn>_samantekt.txt
    Eftir vistun geturðu örugglega hreinsað núverandi minni.
  # Obszar roboczy
  main_heading: "🎬 Vinnusvæði"
  rb_tryb_label: "Vinnustilling:"
  rb_tryb_name: "Velja vinnustillingu AI"
  rb_tryb_tooltip: |-
    Hugstormun – skipuleggja án skráarskráningar.
    Handrit        – hrátt hljóðhandrit (vistað í skrá).
    Hljóðbók       – hefðbundin bókmenntaprósa (vistað í skrá).
  # Panel struktury
  struktura_heading: "✂️ Stjórnun Uppbyggingar"
  btn_prolog_label: "📜 Setja inn Formála"
  btn_prolog_name: "Hnappur Setja inn Formála"
  btn_prolog_tooltip: |-
    Setur inn fyrirsögn 'Formáli' í upphafi sögunnar.
    Mögulegt aðeins þegar saga er tóm. Krefst verkefnisnafns.
  btn_epilog_label: "🏁 Setja inn Eftirorð"
  btn_epilog_name: "Hnappur Setja inn Eftirorð"
  btn_epilog_tooltip: |-
    Setur inn fyrirsögn 'Eftirorð' í lok sögunnar.
    Læsir frekari skrifum eftir Eftirorð.
  btn_rozdzial_label: "✂️ Setja inn skurð (Kafli {numer_rozdzialu})"
  btn_rozdzial_name: "Hnappur Setja inn Kafla"
  btn_rozdzial_tooltip: |-
    Setur inn fyrirsögn næsta kafla í söguna og skrána.
    Aðeins í boði í Hljóðbókarstillingu.
  btn_akt_label: "🎭 Setja inn Þátt {numer_aktu}"
  btn_akt_name: "Hnappur Setja inn Þátt"
  btn_akt_tooltip: |-
    Setur inn fyrirsögn 'Þáttur N' og sjálfkrafa 'Atriði 1' í söguna og skrána.
    Aðeins í boði í Handritsstillingu.
  btn_scena_label: "🎬 Setja inn Atriði {numer_sceny}"
  btn_scena_name: "Hnappur Setja inn Atriði"
  btn_scena_tooltip: |-
    Setur inn fyrirsögn næsta atriðis í söguna og skrána.
    Aðeins í boði í Handritsstillingu.
  naglowek_prolog:   "Formáli"
  naglowek_epilog:   "Eftirorð"
  naglowek_rozdzial: "Kafli"
  naglowek_akt:      "Þáttur"
  naglowek_scena:    "Atriði"
