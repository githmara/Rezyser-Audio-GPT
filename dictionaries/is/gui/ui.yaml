# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Upphafsspjald – Heimasíða"
  welcome_text: |-
    Þetta er samþætt upptökustúdíó þitt.
    Veldu verkfæri úr hnappastikunni eða úr Verkfæri valmyndinni:

      •  Leikstjóri       –  Skrifaðu handrit og prósa með AI; stjórnaðu Księga Świata á dýnamískan hátt.
      •  Tungumálamaður     –  Settu á hörð áherslur fyrir staðbundna talgervla (NVDA/Vocalizer) og þýddu texta.
      •  Breytingartæki     –  Búðu fljótt til faglegar Word skrár með fyrirsögnum á stigi 1.
      •  Reglustjóri –  Skoðaðu og búðu til orðabókarreglur án þess að fara handvirkt í YAML skrár.
  heading_system_check: "Kerfisathugun"
  checking: "Athugar stillingar…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Engin umhverfisstillingaskrá!

    Fyrsta gangsetning forrits greind. Einingar eru læstar af öryggisástæðum.
    Til að opna öll verkfæri, smelltu á hnappinn hér að neðan — forritið mun sjálfkrafa búa til skrána golden_key.env og opna hana í sjálfgefnum textaritli.
  err_odczyt: "🚨 Ekki tókst að lesa skrána golden_key.env:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Skjalauppbyggingarvilla!
    Vantar nauðsynlegt breytu OPENAI_API_KEY=.
    Þú hefur líklega eytt jafnaðarmerki eða breytunafni.
    Fjarlægðu skrána, búa til hana aftur og límdu lykilinn varlega.
  err_tekst_zastepczy: |-
    ⚠️ Lykill hefur ekki verið sleginn inn!
    Í skrá golden_key.env er enn staðgengilstexti.
    Opnaðu skrána í textaritli, fjarlægðu staðgengilstextann og límdu inn raunverulegan API lykil þinn.
  err_cudzyslowy: |-
    🚨 Óþarfa gæsalappir um lykilinn!
    API lykillinn var límdur í gæsalöppum (t.d. "sk-…").
    Opnaðu skrána í textaritli og fjarlægðu gæsalappirnar —
    lykilinn verður að vera skrifaður beint eftir '=', án nokkurra auka tákna.
  err_niedozwolone_znaki: |-
    🚨 Óleyfileg tákn um lykilinn!
    Bil eða annað ósýnilegt tákn fannst fyrir eða eftir API lykilinn.
    Opnaðu skrána í textaritli og vertu viss um að gildið byrji
    strax eftir '=', án nokkurra bila.
  err_format: |-
    🚨 Grunsamlegt lykilsnið!
    Réttur OpenAI lykill byrjar alltaf með sk- (t.d. sk-proj-…).
    Vertu viss um að þú hafir afritað réttan streng og að engin bil séu fyrir framan hann.
  err_zbyt_krotki: |-
    ⚠️ Lykillinn virðist vera of stuttur ({liczba_znakow} tákn fundust, búist var við að minnsta kosti {minimum_znakow}).
    Þú hefur líklega aðeins afritað hluta lykilsins.

    Ef þú hefur þegar lokað glugganum með lykilnum á platform.openai.com,
    þarftu að fara aftur á reikninginn, nota valkostinn 'Revoke secret key' fyrir þennan
    skerta lykil og búa til nýjan. Mundu að næst
    afrita lykilinn í heild sinni áður en þú smellir á 'Done'.
  ok_klucz_wykryty: |-
    ✅ API lykill (golden_key.env) fannst og er rétt sniðinn.
    Allar einingar eru tilbúnar til notkunar.
  # Przyciski akcji panelu startowego
  btn_generate: "Búðu til skrána golden_key.env og opnaðu textaritil"
  btn_open: "📝 Opnaðu skrána golden_key.env í textaritli"
  blad_tworzenia_env_tytul: "Villa"
  blad_tworzenia_env_tresc: "Ekki tókst að búa til skrána golden_key.env:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Skráin {nazwa_pliku} hefur verið búin til!
    Textaritill opnast sjálfkrafa.
    Límdu inn API lykilinn þinn, vistaðu skrána (Ctrl+S) og ræstu forritið aftur.
  blad_otwarcia_pliku_tytul: "Upplýsingar"
  blad_otwarcia_pliku_tresc: "Ekki tókst að opna skrána sjálfkrafa.\nOpnaðu hana handvirkt:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Orðabókarverkfæri"
  narzedzia_slownikowe_name: "Lýsing á orðabókarverkfærum"
  tools_info: |-
    Viltu bæta við nýjum áherslum, dulritun eða Leikstjórnarstillingu?
    Opnaðu Reglustjóra (Ctrl+4) – þar finnur þú tré allra YAML skráa í dictionaries/ og smið sem býr sjálfkrafa til sniðmát eða býr til ábendingu fyrir AI chatbot.

    Eftir að hafa bætt við nýjum ÁHERSLUM, smelltu á hnappinn „Endurnýja áherslur Leikstjóra úr YAML" hér að neðan – þetta gerir Leikstjórnarstillingu kleift að taka eftir nýjum áherslum (Tungumálamaður greinir YAML skrár sjálfkrafa). Eftir endurnýjun skaltu ræsa forritið aftur.
  btn_open_manager_label: "📚 Opnaðu Reglustjóra"
  btn_open_manager_name: "Hnappur Opna Reglustjóra"
  btn_open_manager_tooltip: "Fer í Reglustjóra – YAML skráarkönnuður og nýr áherslu / stillinga / dulritunarsmiður (Ctrl+4)."
  btn_odswiez_label: "🔄 Endurnýja áherslur Leikstjóra úr YAML"
  btn_odswiez_name: "Hnappur Endurnýja áherslur Leikstjóra úr YAML"
  btn_odswiez_tooltip: "Skannar dictionaries/*/áherslur/ og endurbyggir áherslu_* umbúðir í core_poliglota.py og core_rezyser.py. Eftir vel heppnaða endurnýjun þarf að ræsa forritið aftur."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Villa við endurnýjun áherslna"
  raport_niespodziewany_tresc: "Óvænt villa kom upp:\n{tresc_bledu}"
  raport_tytul_blad: "Endurnýja áherslur Leikstjóra – VILLA"
  raport_header_blad: "⛔ Framleiðandi rakst á villur – sjá log hér að neðan."
  raport_tytul_sukces: "Endurnýja áherslur Leikstjóra – Árangur"
  raport_header_sukces: |-
    ✅ Skrár fyrir {liczba_akcentow} áherslur hafa verið breyttar.
    Til að nýjar áherslur birtist í Leikstjórnarstillingu, ræstu forritið aftur.
  raport_tytul_bez_zmian: "Endurnýja áherslur Leikstjóra – Engar breytingar"
  raport_header_bez_zmian: "ℹ️ Engar breytingar. {liczba_akcentow} áherslur fundust – umbúðir eru nú þegar uppfærðar."
  raport_lbl_log: "Fullur log (Ctrl+A, Ctrl+C afritar í klippiborð):"
  raport_log_name: "Log framleiðanda áherslna Leikstjóra"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Hljóðstjóri GPT spjald"
  heading: "🎬  Hljóðstjóri GPT – Blönduð Skapandi Stúdíó"
  description_name: "Lýsing á Hljóðstjóri GPT einingu"
  tool_description: |-
    Hljóðstjóri GPT er blandað skapandi stúdíó.

    Hugstormunarstilling  – skipuleggðu söguþráð, búa til 3 valkosti (ENGIN skráning í skrá).
    Handritsstilling        – skrifaðu hrátt hljóðhandrit með merkjum [SFX] og [Persóna: tilfinning] (SKRÁNING Í SKRÁ).
    Hljóðbókarstilling     – búa til þétt, klassískt bókmenntaprósa (SKRÁNING Í SKRÁ).

    Verkefni eru vistuð í undirmöppu 'skrypty/' við hlið forritsins.
    Sláðu inn nafn verkefnis án viðbótar (t.d. kroniki_arkonii).
    Til að breyta verkefni þarftu fyrst að hreinsa núverandi minni.
  prompt_architekta_content: |-
    Þú ert framúrskarandi heimabyggingameistari (Worldbuilder) og bókmenntaráðgjafi. Ég hef lauslega hugmynd um söguþráð: [SETTU HUGMYND ÞÍNA HÉR]. Verkefni þitt er að þróa þetta í faglega „Księga Świata".
    Aðlagaðu tón og reglur að hugmynd minni. Forðastu ódýrar, ævintýralegar styttingar og klisjur AI.

    FORMATREGLUR (MIKILVÆGAR):
    Þú verður að skila svari í tveimur aðskildum hlutum:

    HLUTI 1: KSIĘGA ŚWIATA
    Þennan hluta verður þú að loka í EINUM Markdown kóðablokk (notaðu merkin ```markdown í upphafi og ``` í lokin). Innan kóðablokkarins skaltu fylgja þessum reglum:
    1. Byrjaðu á opnu bókamerki og vinnutitli, t.d. 📖 Księga Świata: [Titill].
    2. Notaðu einn hashtag (#) fyrir aðalhluta (t.d. # Reglur Heimsins, # Persónur).
    3. Notaðu tvöfalt hashtag (##) fyrir undirhluta.
    4. Notaðu bandstrik (-) til að búa til læsilegar lista.
    5. Notaðu tvöfaldar stjörnur (**texti**), til að feitletra algjörlega óbreytanlegar reglur (t.d. **Hetjan LÝGUR ALDREI**).
    6. Lýstu sálfræði persóna, stærstu göllum þeirra og hvötum. Fyrir erlendar persónur, bættu við upplýsingum um áherslu beint við merkið, t.d. `[Speaker 1: Nafn] - seplar og hefur franskan hreim`. **Tæknileg ábending:** Notkun lykilorðsins `áhersla` er algjörlega nauðsynleg, þar sem ytri skrift forritsins greinir og setur sjálfkrafa réttar hljóðreglur á samtöl viðkomandi persónu.

    HLUTI 2: TILLAGA UM STÖÐU
    Þennan hluta skaltu setja UTAN kóðablokkarins, sem venjulegan texta fyrir neðan. Ráðleggðu mér hvaða stilling forritsins míns verður best til að framkvæma þessa hugmynd: 🎬 Hrá Handritsstilling (hljóðleikir, SFX, hljóðfræði), eða 📖 Hefðbundin Hljóðbókarstilling (klassísk bókmenntaprósa).

  # Pasek pliku
  lbl_nazwa_pliku: "Skráarnafn verkefnis (án viðbótar, t.d. kroniki_arkonii):"
  txt_nazwa_pliku_name: "Skráarheiti verkefnis"
  txt_nazwa_pliku_hint: "t.d. kroniki_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Sláðu inn nafn verkefnis án viðbótar.
    Skrá saga vistuð sem: skrypty/<nafn>.txt
    Reitur læstur þegar minni er upptekið.
  btn_wczytaj_label: "Hlaða sögu"
  btn_wczytaj_tooltip: |-
    Hleður inn núverandi verkefnaskrá (skrypty/<nafn>.txt) í minni.
    Virkur aðeins þegar minni er tómt og nafn hefur verið gefið.
  btn_wyczysc_biezaca_label: "Hreinsa núverandi (halda samantekt)"
  btn_wyczysc_biezaca_tooltip: |-
    Hreinsar aðeins núverandi sögu úr minni.
    Samantekt (Langtímaminni) og Księga Świata eru varðveitt.
    Notaðu til að halda áfram með langa bók eftir að samantekt hefur verið búin til.
  btn_hard_reset_label: "Loka verkefni (Harður endurstilling)"
  btn_hard_reset_tooltip: |-
    ALGER hreinsun verkefnis: saga, samantekt, Księga Świata.
    Núllstillir alla teljara og opnar skráarheiti reitinn.
    Notaðu við breytingu á verkefni eða alveg nýja sögu.
  # Sidebar
  sidebar_heading: "📖 Hliðarstika verkefnis"
  lbl_ksiega_swiata: "Księga Świata – Reglur og Persónur:"
  txt_ksiega_name: "Reitur Księga Świata – reglur og persónur"
  txt_ksiega_hint: |-
    Sláðu inn reglur heimsins, lýsingu á persónum og hljóðfræðilegum áherslum þeirra…
    T.d. [Geralt: áhersla á íslensku]
    Innihald er bætt við hverja AI fyrirspurn.
  txt_ksiega_tooltip: |-
    Samhengi stöðugt bætt við AI: reglur heimsins, persónur, hljóðfræðilegar áherslur.
    Skráning á disk krefst skráarheitis verkefnis.
  btn_zapisz_ksiege_label: "💾 Vista Księgę varanlega"
  btn_zapisz_ksiege_tooltip: |-
    Vista Księgę Świata í skrá: skrypty/<nafn>.md
    Krefst skráarheitis verkefnis.
  btn_prompt_architekta_label: "📖 Ábending Arkitekts fyrir AI…"
  btn_prompt_architekta_name: "Hnappur Sýna Ábendingu Arkitekts fyrir ytri chatbot"
  btn_prompt_architekta_tooltip: |-
    Opnar glugga með tilbúinni ábendingu fyrir ytri chatbot (ChatGPT, Claude).
    Límdu inn hugmynd þína um söguþráð, og AI mun búa til faglega Księgę Świata sniðna í Markdown – til að líma í reitinn „Księga Świata" hér að ofan.
  lbl_pamiec_dlugotrwala: "🧠 Langtímaminni (Samantekt):"
  txt_pamiec_name: "Reitur Langtímaminnis – samantekt atburða"
  txt_pamiec_hint: |-
    Hér mun AI vista samantekt þegar minni er fullt.
    Þú getur líka breytt því handvirkt.
  txt_pamiec_tooltip: |-
    Samantekt fyrri atburða bætt við hverja AI fyrirspurn.
    Leyfir að halda áfram með söguna án takmarkana á samhengi glugga líkansins.
  btn_zapisz_pamiec_label: "💾 Vista Samantekt"
  btn_zapisz_pamiec_tooltip: |-
    Vista samantekt í skrá: skrypty/<nafn>_samantekt.txt
    Eftir vistun geturðu örugglega hreinsað núverandi minni.
  # Obszar roboczy
  main_heading: "🎬 Vinnusvæði"
  rb_tryb_label: "Vinnustilling:"
  rb_tryb_name: "Val á vinnustillingu AI"
  rb_tryb_tooltip: |-
    Hugstormun – skipulagning án skráningar í skrá.
    Handrit        – hrátt hljóðhandrit (vistað í skrá).
    Hljóðbók     – hefðbundin bókmenntaprósa (vistað í skrá).
  # 13.2: komunikaty fallbacku reżysera (gdy brak reguł dla języka UI ani EN)
  brak_trybow_dla_jezyka: |-
    Fyrir tungumálið „{jezyk}" fundust engar Leikstjórnarstillingar AI né enskur varabúnaður
    (dictionaries/en/rezyser/). Bættu YAML skrá með stillingu
    við tungumálareglusafnið eða endurheimtu sjálfgefna ensku pakkann.
  brak_trybow_tytul: "Engar Leikstjórnarstillingar"
  placeholder_brak_trybow: "(engar stillingar til að velja)"
  # Panel struktury
  struktura_heading: "✂️ Stjórnun á Uppbyggingu"
  btn_prolog_label: "📜 Setja inn Prolog"
  btn_prolog_name: "Hnappur Setja inn Prolog"
  btn_prolog_tooltip: |-
    Setur fyrirsögn 'Prolog' í upphafi sögunnar.
    Mögulegt aðeins þegar saga er tóm. Krefst skráarheitis verkefnis.
  btn_epilog_label: "🏁 Setja inn Epilog"
  btn_epilog_name: "Hnappur Setja inn Epilog"
  btn_epilog_tooltip: |-
    Setur fyrirsögn 'Epilog' í lok sögunnar.
    Lokar fyrir frekari skrif eftir Epilog.
  btn_rozdzial_label: "✂️ Setja inn klippingu (Kafli {numer_rozdzialu})"
  btn_rozdzial_name: "Hnappur Setja inn Kafla"
  btn_rozdzial_tooltip: |-
    Setur fyrirsögn næsta kafla í söguna og skrána.
    Aðeins í boði í Hljóðbókarstillingu.
  btn_akt_label: "🎭 Setja inn Þátt {numer_aktu}"
  btn_akt_name: "Hnappur Setja inn Þátt"
  btn_akt_tooltip: |-
    Setur fyrirsögn 'Þáttur N' og sjálfkrafa 'Atriði 1' í söguna og skrána.
