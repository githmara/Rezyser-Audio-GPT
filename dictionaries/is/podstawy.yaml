# =============================================================================
#  PODSTAWY JĘZYKA ISLANDZKIEGO
# =============================================================================
#
#  Plik fundamentu dla `dictionaries/is/`. Silnik Poligloty wymaga, aby każdy
#  język miał ten plik — bez niego nowy język NIE jest w ogóle wykrywany.
#
#  Struktura wzorowana na `dictionaries/pl/podstawy.yaml`. Pole `polskie_znaki`
#  pozostawiono jako pustą listę — w wersji 13.x nie planujemy transliteracji
#  dla języków innych niż polski. Nazwa klucza `polskie_znaki` jest historyczna;
#  manager reguł oczekuje jej obecności, więc nie zmieniamy jej.
# =============================================================================

id: podstawy
jezyk: is
etykieta: "Íslenska – hljóðfræðilegur grunnur"
opis: |
  Bazowe reguły dla języka islandzkiego:
    1. Brak transliteracji znaków diakrytycznych (`polskie_znaki: []`) –
       islandzki używa rodzimego alfabetu z literami Þ, Ð, Æ, Ö oraz
       akcentowanymi samogłoskami.
    2. Alfabet islandzki (32 wielkie litery, kolejność rodzima, bez C, Q,
       W, Z) – używany przez szyfr Cezara.

# -----------------------------------------------------------------------------
# Brak diakrytyków do transliteracji. Pusta lista zachowuje kontrakt API
# z managerem reguł.
# -----------------------------------------------------------------------------
polskie_znaki: []

# -----------------------------------------------------------------------------
# Alfabet islandzki – 32 wielkie litery w rodzimej kolejności
# (A Á B D Ð E É F G H I Í J K L M N O Ó P R S T U Ú V X Y Ý Þ Æ Ö),
# bez znaków białych. Używany przez szyfr Cezara.
# -----------------------------------------------------------------------------
alfabet: "AÁBDÐEÉFGHIÍJKLMNOÓPRSTUÚVXYÝÞÆÖ"
