# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Панель Режиссера Audio GPT"
  heading: "🎬  Режиссер Audio GPT – Гибридная Творческая Студия"
  description_name: "Описание модуля Режиссера Audio GPT"
  tool_description: |-
    Режиссер Audio GPT – это гибридная творческая студия.

    Режим Мозгового Штурма  – планируйте сюжет, генерируйте 3 варианта (БЕЗ сохранения в файл).
    Режим Скрипта        – пишите черновой звуковой скрипт с тегами [SFX] и [Персонаж: эмоция] (СОХРАНЕНИЕ В ФАЙЛ).
    Режим Аудиокниги     – генерируйте плотную, классическую литературную прозу (СОХРАНЕНИЕ В ФАЙЛ).

    Проекты сохраняются в подпапке 'скрипты/' рядом с программой.
    Укажите название проекта БЕЗ расширения (например, kroniki_arkonii).
    Чтобы изменить проект, сначала необходимо очистить текущую память.
  prompt_architekta_content: |-
    Вы выдающийся архитектор миров (Worldbuilder) и литературный консультант. У меня есть свободная идея для сюжета: [ЗДЕСЬ ВВЕДИТЕ СВОЮ ИДЕЮ]. Ваша задача – развить это до профессиональной «Книги Мира».
    Настройте тон и правила под мою идею. Избегайте дешевых, сказочных сокращений и клише AI.

    ПРАВИЛА ФОРМАТИРОВАНИЯ (КРИТИЧЕСКИЕ):
    Вы должны вернуть ответ в двух отдельных частях:

    ЧАСТЬ 1: КНИГА МИРА
    Эту часть вы должны обязательно закрыть в ОДНОМ блоке кода Markdown (используйте метки ```markdown в начале и ``` в конце). Внутри блока кода применяйте эти правила:
    1. Начните с эмодзи открытой книги и рабочего заголовка, например, 📖 Книга Мира: [Заголовок].
    2. Используйте одинарный хештег (#) для основных разделов (например, # Правила Мира, # Персонажи).
    3. Используйте двойной хештег (##) для подразделов.
    4. Используйте тире (-) для создания читаемых списков.
    5. Используйте двойные звездочки (**текст**), чтобы выделить абсолютные, нерушимые правила (например, **Герой НИКОГДА не лжет**).
    6. Опишите психологию персонажей, их главные недостатки и мотивации. В случае иностранных персонажей добавьте информацию об акценте непосредственно при теге, например, `[Speaker 1: Имя] - шепелявит и имеет французский акцент`. **Техническая подсказка:** Использование ключевого слова `акцент` обязательно, так как на его основе внешний скрипт приложения автоматически обнаруживает и накладывает правильные фонетические правила на диалоги данного персонажа.

    ЧАСТЬ 2: РЕКОМЕНДАЦИЯ РЕЖИМА
    Эту часть разместите ВНЕ блока кода, как обычный текст ниже. Посоветуйте мне, какой из режимов моего приложения будет лучшим для реализации этой идеи: 🎬 Режим Чернового Скрипта (радиопьесы, SFX, фонетика) или 📖 Режим Традиционной Аудиокниги (классическая литературная проза).

  # Pasek pliku
  lbl_nazwa_pliku: "Имя файла проекта (без расширения, например, kroniki_arkonii):"
  txt_nazwa_pliku_name: "Поле имени файла проекта"
  txt_nazwa_pliku_hint: "например, kroniki_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Введите имя проекта БЕЗ расширения.
    Файл истории сохраняется как: скрипты/<имя>.txt
    Поле заблокировано, когда память занята.
  btn_wczytaj_label: "Загрузить историю"
  btn_wczytaj_tooltip: |-
    Загружает существующий файл проекта (скрипты/<имя>.txt) в память.
    Активно только когда память пуста и указано имя.
  btn_wyczysc_biezaca_label: "Очистить текущую (оставить Резюме)"
  btn_wyczysc_biezaca_tooltip: |-
    Очищает только текущую историю из памяти.
    Резюме (Долговременная Память) и Книга Мира сохраняются.
    Используйте для продолжения длинной книги после генерации резюме.
  btn_hard_reset_label: "Закрыть Проект (Жесткий Сброс)"
  btn_hard_reset_tooltip: |-
    ПОЛНОЕ очищение проекта: история, резюме, Книга Мира.
    Сбрасывает все счетчики и разблокирует поле имени файла.
    Используйте при смене проекта или совершенно новой истории.
  # Sidebar
  sidebar_heading: "📖 Боковая панель проекта"
  lbl_ksiega_swiata: "Книга Мира – Правила и Персонажи:"
  txt_ksiega_name: "Поле Книги Мира – правила и персонажи"
  txt_ksiega_hint: |-
    Введите правила мира, описание персонажей и их фонетические акценты…
    Например, [Геральт: исландский акцент]
    Содержимое добавляется к каждому запросу AI.
  txt_ksiega_tooltip: |-
    Контекст, постоянно добавляемый к AI: правила мира, персонажи, фонетические акценты.
    Сохранение на диск требует указания имени файла проекта.
  btn_zapisz_ksiege_label: "💾 Сохранить Книгу навсегда"
  btn_zapisz_ksiege_tooltip: |-
    Сохраняет Книгу Мира в файл: скрипты/<имя>.md
    Требуется указание имени файла проекта.
  btn_prompt_architekta_label: "📖 Подсказка Архитектора для AI…"
  btn_prompt_architekta_name: "Кнопка Показать Подсказку Архитектора для внешнего чат-бота"
  btn_prompt_architekta_tooltip: |-
    Открывает окно с готовой подсказкой для внешнего чат-бота (ChatGPT, Claude).
    Вставьте свою идею сюжета, и AI сгенерирует профессиональную Книгу Мира, отформатированную в Markdown – для вставки в поле «Книга Мира» выше.
  lbl_pamiec_dlugotrwala: "🧠 Долговременная Память (Резюме):"
  txt_pamiec_name: "Поле Долговременной Памяти – резюме событий"
  txt_pamiec_hint: |-
    Здесь AI сохранит резюме при переполнении памяти.
    Вы также можете редактировать его вручную.
  txt_pamiec_tooltip: |-
    Резюме предыдущих событий добавляется к каждому запросу AI.
    Позволяет продолжать историю без ограничений контекстного окна модели.
  btn_zapisz_pamiec_label: "💾 Сохранить Резюме"
  btn_zapisz_pamiec_tooltip: |-
    Сохраняет резюме в файл: скрипты/<имя>_резюме.txt
    После сохранения вы можете безопасно очистить текущую память.
  # Obszar roboczy
  main_heading: "🎬 Рабочая Область"
  rb_tryb_label: "Режим работы:"
  rb_tryb_name: "Выбор режима работы AI"
  rb_tryb_tooltip: |-
    Мозговой Штурм – планирование без сохранения в файл.
    Скрипт        – черновой звуковой скрипт (сохраняется в файл).
    Аудиокнига     – традиционная литературная проза (сохраняется в файл).
