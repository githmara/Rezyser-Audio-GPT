# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Стартовая панель – Главная страница"
  welcome_text: |-
    Это ваша интегрированная студия записи.
    Выберите инструмент с панели кнопок или из меню Инструменты:

      •  Режиссер       –  Пишите скрипты и прозу с AI; динамически управляйте Книгой Мира.
      •  Полиглот     –  Накладывайте акценты для локальных синтезаторов (NVDA/Vocalizer) и переводите тексты.
      •  Конвертер     –  Быстро создавайте профессиональные файлы Word с заголовками уровня 1.
      •  Менеджер Правил –  Просматривайте и создавайте словарные правила без ручного редактирования файлов YAML.
  heading_system_check: "System Check"
  checking: "Проверка конфигурации…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 Отсутствует файл конфигурации окружения!

    Обнаружен первый запуск программы. Модули заблокированы из соображений безопасности.
    Чтобы разблокировать все инструменты, нажмите кнопку ниже — программа автоматически сгенерирует файл golden_key.env и откроет его в текстовом редакторе по умолчанию.
  err_odczyt: "🚨 Не удалось прочитать файл golden_key.env:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Ошибка структуры файла!
    Отсутствует обязательный параметр OPENAI_API_KEY=.
    Вероятно, вы удалили знак равенства или имя переменной.
    Удалите файл, сгенерируйте его заново и вставьте ключ более осторожно.
  err_tekst_zastepczy: |-
    ⚠️ Ключ не введен!
    В файле golden_key.env все еще находится текст-заполнитель.
    Откройте файл в текстовом редакторе, удалите текст-заполнитель и вставьте свой настоящий API-ключ.
  err_cudzyslowy: |-
    🚨 Лишние кавычки вокруг ключа!
    API-ключ вставлен в кавычках (например, "sk-…").
    Откройте файл в текстовом редакторе и удалите кавычки —
    ключ должен быть введен непосредственно после знака '=', без дополнительных символов.
  err_niedozwolone_znaki: |-
    🚨 Недопустимые символы вокруг ключа!
    Перед или после API-ключа обнаружен пробел или другой невидимый символ.
    Откройте файл в текстовом редакторе и убедитесь, что значение начинается
    сразу после знака '=', без пробелов.
  err_format: |-
    🚨 Подозрительный формат ключа!
    Правильный ключ OpenAI всегда начинается с символов sk- (например, sk-proj-…).
    Убедитесь, что вы скопировали правильную строку и перед ней нет пробелов.
  err_zbyt_krotki: |-
    ⚠️ Ключ кажется слишком коротким (обнаружено {liczba_znakow} символов, ожидалось как минимум {minimum_znakow}).
    Вероятно, вы скопировали только часть ключа.

    Если вы уже закрыли окно с ключом на platform.openai.com,
    вам нужно вернуться в аккаунт, использовать опцию 'Revoke secret key' для этого
    обрезанного ключа и сгенерировать новый. Помните, чтобы в следующий раз
    скопировать ключ полностью перед нажатием 'Done'.
  ok_klucz_wykryty: |-
    ✅ API-ключ (golden_key.env) обнаружен и правильно отформатирован.
    Все модули готовы к работе.
  # Przyciski akcji panelu startowego
  btn_generate: "Сгенерировать файл golden_key.env и открыть текстовый редактор"
  btn_open: "📝 Открыть файл golden_key.env в текстовом редакторе"
  blad_tworzenia_env_tytul: "Ошибка"
  blad_tworzenia_env_tresc: "Не удалось создать файл golden_key.env:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Файл {nazwa_pliku} был сгенерирован!
    Текстовый редактор открывается автоматически.
    Вставьте свой API-ключ, сохраните файл (Ctrl+S) и перезапустите приложение.
  blad_otwarcia_pliku_tytul: "Информация"
  blad_otwarcia_pliku_tresc: "Не удалось автоматически открыть файл.\nОткройте его вручную:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Словарные инструменты"
  narzedzia_slownikowe_name: "Описание словарных инструментов"
  tools_info: |-
    Хотите добавить новый акцент, шифр или режим Режиссера?
    Откройте Менеджер Правил (Ctrl+4) – там вы найдете дерево всех файлов YAML в dictionaries/ и создатель, который сам создаст шаблон или сгенерирует подсказку для чат-бота AI.

    После добавления нового АКЦЕНТА нажмите дополнительно кнопку «Обновить акценты Режиссера из YAML» ниже – это позволит Режиссерскому Режиму заметить новый акцент (Полиглот автоматически обнаруживает YAML-и). После обновления перезапустите приложение.
  btn_open_manager_label: "📚 Открыть Менеджер Правил"
  btn_open_manager_name: "Кнопка Открыть Менеджер Правил"
  btn_open_manager_tooltip: "Переходит в Менеджер Правил – проводник по файлам YAML и создатель новых акцентов / режимов / шифров (Ctrl+4)."
  btn_odswiez_label: "🔄 Обновить акценты Режиссера из YAML"
  btn_odswiez_name: "Кнопка Обновить акценты Режиссера из YAML"
  btn_odswiez_tooltip: "Сканирует dictionaries/*/акценты/ и регенерирует обертки акцент_* в core_poliglota.py и core_rezyser.py. После успешного обновления необходимо перезапустить приложение."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Ошибка обновления акцентов"
  raport_niespodziewany_tresc: "Произошла непредвиденная ошибка:\n{tresc_bledu}"
  raport_tytul_blad: "Обновить акценты Режиссера – ОШИБКА"
  raport_header_blad: "⛔ Генератор столкнулся с ошибками – см. журнал ниже."
  raport_tytul_sukces: "Обновить акценты Режиссера – Успех"
  raport_header_sukces: |-
    ✅ Изменены файлы для {liczba_akcentow} акцентов.
    Чтобы новые акценты появились в Режиссерском Режиме, перезапустите приложение.
  raport_tytul_bez_zmian: "Обновить акценты Режиссера – Без изменений"
