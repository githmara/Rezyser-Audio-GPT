id: dictionaries
tresc: |
  Словари Полиглота и Режиссера — Инструкция для каждого
  =======================================================

  Привет! Если ты читаешь этот файл, значит, ты заглянул в папку
  "dictionaries/" рядом с приложением Режиссер Audio GPT и задаешься вопросом,
  что это за файлы с странными расширениями ".yaml". Спокойно — не нужно
  знать программирование или Python, чтобы понять, что здесь происходит, а
  с небольшой смелостью даже добавить что-то свое.

  Этот файл написан простым языком для писателей, лингвистов,
  учителей, родителей и вообще любознательных. Если ты знаешь основы
  программирования и ищешь подробную документацию формата файлов YAML
  (со списками полей, регулярными выражениями, правилами обработки
  конвейера), загляни в файл "README.md" в той же папке — но внимание,
  этот файл доступен только если ты клонировал репозиторий с GitHub. В
  пакете, загруженном с вкладки Releases, файлы Markdown отфильтрованы
  (чтобы в пакет случайно не попали, например, твои книги миров со
  спойлерами), так что только этот файл ".txt" попадает к конечным
  пользователям.


  Что здесь вообще есть?
  ----------------------

  Папка "dictionaries/" — это библиотека правил, которыми пользуются
  Полиглот (инструмент для переводов и акцентов) и внутренний движок
  Режиссера. До версии 12.0 все эти правила были "зашиты" в коде
  Python — если ты хотел добавить новый акцент или изменить правила,
  нужно было просить программиста. С версии 13.0 все записано в обычных
  текстовых файлах (расширение ".yaml" — это просто отформатированный
  особым образом обычный текст). Открываешь их любым редактором
  (Блокнот, VS Code, Notepad++) и редактируешь как любой другой документ.

  Структура папки выглядит так:

      dictionaries/
      └── pl/              папка исходного языка (польского)
          ├── podstawy.yaml              польские диакритики + алфавит
          ├── akcenty/                   {liczba_plikow_w_akcentach} файлы с акцентами
          ├── szyfry/                    {liczba_szyfrow} файлы с шифрами и играми
          └── rezyser/                   {liczba_trybow_rezysera} файлы с режимами Режиссера AI

  В настоящее время полностью реализованы: {lista_kompletnych_jezykow_natywnie}
  ({liczba_kompletnych_jezykow} исходных языков). Каждый имеет свой собственный пакет
  "dictionaries/<код>/" с диакритиками, алфавитом и фонетическими правилами,
  действующими на текст на этом языке — приложение само определяет
  исходный язык через lingua-language-detector (поабзацно) и загружает
  соответствующий пакет для каждого фрагмента отдельно.
  Следующие языки находятся в разработке (полный пакет требует
  "podstawy.yaml", "gui/ui.yaml" и как минимум одного файла в "akcenty/"
  и "szyfry/").


  Что такое акцент?
  -----------------

  Акцент — это набор правил, которые "портят" польский текст так, чтобы
  экранный чтец (например, NVDA) прочитал его голосом иностранного языка.
  Например, финский акцент заменяет польское "sz" на "s", "w" на "v", а
  диакритики (ą, ę, ł) на их упрощенные версии — в результате текст
  звучит, как будто финн из Хельсинки только учится польскому. Речь не
  идет об аутентичной транслитерации, а о забавном и намеренном
  искажении для нужд сюжета.

  Доступные акценты ({liczba_akcentow_jezykowych} языков):

  - английский (Samantha/Mark в Vocalizer, Zira/Hazel в OneCore)
  - французский (Thomas/Amelie в Vocalizer, Julie в OneCore)
  - немецкий (Markus/Stefan в Vocalizer, Katja/Hedda в OneCore)
  - испанский (Jorge/Monica в Vocalizer, Helena в OneCore)
  - итальянский (Alice/Luca в Vocalizer, Elsa в OneCore)
  - финский (Satu/Mikko в Vocalizer, Heidi в OneCore)
  - исландский (только OneCore Gudrun и бесплатный eSpeak — Vocalizer не
    имеет исландского голоса!)
  - польский (Ewa в Vocalizer, Paulina в OneCore)

  Особый случай для русского источника: исходный текст на русском
  использует кириллицу, которую другие иностранные голоса (Samantha,
  Markus, Heidi, Gudrun и т.д.) физически не могут прочитать. Поэтому
  ВСЕ акценты, применённые к русскому тексту, сначала автоматически
  выполняют транслитерацию кириллицы в латиницу, а уже потом применяют
  фонетические преобразования. Это техническая необходимость — без
  латинизации иностранному голосу нечего было бы произносить.

  Дополнительно в меню акцентов есть две позиции "очистки без акцента":
  одна без нормализации чисел, другая с нормализацией (заменяет "15" на
  "пятнадцать" перед обработкой, потому что иностранец, вероятно, не
  склонит это число правильно — что добавляет аутентичности) и
  "Исправитель Тегов", который просто вставляет в файл код языка ISO
  без порчи содержания (спасение, если твой уже переведенный файл вышел
  с ошибочным языковым кодом).


  Что такое шифр?
  ---------------

  Шифры — это текстовые игры для загадок, языковых упражнений, головоломок.
  В отличие от акцентов, они НЕ ориентированы на конкретный голос
  синтезатора — просто искажают текст по определенному правилу.
  Доступные шифры ({liczba_szyfrow}):

  1. Перевертыш текста (чтение наоборот)
     Каждое предложение переворачивается знак за знаком, сохраняя заглавную
     букву в начале и точку/восклицательный/вопросительный знак в конце.
     Перед переворачиванием скрипт разворачивает русские аббревиатуры
     (т.е., т.д., т.н., т.к., и.о...), потому что без этого после
     переворачивания получились бы абсурды типа "е.т".

     Вдохновение: миссия из польской версии программы "The Traitors. Zdrajcy".
     Ведущая включила участникам популярную детскую песню, воспроизведенную
     в обратном порядке. Реакции были в стиле "какой это язык? армянский?
     венгерский? финский?" — а это была известная с детства мелодия из
     мультфильма. Потом оказалось, что команда в лесу получила запись текста
     песни наоборот и должна была спеть именно в такой версии — замковая
     команда должна была это записать, перевернуть запись и теоретически
     восстановить песню для угадывания.

     Точно такое же забавное недоразумение происходит, когда ты запускаешь
     наш Перевертыш через синтезатор речи. Отлично подходит для тематических
     загадок, квестов, вечеринок.

  2. Типогликемия (перемешанный центр слов)
     Классический психолингвистический эффект: "Сгласно исслеводаниям
     Кембриджского университета, не важо в каком порядке буквы в слове,
     главное, чтобы первая и последняя буквы были на своих местах". Скрипт
     случайно перемешивает середину каждого слова длиннее 4 знаков, первая
     и последняя буквы остаются на месте. Отлично подходит для теста
     "сколько я на самом деле вижу, а сколько подсказывает мне мозг".

  3. Сломанный телефон / Змеиный диалект
     Каждое "с", "з" или "ш" случайно удлиняется в шипение длиной 4-8
     знаков. Вдохновение: Snecko из игры "Slay the Spire". Эффект: текст
     звучит, как будто его читает змея с дефектом речи. Отлично подходит
     для озвучки персонажа смешанного гада или сломанного робота на
     шипящей щели.

  4. Гласный (все гудит на "о")
     Каждая гласная в тексте заменяется на "о", с сохранением польских
     смягчений (ci, si, ni, zi, dzi обрабатываются правильно):
     "Добрый день, приветствую вас" → "Добро доно, протово вас". Чем
     длиннее текст, тем забавнее эффект — а экранный чтец читает это
     с полной уверенностью, без попытки декодирования.

  5. Сильное заикание / Сломанный робот
     Добавляет заикания в начале слов: "компьютер" → "ко-ко-ко-компьютер",
     "душ" → "ду-ду-душ". Слова короче 3 знаков пропускаются. Если вторая
     буква слова согласная, повторяются первые две (звучит более
     естественно); если гласная — только первая.

  6. Шифр Цезаря (классика)
     Самый старый задокументированный шифр в истории (использовался еще в
     древнем Риме). Каждая буква сдвигается на N позиций в русском
     алфавите (33 буквы). Сдвиг указываешь в GUI в числовом поле; если
     введешь 0, приложение случайно выберет значение в диапазоне 1-32 и
     покажет его в сообщении, чтобы ты мог потом расшифровать сообщение.
     Знаки вне алфавита (цифры, пробелы, пунктуация) остаются без изменений.


  Что такое "режим Режиссера"?
  ----------------------------

  Папка "rezyser/" содержит {liczba_trybow_rezysera} файлов, описывающих режимы работы Главной
  Студии Режиссера приложения:

  - tryb_burza.yaml      — Мозговой Штурм (планирование сюжета, 3 варианта
                           развития истории, директива anti-closure)
  - tryb_skrypt.yaml     — Черновой Сценарий (теги [SFX], [Speaker: эмоция],
                           фонетика персонажей)
  - tryb_audiobook.yaml  — Традиционная Аудиокнига (чистая литературная проза,
                           запрет на резюме и рамки)
  - postprod_tytuly.yaml — присвоение литературных названий главам после
                           генерации всей истории

  Внутри каждого из этих файлов самая ценная часть — это "системный
  промпт" — длинная инструкция для искусственного интеллекта, как он
  должен себя вести в данном режиме. Если ты чувствуешь, что, например,
  режим Аудиокниги пишет "слишком цветисто" или Мозговой Штурм слишком
  часто предлагает магические решения, ты можешь настроить эти тексты
  под свой вкус, сохранить, и приложение при следующем запуске загрузит
  твою версию. Ноль программирования.


  Как начать — три уровня сложности
  ---------------------------------

  УРОВЕНЬ 1 — небольшая настройка существующего акцента

  Представь, что французский акцент приложения заменяет "sz" на "sh", но
  ты считаешь, что француз скорее сказал бы "sch" или "ch". Нет проблем.

  1. Запусти приложение и перейди в Менеджер Правил (клавиша Ctrl+4 или
     четвертая кнопка на панели).
  2. В дереве файлов слева разверни "pl" → "akcenty" и кликни
     "francuski.yaml".
  3. Нажми кнопку "Открыть в текстовом редакторе". Файл откроется в
     Блокноте Windows (или твоем стандартном текстовом редакторе).
  4. Прокрути вниз до секции "замены:". Найди строку с шаблоном "sz" и
     измени значение "замена" на то, что тебе подходит.
  5. Сохрани файл (Ctrl+S), закрой редактор.
  6. Вернись в Менеджер Правил и нажми "Обновить дерево", а затем закрой
     и перезапусти приложение. Твое изменение уже работает.

  УРОВЕНЬ 2 — добавление нового акцента через дублирование

  Хочешь добавить шведский или датский акцент? Начни с самого
  похожего существующего.

  1. В Менеджере Правил выбери, например, "finski.yaml" (финский
     близок к шведскому фонетически) и нажми "Дублировать выбранный
     файл".
  2. Менеджер спросит новое имя — введи, например, "szwedzki" (маленькими
     буквами, без пробелов, без польских знаков).
  3. Новый файл откроется в редакторе. Измени поля:
        - "метка" — то, что ты увидишь в меню приложения, например,
          "Шведский (Alva / Oskar — OneCore/Vocalizer)"
        - "описание" — краткое описание для себя на будущее
        - "iso" — двухбуквенный код языка, для шведского "sv"
  4. Настрой список "замен" под шведскую фонетику (например, добавь
     "å → o", "ö → ö", удали или измени те, которые специфичны для
     финского).
  5. Сохрани, вернись на Главную страницу, нажми "🔄 Обновить акценты
     Режиссера из YAML" и перезапусти приложение. Новый шведский
     появится в меню акцентов Полиглота (а если добавишь в Книгу Мира
     персонажа с тегом "[Marek] - имеет шведский акцент", то Режиссер
     тоже его распознает автоматически и применит к его диалогам).

  УРОВЕНЬ 3 — создание чего-то совершенно нового

  Хочешь школьный жаргон? Язык древних рыцарей? Травяной язык? Шифр
  родителей перед детьми?

  1. В Менеджере Правил нажми "Новый файл правил…".
  2. Выбери тип (акцент, шифр замен, режим Режиссера, новый исходный
     язык, алгоритмический шифр). Для обычных случаев приложение
     сразу создаст готовый шаблон YAML — редактируешь его как на уровне 2.
  3. Для более сложных случаев (алгоритмы типа "перемешивание концовок"
     или целый новый исходный язык) Менеджер покажет тебе готовый
     промпт для вставки в ChatGPT или Claude. AI сгенерирует
     полный файл YAML, ты его просто скопируешь в папку. Не нужно
     уметь программировать — достаточно уметь копировать.


  Несколько идей для развлечения
  ------------------------------

  - Школьный класс на уроке русского: задание "прочитай фрагмент
    произведения в Полиглоте с польским акцентом — узнаешь ли автора?".
    Для слепых детей особенно ценно, потому что они получают интересное
    звучание без необходимости читать плакат глазами.

  - Квест в библиотеке: подготовь фрагмент стихотворения в Перевертыше
    текста, распечатай (или отправь в сообщении), участники должны либо
    прочитать вслух и записать, а затем воспроизвести в обратном порядке,
    либо просто самостоятельно сканировать глазами с конца. Ключ к
    шкафчику получают те, кто узнает название стихотворения.

  - Домашний радиоспектакль для старшего поколения: запиши сказку
    "Гадкий утенок" в разных акцентах (рассказчик английский, мама утка
    итальянская, папа утка немецкий) и смонтируй в Audacity. Для
    бабушек и дедушек особенно забавно, потому что они отличат "кто
    сейчас говорит" по самому звучанию.

  - Упражнение для актера: пропусти свою реплику через Змеиный Диалект и
    попробуй повторить вживую. Тренирует шипение, дыхание, контроль языка.

  - Открытка с загадкой на день рождения: сдвинь пожелания Шифром Цезаря
    на 3 позиции, допиши "ключ: сдвинь каждую букву на столько, сколько
    тебе лет сегодня". Юбиляр должен сам найти расшифровку. (Работает
    лучше всего для детей 7-12 лет; взрослые обычно быстро догадываются.)


  Может ли что-то пойти не так?
  ------------------------------

  В принципе, нет. Приложение загружает файлы YAML динамически, и если
  какой-то из них записан неправильно, оно просто пропускает его и
  выводит предупреждение при старте. Остальные правила работают как
  ни в чем не бывало.

  Худшее, что может случиться, это то, что новый файл просто не появится
  в меню приложения. Тогда:

  - вернись в Менеджер Правил, проверь, виден ли файл в дереве,
  - открой его снова в текстовом редакторе и сравни структуру с
    соседними (отступы, двоеточия, кавычки),
  - если ты действительно застрял — скопируй содержимое своего файла,
    открой ChatGPT и напиши "у меня есть файл YAML, который приложение
    не загружает, найди ошибку и покажи исправленную версию". Вставь
    файл. AI обычно исправляет его за несколько секунд.

  Оригинальные файлы из пакета (angielski.yaml, cezar.yaml, podstawy.yaml
  и т.д.) НЕ удаляй — лучше "спрячь" их, изменив расширение с ".yaml"
  на ".yaml.backup", если хочешь, чтобы они исчезли из меню. Если потом
  передумаешь, достаточно вернуть расширение.


  Приятного развлечения!
