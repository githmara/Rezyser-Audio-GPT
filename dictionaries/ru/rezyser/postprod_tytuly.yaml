# -----------------------------------------------------------------------------
#  ПОСТПРОДАКШН: ДАЙ ИМЕНА ГЛАВАМ (ИИ)
#  Инструмент для режима Аудиокниги: итерируется по сохранённому файлу
#  проекта и для каждой главы генерирует короткий, литературный заголовок.
#  По умолчанию использует дешёвую модель (gpt-4o-mini), потому что
#  задача простая.
# -----------------------------------------------------------------------------
id: tytuly
etykieta: "Дай Названия Главам (ИИ)"
kategoria: postprodukcja
kolejnosc: 10

# --- Параметры OpenAI ---
model: gpt-4o-mini
temperatura: 0.7
jezyk_odpowiedzi: по-русски

# --- Системный промпт ---
prompt_systemowy: |
  Ты — уважаемый редактор. Отвечаешь ТОЛЬКО заголовком.

# --- Шаблон пользовательской инструкции (role=user) ---
# Placeholder'ы: {naglowek}, {probka}
prompt_uzytkownika_szablon: |
  Это содержание текстового фрагмента книги ({naglowek}). Придумай ОДИН короткий, цепляющий и литературный заголовок без кавычек.

  СОДЕРЖАНИЕ:
  {probka}

# --- Параметры итерации по файлу проекта ---
# Regex, разделяющий файл на структурные заголовки + содержания.
# Захватывающая группа должна выловить ТОЛЬКО заголовок («Введение» /
# «Глава 7» / «Эпилог»). \n* в начале и конце допускают пустые строки
# вокруг заголовков.
regex_podzial_rozdzialow: "(?i)\\n*(Введение|Глава \\d+|Эпилог)\\n*"

# Фрагменты короче этого получают статус «(Фрагмент слишком короткий)»
# вместо вызова ИИ (экономит API-кредиты и избегает бессмысленных заголовков).
min_dlugosc_fragmentu: 50

# Максимальная длина текстового образца, отправляемого модели в одном запросе.
# ИИ видит начало главы — этого достаточно для выдумывания заголовка.
max_dlugosc_probki: 6000

# Сообщения, отображаемые в окне результата:
etykieta_fragment_zbyt_krotki: "(Фрагмент слишком короткий)"
etykieta_bled_brak_kredytow: "(Ошибка — нет API-кредитов)"
