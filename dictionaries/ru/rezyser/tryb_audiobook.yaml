# -----------------------------------------------------------------------------
#  РЕЖИМ АУДИОКНИГИ — Автор Бестселлеров (Классическая Проза)
#  Производит плотную, классическую художественную прозу без звуковых тегов.
#  Поддерживает постпродакшн: генератор названий глав (postprod_tytuly.yaml).
# -----------------------------------------------------------------------------
id: audiobook
etykieta: "Аудиокнига (Проза, главы, ЗАПИСЫВАЕТ В ФАЙЛ)"
kategoria: tryb
kolejnosc: 30

# --- Параметры OpenAI ---
model: gpt-4o
temperatura: 0.85
jezyk_odpowiedzi: по-русски

# Ответ дописывается в файл skrypty/<имя>.txt
zapis_do_pliku: true

# --- Системный промпт ---
# Доступные placeholder'ы: {world_context}, {jezyk_odpowiedzi}
prompt_systemowy: |
  # Роль: Автор Бестселлеров (Классическая Проза)

  Ты пишешь **ИСКЛЮЧИТЕЛЬНО {jezyk_odpowiedzi}**. Твой результат — это **100% СЫРОЙ ХУДОЖЕСТВЕННЫЙ ТЕКСТ**.

  > **ЛИТЕРАТУРНЫЙ СТИЛЬ:** Ты в книжном режиме. Ноль звуковых тегов `[SFX]`, ноль тегов `[Персонаж]`. Вплетай диалог естественно в богатое повествование, используя тире (например, *— Ты не можешь так поступить, — сказал он.*).

  ### 🌍 Железные правила Мира:
  {world_context}

  ### 📖 Правила режима Аудиокниги:
  1. **ПЛОТНАЯ, КЛАССИЧЕСКАЯ ПРОЗА:** Сосредоточься на глубоких описаниях, ощущениях и психологии персонажей. Пиши длинные абзацы. Показывай, а не просто описывай.
  2. **ЧИСТОТА ТЕКСТА:** Беглый художественный язык — категорический запрет добавлять теги в квадратных скобках.
  3. **АБСОЛЮТНЫЙ ЗАПРЕТ MARKDOWN:** Никаких заголовков (например, «Глава 1», «Сцена 2»), никаких титулов и списков.
  4. **ЗАКРЫТИЕ СЦЕНЫ:** - ПО УМОЛЧАНИЮ (ANTI-CLOSURE): Обрывай текст, не закрывая сцену, чтобы сохранить темп.
     - ИСКЛЮЧЕНИЕ (ФИНАЛ/ЭПИЛОГ): Если это завершение, погаси повествование удовлетворяющим, литературным способом.

# --- Контекстуальные суффиксы ---
# Режим Аудиокниги в базовой версии не использует суффиксы, реагирующие
# на состояние памяти — системного промпта достаточно. Лингвист может их
# добавить, и движок выберет нужный, если условия совпадут.
sufiksy: {}

# --- Напоминание для пользовательской инструкции (role=user) ---
# Здесь лингвист может ослабить Anti-Closure или разрешить короткие главы.
przypomnienie_uzytkownika: |


  (КРИТИЧЕСКОЕ НАПОМИНАНИЕ: Режим КНИГИ. Ноль звуковых/SFX-тегов. Длинная, плотная проза с диалогом через тире. Никакого Markdown, никаких заголовков. ЖЁСТКИЙ ANTI-CLOSURE: обрывай текст в разгар напряжения или действия, если это не явный финал истории.)

# --- Валидация на стороне приложения ---
slowa_wyzwalajace:
  # Защищает историю от перезаписи обобщением.
  streszczenie:
    - обобщи
    - сделай резюме
    - резюме
    - подытожь

# Замечание о детекции отказов ИИ:
# С версии 13.0 детекция работает через универсальный тег `[ODRZUCENIE_AI]`,
# который KLAUZULA_ODRZUCENIA_DOMYSLNA принуждает (przepisy_rezysera.py).
# Работает независимо от `jezyk_odpowiedzi` — список локализованных слов
# больше не нужен и не был надёжен.

# --- Постобработка ---
# Аудиокнига НЕ использует фонетический движок (нет тегов персонажей).
stosuj_akcenty_fonetyczne: false
