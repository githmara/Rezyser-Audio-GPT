# =============================================================================
#  ОСНОВЫ РУССКОГО ЯЗЫКА
# =============================================================================
#
#  Базовый файл для `dictionaries/ru/`. Движок Poliglota требует, чтобы каждый
#  язык имел этот файл — без него новый язык вообще НЕ обнаруживается.
#
#  Структура построена по образцу `dictionaries/pl/podstawy.yaml`. Поле
#  `polskie_znaki` оставлено пустым списком — в версии 13.x транслитерация
#  диакритики для языков, отличных от польского, не планируется. Имя ключа
#  `polskie_znaki` историческое; менеджер правил ожидает его наличия,
#  поэтому мы его не переименовываем.
# =============================================================================

id: podstawy
jezyk: ru
# 13.4.3: идентификатор lingua-language-detector, используемый движком Poliglota.
# Значение ДОЛЖНО быть именем enum-а `lingua.Language` (заглавными буквами,
# без префикса) — полный список: https://github.com/pemistahl/lingua-py.
# Отсутствие поля отключает язык в детекторе (включается sticky-fallback),
# папка остаётся видимой.
lingua: RUSSIAN
etykieta: "Русский – фонетические основы"
opis: |
  Базовые правила для русского языка:
    1. Без транслитерации знаков кириллицы (`polskie_znaki: []`) –
       русский язык работает только в кириллическом алфавите и не требует
       преобразования в латиницу.
    2. Русский алфавит (33 заглавные буквы кириллицы) – используется
       шифром Цезаря.

# -----------------------------------------------------------------------------
# Транслитерация диакритики не выполняется в версии 13.3.
# Алфавит русского — кириллица; шифр Цезаря работает на 33 буквах кириллицы.
# Латинские диакритические знаки (é, ñ, ö и др.) и сами латинские буквы
# в русском тексте — отдельная проблема (две разные системы письма
# одновременно). Запланировано к рассмотрению в 13.x+ как полноценная
# нормализация двухскриптовых текстов. Пустой список сохраняет контракт
# API с менеджером правил.
# -----------------------------------------------------------------------------
polskie_znaki: []

# -----------------------------------------------------------------------------
# Русский алфавит – 33 заглавные буквы кириллицы (с Ё), без пробельных
# символов. Используется шифром Цезаря.
# -----------------------------------------------------------------------------
alfabet: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ"

# -----------------------------------------------------------------------------
# Слова-триггеры парсера акцентов в Книге Мира (13.3+).
# core_rezyser.zastosuj_akcenty_uniwersalne строит из этого списка регулярное
# выражение, которое ловит фразы «<слово> X» или «X <слово>» (например,
# «исландский акцент» или «акцент исландский»). Все записи строчными
# буквами — сравниваем с описанием в нижнем регистре. Включаем форму
# творительного падежа («с акцентом») и синоним «говор» (региональный
# говор / диалект), чтобы парсер ловил естественные обороты речи.
# -----------------------------------------------------------------------------
slowo_akcent:
  - "акцент"
  - "акцентом"
  - "говор"
