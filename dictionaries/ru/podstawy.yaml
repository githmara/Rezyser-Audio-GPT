# =============================================================================
#  ОСНОВЫ РУССКОГО ЯЗЫКА
# =============================================================================
#
#  Базовый файл для `dictionaries/ru/`. Движок Poliglota требует, чтобы каждый
#  язык имел этот файл — без него новый язык вообще НЕ обнаруживается.
#
#  Структура построена по образцу `dictionaries/pl/podstawy.yaml`. Имя ключа
#  `polskie_znaki` историческое (поле читается всеми акцентами с флагом
#  `usun_polskie_znaki: true`); менеджер правил ожидает его наличия,
#  поэтому мы его не переименовываем.
# =============================================================================

id: podstawy
jezyk: ru
# 13.4.3: идентификатор lingua-language-detector, используемый движком Poliglota.
# Значение ДОЛЖНО быть именем enum-а `lingua.Language` (заглавными буквами,
# без префикса) — полный список: https://github.com/pemistahl/lingua-py.
# Отсутствие поля отключает язык в детекторе (включается sticky-fallback),
# папка остаётся видимой.
lingua: RUSSIAN
etykieta: "Русский – фонетические основы"
opis: |
  Базовые правила для русского языка:
    1. Нормализация латинских диакритиков (`polskie_znaki`) — каждая
       не-русская буква с акцентом сводится к ближайшему ASCII-эквиваленту,
       чтобы фонетические акценты (cyrillic→latin) видели чистый исходник.
       Кириллические буквы НЕ трогаются — они нативные.
    2. Расширенный алфавит для шифра Цезаря: 33 буквы кириллицы + 26 букв
       латиницы (заглавные). Это делает Цезаря предсказуемым для смешанных
       текстов, в которых часто встречаются латинские названия (Apple,
       Müller, iPhone) — каждый знак из обоих скриптов попадает под сдвиг,
       и читатель не теряет половину названия после декодирования.

# -----------------------------------------------------------------------------
# 13.5: нормализация латинских диакритиков → плоская латиница (ASCII).
# Кириллица сюда НЕ входит — это нативные буквы, и каждый акцент
# `dictionaries/ru/akcenty/<jezyk>.yaml` сам решает, как транслитерировать
# их в нужную целевую латиницу. Эта таблица срабатывает только для
# акцентов с флагом `usun_polskie_znaki: true` ДО `zamiany` — благодаря
# чему нерусские диакритики (заимствования: Pokémon, café, Müller, naïve)
# имеют единственный, плоский ASCII-вариант перед фонетической обработкой.
# -----------------------------------------------------------------------------
polskie_znaki:
  # -- Польские диакритики (заимствования) --
  - { wzor: "ą", zamiana: "a"  }
  - { wzor: "ć", zamiana: "c"  }
  - { wzor: "ę", zamiana: "e"  }
  - { wzor: "ł", zamiana: "l"  }
  - { wzor: "ń", zamiana: "n"  }
  - { wzor: "ó", zamiana: "o"  }
  - { wzor: "ś", zamiana: "s"  }
  - { wzor: "ź", zamiana: "z"  }
  - { wzor: "ż", zamiana: "z"  }
  - { wzor: "Ą", zamiana: "A"  }
  - { wzor: "Ć", zamiana: "C"  }
  - { wzor: "Ę", zamiana: "E"  }
  - { wzor: "Ł", zamiana: "L"  }
  - { wzor: "Ń", zamiana: "N"  }
  - { wzor: "Ó", zamiana: "O"  }
  - { wzor: "Ś", zamiana: "S"  }
  - { wzor: "Ź", zamiana: "Z"  }
  - { wzor: "Ż", zamiana: "Z"  }
  # -- → a --
  - { wzor: "á", zamiana: "a"  }
  - { wzor: "à", zamiana: "a"  }
  - { wzor: "â", zamiana: "a"  }
  - { wzor: "ã", zamiana: "a"  }
  - { wzor: "ä", zamiana: "a"  }
  - { wzor: "å", zamiana: "a"  }
  - { wzor: "Á", zamiana: "A"  }
  - { wzor: "À", zamiana: "A"  }
  - { wzor: "Â", zamiana: "A"  }
  - { wzor: "Ã", zamiana: "A"  }
  - { wzor: "Ä", zamiana: "A"  }
  - { wzor: "Å", zamiana: "A"  }
  # -- → ae --
  - { wzor: "æ", zamiana: "ae" }
  - { wzor: "Æ", zamiana: "Ae" }
  # -- → c --
  - { wzor: "ç", zamiana: "c"  }
  - { wzor: "Ç", zamiana: "C"  }
  # -- → d (исландский Ð/ð) --
  - { wzor: "ð", zamiana: "d"  }
  - { wzor: "Ð", zamiana: "D"  }
  # -- → e --
  - { wzor: "é", zamiana: "e"  }
  - { wzor: "è", zamiana: "e"  }
  - { wzor: "ê", zamiana: "e"  }
  - { wzor: "ë", zamiana: "e"  }
  - { wzor: "É", zamiana: "E"  }
  - { wzor: "È", zamiana: "E"  }
  - { wzor: "Ê", zamiana: "E"  }
  - { wzor: "Ë", zamiana: "E"  }
  # -- → i --
  - { wzor: "í", zamiana: "i"  }
  - { wzor: "ì", zamiana: "i"  }
  - { wzor: "î", zamiana: "i"  }
  - { wzor: "ï", zamiana: "i"  }
  - { wzor: "Í", zamiana: "I"  }
  - { wzor: "Ì", zamiana: "I"  }
  - { wzor: "Î", zamiana: "I"  }
  - { wzor: "Ï", zamiana: "I"  }
  # -- → n --
  - { wzor: "ñ", zamiana: "n"  }
  - { wzor: "Ñ", zamiana: "N"  }
  # -- → o --
  - { wzor: "ò", zamiana: "o"  }
  - { wzor: "ô", zamiana: "o"  }
  - { wzor: "õ", zamiana: "o"  }
  - { wzor: "ö", zamiana: "o"  }
  - { wzor: "ø", zamiana: "o"  }
  - { wzor: "Ò", zamiana: "O"  }
  - { wzor: "Ô", zamiana: "O"  }
  - { wzor: "Õ", zamiana: "O"  }
  - { wzor: "Ö", zamiana: "O"  }
  - { wzor: "Ø", zamiana: "O"  }
  # -- → oe --
  - { wzor: "œ", zamiana: "oe" }
  - { wzor: "Œ", zamiana: "Oe" }
  # -- → ss (немецкий) --
  - { wzor: "ß", zamiana: "ss" }
  # -- → th (исландский Þ/þ) --
  - { wzor: "þ", zamiana: "th" }
  - { wzor: "Þ", zamiana: "Th" }
  # -- → u --
  - { wzor: "ú", zamiana: "u"  }
  - { wzor: "ù", zamiana: "u"  }
  - { wzor: "û", zamiana: "u"  }
  - { wzor: "ü", zamiana: "u"  }
  - { wzor: "Ú", zamiana: "U"  }
  - { wzor: "Ù", zamiana: "U"  }
  - { wzor: "Û", zamiana: "U"  }
  - { wzor: "Ü", zamiana: "U"  }
  # -- → y --
  - { wzor: "ý", zamiana: "y"  }
  - { wzor: "ÿ", zamiana: "y"  }
  - { wzor: "Ý", zamiana: "Y"  }
  - { wzor: "Ÿ", zamiana: "Y"  }

# -----------------------------------------------------------------------------
# Расширенный алфавит для шифра Цезаря: 33 буквы кириллицы + 26 букв латиницы
# (заглавные, без пробельных символов). См. opis выше — двухскриптовый
# алфавит делает Цезаря предсказуемым для смешанных текстов. Можно
# переопределить в `szyfry/cezar.yaml::alfabet`, если потребуется
# чисто-кириллический режим.
# -----------------------------------------------------------------------------
alfabet: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯABCDEFGHIJKLMNOPQRSTUVWXYZ"

# -----------------------------------------------------------------------------
# Слова-триггеры парсера акцентов в Книге Мира (13.3+).
# core_rezyser.zastosuj_akcenty_uniwersalne строит из этого списка регулярное
# выражение, которое ловит фразы «<слово> X» или «X <слово>» (например,
# «исландский акцент» или «акцент исландский»). Все записи строчными
# буквами — сравниваем с описанием в нижнем регистре. Включаем форму
# творительного падежа («с акцентом») и синоним «говор» (региональный
# говор / диалект), чтобы парсер ловил естественные обороты речи.
# -----------------------------------------------------------------------------
slowo_akcent:
  - "акцент"
  - "акцентом"
  - "говор"
