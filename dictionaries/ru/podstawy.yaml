# =============================================================================
#  ОСНОВЫ РУССКОГО ЯЗЫКА
# =============================================================================
#
#  Базовый файл для `dictionaries/ru/`. Движок Poliglota требует, чтобы каждый
#  язык имел этот файл — без него новый язык вообще НЕ обнаруживается.
#
#  Структура построена по образцу `dictionaries/pl/podstawy.yaml`. Поле
#  `polskie_znaki` оставлено пустым списком — в версии 13.x транслитерация
#  диакритики для языков, отличных от польского, не планируется. Имя ключа
#  `polskie_znaki` историческое; менеджер правил ожидает его наличия,
#  поэтому мы его не переименовываем.
# =============================================================================

id: podstawy
jezyk: ru
etykieta: "Русский – фонетические основы"
opis: |
  Базовые правила для русского языка:
    1. Без транслитерации знаков кириллицы (`polskie_znaki: []`) –
       русский язык работает только в кириллическом алфавите и не требует
       преобразования в латиницу.
    2. Русский алфавит (33 заглавные буквы кириллицы) – используется
       шифром Цезаря.

# -----------------------------------------------------------------------------
# Нет диакритических знаков для транслитерации. Пустой список сохраняет
# контракт API с менеджером правил.
# -----------------------------------------------------------------------------
polskie_znaki: []

# -----------------------------------------------------------------------------
# Русский алфавит – 33 заглавные буквы кириллицы (с Ё), без пробельных
# символов. Используется шифром Цезаря.
# -----------------------------------------------------------------------------
alfabet: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ"
