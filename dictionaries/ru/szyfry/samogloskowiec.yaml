# -----------------------------------------------------------------------------
#  ШИФР: ГЛАСОНОСИТЕЛЬ
#  Заменяет каждую гласную на «о» (или «О»). Только третий шаг
#  трёхэтапного польского алгоритма — в русском нет польских
#  смягчающих сочетаний (dzi/ci/ni/si/zi), поэтому шаги 1 и 2 пусты.
# -----------------------------------------------------------------------------
id: samogloskowiec
etykieta: "Гласоноситель (Всё гудит на «О»)"
opis: |
  Эффект «куда ни глянь — одни „О"». В русском алгоритм сводится к
  одному шагу (польская логика смягчения сюда не переносится): каждая
  гласная заменяется на «о» (или «О»).

  Йотированные гласные (е, ё, ю, я) тоже сводятся к «о» — это сильнее
  ломает чтение, чем простая замена твёрдых гласных, но зато
  обеспечивает единообразный «о-эффект» для русского TTS (Милена,
  Ирина), который иначе озвучил бы йотированные буквы как [йо].
iso: ru
kategoria: szyfr
kolejnosc: 40
algorytm: samogloskowiec

# -----------------------------------------------------------------------------
# Шаги 1 и 2 (польская логика смягчения) — для русского пусты.
# Движок принимает пустые списки без ошибок.
# -----------------------------------------------------------------------------
zmiekszenia_przed_samogloska: []
zmiekszenia_przed_spolgloska: []

# -----------------------------------------------------------------------------
# Шаг 3: замена гласных.
# `samogloski_*` — строки символов для класса regex.
# Русские гласные: а е ё и о у ы э ю я (+ заглавные)
# -----------------------------------------------------------------------------
samogloski_male:             "аеёиоуыэюя"
samogloski_wielkie:          "АЕЁИОУЫЭЮЯ"
zamiana_samogloski_male:     "о"
zamiana_samogloski_wielkie:  "О"
