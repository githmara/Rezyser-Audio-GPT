# -----------------------------------------------------------------------------
#  ШИФР: ЦЕЗАРЬ
#  Классический шифр сдвига, переставляет каждую букву на N позиций
#  в расширенном русском алфавите (33 буквы кириллицы + 26 латинских,
#  всего 59 знаков).
# -----------------------------------------------------------------------------
id: cezar
etykieta: "Шифр Цезаря (сдвиг по русскому алфавиту)"
opis: |
  Классический шифр Цезаря: каждая буква сдвигается на N позиций в
  расширенном русском алфавите (АБВ…ЯABC…Z, 59 знаков, без пробелов).
  Знаки вне алфавита (цифры, пунктуация) остаются без изменений.

  Двухскриптовый алфавит — особенность русской пакета: реальные русские
  тексты часто содержат латинские названия (Apple, Müller, iPhone),
  которые НЕ должны транслитерироваться, но должны шифроваться. Цезарь
  с расширенным алфавитом решает эту задачу: латинские буквы вращаются
  внутри того же кольца, что и кириллица. Граница между скриптами
  пересекается обычно (например, +3 от «Я» переходит в «C», а от «X»
  в «А») — это нормальное поведение для расширенного шифра.

  Сдвиг задаётся в графическом интерфейсе (поле «Сдвиг шифра Цезаря»).
  Значение 0 означает «выбрать случайным образом из диапазона 1..58».
iso: ru
kategoria: szyfr
kolejnosc: 60
algorytm: cezar

# Алфавит читается из dictionaries/ru/podstawy.yaml (ключ: alfabet).
# Если хочется использовать чисто-кириллический алфавит (классические
# 33 буквы), раскомментируйте строку и впишите свой набор заглавных букв:
# alfabet: "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ"

# Диапазон допустимых сдвигов в графическом интерфейсе (SpinCtrl).
# 59 букв → сдвиг 59 ≡ 0 (тождество); сдвиги ±1..±58 уникальны.
min_przesuniecie: -59
max_przesuniecie: 59
