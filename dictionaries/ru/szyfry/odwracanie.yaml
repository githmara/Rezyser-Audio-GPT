# -----------------------------------------------------------------------------
#  ШИФР: ОБРАЩАТЕЛЬ ТЕКСТА
#  Раскрывает сокращения и читает каждое предложение задом наперёд.
#  Вдохновение: миссия из игры «The Traitors / Zdrajcy».
# -----------------------------------------------------------------------------
id: odwracanie
etykieta: "Обращатель Текста (Чтение задом наперёд с заглавной)"
opis: |
  Сначала раскрывает популярные русские сокращения (т.е. → «то есть»,
  т.д. → «так далее», и т.д. — список из notebook автора). Благодаря
  этому после переворачивания текст продолжает звучать осмысленно, без
  абсурдных «.е.т» или «.д.т» вместо «т.е.» / «т.д.».
  Затем переворачивает каждое предложение знак за знаком, сохраняя
  знак препинания в конце и заглавную букву нового (перевёрнутого)
  предложения.
iso: ru
kategoria: szyfr
kolejnosc: 10
algorytm: odwracanie

# -----------------------------------------------------------------------------
# Раскрытие сокращений — REGEX (регулярные выражения).
# Каждая пара {wzor, zamiana} применяется ПЕРЕД переворачиванием.
# Источник правил — TODO_wielojezycznosc.md §3.1 (notebook автора проекта,
# https://github.com/githmara/, секция ABBREV_BY_LANG для русского).
# В отличие от notebook (нормализация скоратений), здесь ПРАВАЯ часть
# содержит ПОЛНОЕ словесное раскрытие, чтобы перевёрнутый текст звучал.
# -----------------------------------------------------------------------------
rozwiniecia:
  # --- Многобуквенные сокращения (greedy guard перед короткими) ---
  - { wzor: '\bв\.?\s*т\.?\s*ч\.?\b', zamiana: "в том числе"          }
  - { wzor: '\bи\s+т\.\s*д\.?\b',     zamiana: "и так далее"          }
  - { wzor: '\bи\s+т\.\s*п\.?\b',     zamiana: "и тому подобное"      }

  # --- Двухбуквенные «т.X» сокращения ---
  - { wzor: '\bт\.\s*е\.?\b',         zamiana: "то есть"              }
  - { wzor: '\bт\.\s*д\.?\b',         zamiana: "так далее"            }
  - { wzor: '\bт\.\s*п\.?\b',         zamiana: "тому подобное"        }
  - { wzor: '\bт\.\s*к\.?\b',         zamiana: "так как"              }
  - { wzor: '\bт\.\s*н\.?\b',         zamiana: "так называемый"       }

  # --- «и.о.», «с.г.», «н.э.» ---
  - { wzor: '\bи\.\s*о\.?\b',         zamiana: "исполняющий обязанности" }
  - { wzor: '\bс\.\s*г\.?\b',         zamiana: "сего года"            }
  - { wzor: '\bн\.\s*э\.?\b',         zamiana: "нашей эры"            }

  # --- Звания и должности ---
  - { wzor: '\bпроф\.?\s',            zamiana: "профессор "           }
  - { wzor: '\bакад\.?\s',            zamiana: "академик "            }
  - { wzor: '\bдоц\.?\s',             zamiana: "доцент "              }

  # --- Адреса ---
  - { wzor: '\bул\.?\s',              zamiana: "улица "               }
  - { wzor: '\bпр\.?\s',              zamiana: "проспект "            }
  - { wzor: '\bпер\.?\s',             zamiana: "переулок "            }
