# -----------------------------------------------------------------------------
#  ШИФР: ЗАИКАНИЕ / СЛОМАННЫЙ РОБОТ
#  Добавляет к началу слова повторения первых букв через дефис.
# -----------------------------------------------------------------------------
id: jakanie
etykieta: "Сильное Заикание / Сломанный Робот"
opis: |
  Для каждого слова длиной >= `min_dlugosc_slowa` случайно выбирается
  количество повторений первой (или двух первых) букв и добавляется к
  началу слова через дефис: «компьютер» → «ко-ко-ко-компьютер», «я» → «я»
  (слишком короткое).

  Если вторая буква слова — согласная (отсутствует в строке `samogloski`),
  заикание включает ДВЕ первых буквы — это звучит более естественно
  (например, «привет» → «пр-пр-привет»).
iso: ru
kategoria: szyfr
kolejnosc: 50
algorytm: jakanie

# Параметры алгоритма
min_dlugosc_slowa: 3
min_powtorzen:     1
max_powtorzen:     3

# Гласные — если вторая буква слова принадлежит этому набору, повторяем
# только первую букву. В противном случае — две первых.
# Русские гласные: а е ё и о у ы э ю я (+ заглавные)
samogloski: "аеёиоуыэюяАЕЁИОУЫЭЮЯ"
