# -----------------------------------------------------------------------------
#  ШИФР: ТИПОГЛИКЕМИЯ
#  Перемешивает буквы в середине слова (первая и последняя на местах).
# -----------------------------------------------------------------------------
id: typoglikemia
etykieta: "Типогликемия (Перемешанная середина слов)"
opis: |
  Психолингвистический феномен: если первая и последняя буквы слова
  правильны, человек продолжает читать текст бегло, несмотря на
  перемешанную середину. Слова короче `min_dlugosc_slowa` не
  изменяются. Работает и для кириллицы, и для латинских слов
  (имена собственные, заимствования), благодаря Unicode-классу
  `_REGEX_SLOWA` в core_poliglota.
iso: ru
kategoria: szyfr
kolejnosc: 20
algorytm: typoglikemia

# Параметры алгоритма
min_dlugosc_slowa: 4
