# -----------------------------------------------------------------------------
#  ШИФР: ИСПОРЧЕННЫЙ ТЕЛЕФОН / ЗМЕИНЫЙ ДИАЛЕКТ
#  Растягивает шипящие: каждая «с», «з», «ш», «ж» превращается в долгое шипение.
#  Вдохновение: Snecko из игры Slay The Spire.
# -----------------------------------------------------------------------------
id: waz
etykieta: "Испорченный Телефон (Змеиный диалект, шипение)"
opis: |
  Вдохновлено Snecko из игры «Slay the Spire». Каждое вхождение «с», «з»,
  «ш» или «ж» (независимо от регистра) случайным образом растягивается
  в шипение длиной от `min_syk` до `max_syk` знаков.

  Для русского кроме «с» и «з» добавлены «ш» и «ж» — это типично
  русские шипящие, без них эффект «змеи» был бы слишком слабым по
  сравнению с польским (sz/cz/rz). Двузнаков нет в русском, поэтому
  правило проще: заменяем символ за символом.
iso: ru
kategoria: szyfr
kolejnosc: 30
algorytm: waz

# Параметры алгоритма
min_syk: 4
max_syk: 8

# Regex, ловящий растягиваемые символы (без учёта регистра).
wzor_syku: "(?i)(с|з|ш|ж)"
