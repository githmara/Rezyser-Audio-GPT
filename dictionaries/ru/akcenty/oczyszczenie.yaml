id: oczyszczenie
etykieta: "Никакой (Очистка С нормализацией чисел)"
opis: |
  Не применяет фонетический акцент. Выполняет только процедуру очистки
  текста для речевых синтезаторов (удаляет междометия типа «khh»,
  звёздочки, хеш-теги, последовательности точек) и преобразует цифры в
  слова (например, «123» → «сто двадцать три»).
iso: ru
kategoria: oczyszczenie
kolejnosc: 20
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: false
skleja_pojedyncze_litery: false
