# -----------------------------------------------------------------------------
#  ПОЧИНКА ТЕГОВ (специальный режим)
#  Не модифицирует содержимое — только вставляет ISO-код языка в
#  выходной файл.
# -----------------------------------------------------------------------------
id: naprawiacz_tagow
etykieta: "🔧 Починка Тегов (Только вставка ISO-кода)"
opis: |
  Этот «акцент» НЕ изменяет содержимое текста и его фонетику.
  Он только вставляет ISO-код языка в выходной файл:
    - HTML: атрибут lang="..." в теге <html>
    - DOCX: элемент <w:lang w:val="..."/> для каждого пробега текста
  Благодаря этому программа экранного чтения (NVDA/JAWS) корректно
  переключает голос синтезатора на нужный язык.

  ISO-код задаётся вручную в GUI (поле «ISO-код»), а не из этого
  файла — поэтому значение `iso` здесь пустое.
iso: ""
kategoria: naprawiacz
kolejnosc: 100

# Специальный режим — НЕ запускает ни одного этапа обработки текста.
czysc_tekst_tts: false
normalizuj_liczby: false
usun_polskie_znaki: false
skleja_pojedyncze_litery: false
zamiany: []
