# -----------------------------------------------------------------------------
#  АНГЛИЙСКИЙ АКЦЕНТ (русский → английский TTS)
#  Для синтезаторов: Samantha / Mark / Zira / Hazel (английский TTS).
# -----------------------------------------------------------------------------
id: angielski
etykieta: "Английский (напр. Samantha / Mark / Zira / Hazel)"
opis: |
  Транслитерирует русский текст в латиницу так, чтобы английский
  синтезатор (Samantha / Mark / Zira / Hazel) прочитал его с
  естественным русским акцентом. В отличие от обратной транслитерации
  (английский → кириллица для Милены), здесь мы передаём текст
  английскому голосу и подсовываем ему написание, в котором английская
  фонология автоматически воспроизводит характерные русские черты:
  «KH» для Х (велярное /x/, главный маркер русского акцента), «ZH»
  для Ж, «SHCH» для Щ.

  Ключевые отображения:
    - Многобуквенные триграфы и диграфы (greedy guard):
        Щ → SHCH, Ш → SH, Ч → CH, Ж → ZH, Х → KH, Ц → TS
    - Йотированные гласные: Ё → YO, Ю → YU, Я → YA, Е → YE
    - И → I, Й → Y
    - Ъ и Ь — удаляются (английский TTS не имеет аналогов)
    - Остальные кириллические буквы 1:1 латинскими эквивалентами
      (А → A, Б → B, … Я → YA).

  ПРИМЕЧАНИЕ для лингвистов: это НЕ академическая транслитерация
  (ISO 9, GOST, BGN/PCGN). Цель — чисто фонетическая: чтобы английский
  TTS звучал по-русски акцентированно. Для правильной транслитерации
  имён собственных используй специальные инструменты.
iso: en
kategoria: akcent
kolejnosc: 40

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
# Латинские диакритики (заимствования) нормализуются podstawy.yaml::polskie_znaki
# до плоской ASCII-латиницы ДО запуска `zamiany` — чтобы Müller, café, naïve
# не остались с диакритикой, которую английский TTS произнесёт неуверенно.
usun_polskie_znaki: true
# Склейка одиночных латинских букв (regex [a-z]) актуальна — итог
# транслитерации латиница, и иногда «А.B.C» нужно склеить.
skleja_pojedyncze_litery: true

# -----------------------------------------------------------------------------
# КРИТИЧЕСКИЙ ПОРЯДОК ЗАМЕН:
#   1. Многобуквенные кириллические согласные (Щ, Ш, Ч, Ж, Х, Ц) — ПЕРЕД
#      одиночными буквами, иначе Ш → ... сначала разорвёт Щ.
#      В этой группе Щ должен идти ПЕРВЫМ (он содержит Ш как подстроку
#      после транслитерации, но кириллический исходник Щ ≠ Ш).
#   2. Йотированные гласные (Ё, Ю, Я, Е).
#   3. Й (отдельно — должно быть до общего И).
#   4. Одиночные согласные и гласные → латиница.
#   5. Мягкий/твёрдый знак — удаляются.
# -----------------------------------------------------------------------------
zamiany:
  # --- 1. Многобуквенные согласные ---
  - { wzor: "Щ", zamiana: "Shch" }
  - { wzor: "щ", zamiana: "shch" }
  - { wzor: "Ш", zamiana: "Sh"   }
  - { wzor: "ш", zamiana: "sh"   }
  - { wzor: "Ч", zamiana: "Ch"   }
  - { wzor: "ч", zamiana: "ch"   }
  - { wzor: "Ж", zamiana: "Zh"   }
  - { wzor: "ж", zamiana: "zh"   }
  - { wzor: "Х", zamiana: "Kh"   }
  - { wzor: "х", zamiana: "kh"   }
  - { wzor: "Ц", zamiana: "Ts"   }
  - { wzor: "ц", zamiana: "ts"   }

  # --- 2. Йотированные гласные ---
  - { wzor: "Ё", zamiana: "Yo"   }
  - { wzor: "ё", zamiana: "yo"   }
  - { wzor: "Ю", zamiana: "Yu"   }
  - { wzor: "ю", zamiana: "yu"   }
  - { wzor: "Я", zamiana: "Ya"   }
  - { wzor: "я", zamiana: "ya"   }
  - { wzor: "Е", zamiana: "Ye"   }
  - { wzor: "е", zamiana: "ye"   }
  - { wzor: "Э", zamiana: "E"    }
  - { wzor: "э", zamiana: "e"    }

  # --- 3. Й (до общей И) ---
  - { wzor: "Й", zamiana: "Y"    }
  - { wzor: "й", zamiana: "y"    }

  # --- 4. Одиночные кириллические буквы → латиница ---
  - { wzor: "А", zamiana: "A"    }
  - { wzor: "а", zamiana: "a"    }
  - { wzor: "Б", zamiana: "B"    }
  - { wzor: "б", zamiana: "b"    }
  - { wzor: "В", zamiana: "V"    }
  - { wzor: "в", zamiana: "v"    }
  - { wzor: "Г", zamiana: "G"    }
  - { wzor: "г", zamiana: "g"    }
  - { wzor: "Д", zamiana: "D"    }
  - { wzor: "д", zamiana: "d"    }
  - { wzor: "З", zamiana: "Z"    }
  - { wzor: "з", zamiana: "z"    }
  - { wzor: "И", zamiana: "I"    }
  - { wzor: "и", zamiana: "i"    }
  - { wzor: "К", zamiana: "K"    }
  - { wzor: "к", zamiana: "k"    }
  - { wzor: "Л", zamiana: "L"    }
  - { wzor: "л", zamiana: "l"    }
  - { wzor: "М", zamiana: "M"    }
  - { wzor: "м", zamiana: "m"    }
  - { wzor: "Н", zamiana: "N"    }
  - { wzor: "н", zamiana: "n"    }
  - { wzor: "О", zamiana: "O"    }
  - { wzor: "о", zamiana: "o"    }
  - { wzor: "П", zamiana: "P"    }
  - { wzor: "п", zamiana: "p"    }
  - { wzor: "Р", zamiana: "R"    }
  - { wzor: "р", zamiana: "r"    }
  - { wzor: "С", zamiana: "S"    }
  - { wzor: "с", zamiana: "s"    }
  - { wzor: "Т", zamiana: "T"    }
  - { wzor: "т", zamiana: "t"    }
  - { wzor: "У", zamiana: "U"    }
  - { wzor: "у", zamiana: "u"    }
  - { wzor: "Ф", zamiana: "F"    }
  - { wzor: "ф", zamiana: "f"    }
  - { wzor: "Ы", zamiana: "Y"    }
  - { wzor: "ы", zamiana: "y"    }

  # --- 5. Мягкий и твёрдый знаки — удаляются ---
  - { wzor: "Ъ", zamiana: ""     }
  - { wzor: "ъ", zamiana: ""     }
  - { wzor: "Ь", zamiana: ""     }
  - { wzor: "ь", zamiana: ""     }
