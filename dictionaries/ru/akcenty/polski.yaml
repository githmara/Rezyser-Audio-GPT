# -----------------------------------------------------------------------------
#  ПОЛЬСКИЙ АКЦЕНТ (русский → польский TTS)
#  Для синтезаторов: Ewa / Adam / Maja (польский TTS).
# -----------------------------------------------------------------------------
id: polski
etykieta: "Польский (напр. Ewa / Adam / Maja)"
opis: |
  Транслитерирует русский текст в польское написание так, чтобы польский
  синтезатор (Ewa / Adam / Maja) прочитал его с естественным русским
  акцентом (зеркальная пара к pl/akcenty/rosyjski.yaml).

  Польский и русский фонологически близки, поэтому транслитерация
  естественна:
    - Ш → SZ, Щ → Śś, Ч → ć, Ж → Ż, Х → CH, Ц → C
    - Ё → IO, Ю → IU, Я → IA, Е → IE (на старте слова или после гласной),
      Е → E (после согласной — польский TTS читает E мягко)
    - Й → J, И → I, Ы → Y
    - В → W (польская w = /v/), У → U
    - Ъ, Ь — удаляются (мягкость в польском помечается смягчением
      следующей гласной, что мы уже сделали через Я/Ю/Ё/Е)

  Известные ограничения:
    - Польский TTS не различает русское ударение, но это естественная
      особенность акцента — русский, говорящий по-польски, тоже не
      всегда расставляет польские ударения корректно.
iso: pl
kategoria: akcent
kolejnosc: 35

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: true
skleja_pojedyncze_litery: true

# -----------------------------------------------------------------------------
# КРИТИЧЕСКИЙ ПОРЯДОК ЗАМЕН:
#   1. Многобуквенные согласные (Щ → ŚŚ ПЕРЕД Ш → SZ, иначе Ш → ... +
#      Ч → ... разрушит Щ).
#   2. Х → CH (диграф ПЕРЕД одиночными буквами).
#   3. Йотированные гласные.
#   4. Одиночные буквы.
#   5. Мягкий/твёрдый знак — удаляются.
# -----------------------------------------------------------------------------
zamiany:
  # --- 1. Многобуквенные согласные ---
  - { wzor: "Щ", zamiana: "Śś" }
  - { wzor: "щ", zamiana: "śś" }
  - { wzor: "Ш", zamiana: "Sz"   }
  - { wzor: "ш", zamiana: "sz"   }
  - { wzor: "Ч", zamiana: "Ć"   }
  - { wzor: "ч", zamiana: "ć"   }
  - { wzor: "Ж", zamiana: "Ż"    }
  - { wzor: "ж", zamiana: "ż"    }
  - { wzor: "Х", zamiana: "Ch"   }
  - { wzor: "х", zamiana: "ch"   }
  - { wzor: "Ц", zamiana: "C"    }
  - { wzor: "ц", zamiana: "c"    }

  # --- 2. Йотированные гласные ---
  - { wzor: "Ё", zamiana: "Io"   }
  - { wzor: "ё", zamiana: "io"   }
  - { wzor: "Ю", zamiana: "Iu"   }
  - { wzor: "ю", zamiana: "iu"   }
  - { wzor: "Я", zamiana: "Ia"   }
  - { wzor: "я", zamiana: "ia"   }
  - { wzor: "Е", zamiana: "Ie"   }
  - { wzor: "е", zamiana: "ie"   }
  - { wzor: "Э", zamiana: "E"    }
  - { wzor: "э", zamiana: "e"    }

  # --- 3. Й до И ---
  - { wzor: "Й", zamiana: "J"    }
  - { wzor: "й", zamiana: "j"    }

  # Бонус: нормализируем окончание инфинитива. Настоящий Поляк в начале учёбы создаёт звук вида [ć] из-за интерференции, а синтезатор речи, говорящий "wstawat" просто не звучит вообще ни как русский, ни как польский. Автор (студент Русской Филологии и носитель польского языка) решает применить подобное правило также в случае возвратных глаголов, хотя возможно, что в данных случаях потребуется regex.
  - { wzor: "ть", zamiana: "ć"   }
  - { wzor: "сь", zamiana: "ś"   }

  # --- 4. Одиночные буквы ---
  - { wzor: "А", zamiana: "A"    }
  - { wzor: "а", zamiana: "a"    }
  - { wzor: "Б", zamiana: "B"    }
  - { wzor: "б", zamiana: "b"    }
  - { wzor: "В", zamiana: "W"    }
  - { wzor: "в", zamiana: "w"    }
  - { wzor: "Г", zamiana: "G"    }
  - { wzor: "г", zamiana: "g"    }
  - { wzor: "Д", zamiana: "D"    }
  - { wzor: "д", zamiana: "d"    }
  - { wzor: "З", zamiana: "Z"    }
  - { wzor: "з", zamiana: "z"    }
  - { wzor: "И", zamiana: "I"    }
  - { wzor: "и", zamiana: "i"    }
  - { wzor: "К", zamiana: "K"    }
  - { wzor: "к", zamiana: "k"    }
  - { wzor: "Л", zamiana: "L"    }
  - { wzor: "л", zamiana: "l"    }
  - { wzor: "М", zamiana: "M"    }
  - { wzor: "м", zamiana: "m"    }
  - { wzor: "Н", zamiana: "N"    }
  - { wzor: "н", zamiana: "n"    }
  - { wzor: "О", zamiana: "O"    }
  - { wzor: "о", zamiana: "o"    }
  - { wzor: "П", zamiana: "P"    }
  - { wzor: "п", zamiana: "p"    }
  - { wzor: "Р", zamiana: "R"    }
  - { wzor: "р", zamiana: "r"    }
  - { wzor: "С", zamiana: "S"    }
  - { wzor: "с", zamiana: "s"    }
  - { wzor: "Т", zamiana: "T"    }
  - { wzor: "т", zamiana: "t"    }
  - { wzor: "У", zamiana: "U"    }
  - { wzor: "у", zamiana: "u"    }
  - { wzor: "Ф", zamiana: "F"    }
  - { wzor: "ф", zamiana: "f"    }
  - { wzor: "Ы", zamiana: "Y"    }
  - { wzor: "ы", zamiana: "y"    }

  # --- 5. Знаки — удаляются ---
  - { wzor: "Ъ", zamiana: ""     }
  - { wzor: "ъ", zamiana: ""     }
  - { wzor: "Ь", zamiana: ""     }
  - { wzor: "ь", zamiana: ""     }
