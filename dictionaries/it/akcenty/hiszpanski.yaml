# -----------------------------------------------------------------------------
#  ACCENTO SPAGNOLO (italiano → TTS spagnolo)
#  Per i sintetizzatori: Pablo / María / Carmen (TTS spagnolo).
# -----------------------------------------------------------------------------
id: hiszpanski
etykieta: "Spagnolo (es. Pablo / María / Carmen)"
opis: |
  Adatta il testo italiano al sintetizzatore vocale spagnolo
  (Pablo / María / Carmen). Italiano e spagnolo sono lingue sorelle —
  la compatibilità fonetica di base è molto alta.

  Compatibilità naturale italiano-spagnolo:
    - h   — muta in entrambe le lingue ✓
    - r   — r vibrante spagnola ≈ r vibrante italiana ✓
    - gn  — spagnolo non ha /ɲ/ da "gn" (usa "ñ") → accento spagnolo naturale
    - vocali a/e/i/o/u — corrispondenza diretta ✓

  Problema critico — il digramma ch:
    - ch + e/i = /k/ in italiano ("chiesa" = /kjɛza/)
      Il TTS spagnolo legge "ch" come /tʃ/ ("chiesa" → /tʃjeza/): errato.
      Correzione: che → ke, chi → ki.
    - gh + e/i = /g/ in italiano → il TTS spagnolo legge in modo imprevedibile.
      Correzione: ghe → ge, ghi → gi.

  Accenti naturali dello spagnolo sull'italiano (lasciati intenzionalmente):
    - c + e/i = /tʃ/ in italiano, spagnolo (castigliano) legge come /θ/ → accento spagnolo
    - g + e/i = /dʒ/ in italiano, spagnolo legge come /x/ → accento spagnolo forte
    - z = /ts/ in italiano, spagnolo legge come /θ/ o /s/ → accento spagnolo
    - v = /v/ in italiano, spagnolo legge come /b/ → accento spagnolo (b/v identici in spagnolo)
    - gli = /ʎ/ → spagnolo legge come /gli/ → accento spagnolo
iso: es
kategoria: akcent
kolejnosc: 65

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: true
skleja_pojedyncze_litery: true

# --- Sostituzioni fonetiche ---
zamiany:
  # --- ch + e/i → k (CRITICO: spagnolo ch=/tʃ/, italiano ch=/k/) ---
  - { wzor: "Che", zamiana: "Ke"  }
  - { wzor: "che", zamiana: "ke"  }
  - { wzor: "CHE", zamiana: "KE"  }
  - { wzor: "Chi", zamiana: "Ki"  }
  - { wzor: "chi", zamiana: "ki"  }
  - { wzor: "CHI", zamiana: "KI"  }

  # --- gh + e/i → g (italiano gh=/g/, spagnolo imprevedibile) ---
  - { wzor: "Ghe", zamiana: "Ge"  }
  - { wzor: "ghe", zamiana: "ge"  }
  - { wzor: "GHE", zamiana: "GE"  }
  - { wzor: "Ghi", zamiana: "Gi"  }
  - { wzor: "ghi", zamiana: "gi"  }
  - { wzor: "GHI", zamiana: "GI"  }
