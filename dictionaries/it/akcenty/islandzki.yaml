# -----------------------------------------------------------------------------
#  ACCENTO ISLANDESE (italiano → TTS islandese)
#  Per i sintetizzatori: Dóra / Gunnar / Ísrún (TTS islandese).
# -----------------------------------------------------------------------------
id: islandzki
etykieta: "Islandese (es. Dóra / Gunnar / Ísrún)"
opis: |
  Adatta il testo italiano al sintetizzatore vocale islandese
  (Dóra / Gunnar / Ísrún).

  Compatibilità naturale italiano-islandese:
    - v   = /v/ in entrambi ✓
    - j   = /j/ in entrambi ✓ (raro in italiano, ma compatibile)
    - r   — r vibrante islandese ≈ r vibrante italiana ✓

  Problema critico — il digramma ch:
    - ch + e/i = /k/ in italiano ("chiesa" = /kjɛza/)
      L'islandese non usa "ch" nativamente; il TTS potrebbe leggerlo come
      /x/ o in modo imprevedibile. Correzione: che → ke, chi → ki.
    - gh + e/i = /g/ in italiano → TTS islandese imprevedibile.
      Correzione: ghe → ge, ghi → gi.

  Accenti naturali dell'islandese sull'italiano (lasciati intenzionalmente):
    - c + e/i = /tʃ/ in italiano, islandese legge come /k/ → accento islandese
    - g + e/i = /dʒ/ in italiano, islandese legge come /g/ → accento islandese
    - z = /ts/ in italiano, islandese legge come /z/ → accento islandese
    - h muta italiana → TTS islandese legge come /h/ → accento islandese
    - gli = /ʎ/ → islandese legge come /gli/ → accento islandese
    - gn = /ɲ/ → islandese legge come /gn/ → accento islandese
iso: is
kategoria: akcent
kolejnosc: 55

# --- Pipeline ---
czysc_tekst_tts: true
normalizuj_liczby: true
usun_polskie_znaki: true
skleja_pojedyncze_litery: true

# --- Sostituzioni fonetiche ---
zamiany:
  # --- ch + e/i → k (CRITICO: italiano ch=/k/, islandese incerto) ---
  - { wzor: "Che", zamiana: "Ke"  }
  - { wzor: "che", zamiana: "ke"  }
  - { wzor: "CHE", zamiana: "KE"  }
  - { wzor: "Chi", zamiana: "Ki"  }
  - { wzor: "chi", zamiana: "ki"  }
  - { wzor: "CHI", zamiana: "KI"  }

  # --- gh + e/i → g (italiano gh=/g/, islandese imprevedibile) ---
  - { wzor: "Ghe", zamiana: "Ge"  }
  - { wzor: "ghe", zamiana: "ge"  }
  - { wzor: "GHE", zamiana: "GE"  }
  - { wzor: "Ghi", zamiana: "Gi"  }
  - { wzor: "ghi", zamiana: "gi"  }
  - { wzor: "GHI", zamiana: "GI"  }
