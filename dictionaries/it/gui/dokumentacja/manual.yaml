  Nuove funzioni e cambiamenti nella versione 13.0 — Release Candidate

  - Refactoring in YAML — accenti, cifrari e modalità del Regista in file di testo (CAMBIAMENTO ARCHITETTONICO, il più grande dai tempi della migrazione a wxPython). Fino alla versione 12.0, tutte le regole fonetiche (accenti) e le modalità creative del Regista (Brainstorming, Script, Audiobook, post-produzione dei titoli) erano "incorporate" nel codice Python come costanti, funzioni e stringhe rigide nei prompt, e l'intera categoria dei cifrari/giochi di parole semplicemente non esisteva — sono introdotti insieme al refactoring 13.0. Nella versione 13.0, tutto questo si trova nei file .yaml nella nuova cartella `dictionaries/` — il motore (`core_poliglota.py`, `core_rezyser.py`, `przepisy_rezysera.py`) li carica dinamicamente all'avvio. Effetto pratico: aggiungere un nuovo accento, un nuovo cifrario basato su sostituzioni o cambiare il tono del prompt di sistema per una delle modalità del Regista non richiede conoscenze di Python — basta un editor di testo. Una breve descrizione per gli utenti finali si trova in `docs/dictionaries.pl.txt` (incluso nei pacchetti delle Releases); la documentazione tecnica completa del formato — in `dictionaries/README.md` (solo nel repository Git, poiché i pacchetti di rilascio filtrano i file .md).

  - Gestore delle Regole — quarto strumento nella barra (NOVITÀ, Ctrl+4). Esploratore visivo della cartella `dictionaries/` con albero dei file YAML (wx.TreeCtrl nativo, pieno supporto NVDA) e insieme di azioni: "Apri in editor di testo", "Nuovo file di regole…" (creatore con scelta del tipo: accento, cifrario, modalità, nuova lingua), "Duplica file selezionato", "Elimina file", "Aggiorna albero". Per i casi che vanno oltre le semplici sostituzioni (nuova lingua di base, cifrario algoritmico) il creatore genera un prompt pronto da copiare per il chatbot AI — spiegazione completa nel nuovo PASSO 7b.

  - Prompt dell'Architetto direttamente nel pannello del Regista (CAMBIAMENTO A11y). Finora il prompt per il chatbot esterno per generare il Libro del Mondo viveva solo in questa istruzione — l'utente doveva copiarlo da un file di testo (cosa che con i lettori di schermo può essere problematica con caratteri polacchi e virgolette). Nella versione 13.0 il pannello del Regista ha un nuovo pulsante "📖 Prompt dell'Architetto per AI…" (proprio sotto "Salva Libro in modo permanente"), che apre una finestra di dialogo nativa con il testo completo del prompt in un campo READONLY e un pulsante separato "Copia negli appunti". Il modello A11y è identico a quello per la finestra di dialogo dei risultati del creatore nel Gestore delle Regole — NVDA legge immediatamente tutto il contenuto della finestra senza configurazioni aggiuntive. Descrizione completa nel PASSO 7 aggiornato.

  - Accento russo nel Poliglotta (NOVITÀ — ottava lingua europea nel menu del Regista). Alla lista a discesa "Modalità del Regista / Accenti" si aggiunge l'opzione "Russo (es. Milena / Irina / Yuri / Pavel)". A differenza degli altri accenti, che solo "corrompono" il testo polacco a livello di lettere latine (es. "sz" → "sh", "w" → "v"), l'accento russo esegue una completa traslitterazione del testo polacco in cirillico — in modo che le voci del sintetizzatore TTS russo (Vocalizer Milena, OneCore Irina / Pavel / Yuri, eSpeak "ru") abbiano su cosa "pronunciare" le parole. Arricchito il mapping con vocali jotate ("ja" → "я", "je" → "е", "jo" → "ё", "ju" → "ю"), ammorbidimenti polacchi si/ci/ni/zi + vocale (es. "ciocia" → "цёця"), nonché digrammi speciali russi: "ść" / "szcz" → "щ", "sz" → "ш", "cz" → "ч", "rz" → "ж", "ch" → "х".

    Nota fonetica: L'accento non è una traslitterazione accademica russa (ISO 9, GOST, BGN/PCGN). L'obiettivo è solo quello di far sembrare foneticamente il testo polacco simile al russo — per esigenze di sintesi vocale, non per una seria traslitterazione di nomi propri. Per quest'ultimo lavoro usa strumenti linguistici dedicati.

    Codice lingua per il file di output: "ru" (ISO 639-1). NVDA con l'opzione "Cambia lingua automaticamente quando supportato" attivata passerà immediatamente alla voce russa.

  - Nota su "ź": In russo non esiste un equivalente esatto del polacco "ź", quindi questo carattere viene normalizzato a "ж" — come anche "ż". Alcuni dialetti del nord russo e il bielorusso pronunciano "ź" più vicino a "зь", ma dal punto di vista del sintetizzatore vocale la differenza è trascurabile. Se un linguista preferisse "зь", può sostituire autonomamente questa singola regola nel file `dictionaries/pl/akcenty/rosyjski.yaml` — il motore carica i YAML dinamicamente, quindi non richiede la ricompilazione dell'applicazione.

  - Barra di navigazione estesa e menu Strumenti (CAMBIAMENTO). La barra ha ora un quarto pulsante — Gestore delle Regole — e il menu "Strumenti" supporta il nuovo shortcut Ctrl+4. Gli shortcut esistenti (Ctrl+0 Pagina principale, Ctrl+1 Regista, Ctrl+2 Poliglotta, Ctrl+3 Convertitore) rimangono invariati.

  - Pulsante "Aggiorna accenti del Regista da YAML" nella Pagina principale (NOVITÀ). Dopo aver aggiunto un nuovo accento tramite il Gestore delle Regole (o modifica manuale del file YAML) cliccando questo pulsante si ricaricano i wrapper accento_* nel motore del Poliglotta e del Regista, in modo che il nuovo accento sia visibile nel menu e nel rilevamento automatico degli accenti basato sui tag dei personaggi nel Libro del Mondo. Il Poliglotta rileva i YAML automaticamente (senza aggiornamento), ma il Regista necessita di rigenerazione dei wrapper — di solito dopo l'aggiornamento è necessario riavviare l'applicazione.

