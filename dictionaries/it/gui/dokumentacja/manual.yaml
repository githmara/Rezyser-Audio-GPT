id: manual
tresc: |
  Manuale del Regista Audio AI - Guida Completa (Versione {app.wersja})

  Benvenuto nello Studio di Registrazione Ibrido! Questo set di strumenti consente di scrivere, pianificare, formattare e tradurre automaticamente sceneggiature per radiodrammi e audiolibri. È stato ottimizzato per lavorare con sintetizzatori vocali professionali e motori locali di lettori di schermo (NVDA).

  Il set è composto dallo studio principale (Regia), dallo strumento per traduzioni e accenti (Poliglotta), dallo strumento per costruire la struttura del file (Architetto Audiolibri) e — dalla versione 13.0 — dal Manager delle Regole, in cui senza Python puoi aggiungere un nuovo accento, cifrario o modalità creativa (vedi PASSO 7b sotto). Tutti e quattro gli strumenti sono disponibili in una sola finestra del programma, commutabile tramite pulsanti sulla barra o scorciatoie da tastiera Ctrl+1..Ctrl+4.



  PASSO 1: Primo avvio (Cross-Platform)

  L'applicazione è completamente portatile e pronta per funzionare su sistema Windows. Basta entrare nella cartella ed eseguire il file run.bat (facendo doppio clic su di esso o creando un collegamento sul desktop). Si aprirà una finestra terminale temporanea (scompare automaticamente) e dopo un momento apparirà la finestra principale del programma — {app.nazwa}. Nessun browser, nessun server in background. Quando hai finito di lavorare, chiudi semplicemente la finestra del programma.


  Importante: La cartella runtime/ è parte esclusivamente dei pacchetti pronti per Windows scaricabili dalla scheda Releases su GitHub. Contiene un ambiente Python isolato pronto all'uso senza installazione. Se cloni il repository, questa cartella non c'è e non dovrebbe esserci — usi allora l'ambiente virtuale venv descritto nella sezione per sviluppatori sotto.

  --- Per Sviluppatori (Windows — repository Git) ---

  1. Clona il repository sul tuo disco.
  2. Esegui il file setup_dev.bat. Lo script creerà automaticamente un ambiente virtuale Python (venv) e installerà tutte le dipendenze richieste dal file requirements.txt.
  3. Avvia l'applicazione con il comando python main.py o tramite il file run_dev.bat — lo script rileverà automaticamente la cartella venv e avvierà il programma.

  --- Per Sviluppatori e utenti comuni (macOS / Linux) ---

  1. Clona il repository sul tuo disco.
  2. Apri il terminale nella cartella del progetto e assegna i permessi di esecuzione agli script: chmod +x *.sh
  3. Esegui lo script di configurazione: ./setup_dev.sh — lo script creerà l'ambiente venv e installerà le dipendenze.
  4. Avvia l'applicazione: python main.py o ./run.sh


  Cosa vedrai all'avvio: All'avvio del programma si apre una finestra con la schermata iniziale. Troverai una breve descrizione degli strumenti disponibili e una sezione "{home.heading_system_check}". Se la chiave API non è ancora configurata, vedrai un messaggio rosso che informa che i moduli basati su AI (Regia, Traduttore) non funzioneranno — le funzioni locali gratuite (accenti, Architetto) sono però attive subito. La configurazione della chiave è descritta nel passo successivo.


  Aggiornamenti automatici

  L'applicazione verifica all'avvio se su GitHub è disponibile una versione più recente — il controllo avviene in background e non blocca l'interfaccia.

  Se hai installato il programma tramite il file di installazione (.exe): quando viene rilevata una versione più recente, apparirà una finestra di dialogo che chiede se vuoi scaricarla. Dopo la conferma si avvierà una barra di avanzamento e, una volta completato il download, l'applicazione si chiuderà automaticamente e il nuovo programma di installazione si avvierà da solo — i tuoi progetti e la chiave API rimangono intatti.

  Se utilizzi il repository Git (sviluppatori e utenti macOS/Linux): invece di una proposta di download, vedrai una notifica sulla nuova versione con un collegamento diretto alla pagina di rilascio su GitHub. Scarica da lì l'archivio „Source code" oppure aggiorna il repository con il comando git pull.


  PASSO 2: Alimentazione API (Chiave OpenAI)

  Perché l'intelligenza artificiale possa funzionare, ha bisogno di accedere ai server OpenAI (creatori di ChatGPT).

  1. Crea un account su platform.openai.com e ricarica l'account nella scheda Billing.
  2. Genera una chiave nella scheda API Keys (inizia con sk-proj-). Attenzione: la chiave viene visualizzata solo una volta — al momento della creazione. Se chiudi la finestra senza copiarla, va persa irrimediabilmente e dovrai revocarla (opzione revoke secret key) e generarne una nuova. Copiala subito, prima di cliccare su qualsiasi cosa.
  3. Nella schermata iniziale del programma clicca sul pulsante "{home.btn_generate}". Il sistema creerà automaticamente un file di configurazione pulito nel posto giusto e aprirà il Blocco Note con un modello pronto per la modifica.
  4. Nel file aperto vedrai la riga OPENAI_API_KEY=QUI_INCOLLA_LA_TUA_CHIAVE. Rimuovi il testo segnaposto e incolla la tua chiave copiata direttamente dopo il segno di uguale (senza spazi). Salva il file e riavvia l'applicazione.

  Suggerimento: Dopo il riavvio, l'applicazione controllerà il file e mostrerà un messaggio verde nella sezione "{home.heading_system_check}" — significa che tutti i moduli AI sono pronti per lavorare. Altrimenti ti dirà chiaramente cosa non va e ti permetterà di aprire l'editor di testo per correggere rapidamente l'errore.


  PASSO 3: Studio di Regia Principale

  Questo è il tuo centro di comando per inventare storie e scrivere sceneggiature. Accedi ad esso cliccando sul pulsante "{main.btn.rezyser}" sulla barra dei pulsanti o selezionando Strumenti → {main.menu.rezyser} dal menu (scorciatoia: Ctrl+1).



  IMPORTANTE: Formato dei file di progetto — ritorno al .txt

  Nella versione 7 i file di progetto venivano salvati in formato Markdown (.md), ad esempio script/anestesia.md. Era un esperimento deliberato — il formato .md doveva costituire una barriera psicologica per le persone non tecniche, scoraggiandole dall'aprire e modificare manualmente il file nel Blocco Note (e quindi dal danneggiare accidentalmente le intestazioni della struttura).

  L'esperimento non ha funzionato. L'AI spesso infrange uno dei divieti fondamentali (ne parleremo più avanti). Per questo motivo nella versione 8 si è tornati ai semplici file .txt — più intuitivi e leggibili per tutti. Ad esempio, un progetto chiamato "anestesia" ora si salverà come script/anestesia.txt, e il suo riassunto come script/anestesia_riassunto.txt. Questo permetterà a chiunque di apportare facilmente correzioni registiche o tagli al testo.

  ⚠️ REGOLA CRITICA DEL MONTATORE (LEGGI PRIMA DI INIZIARE!) ⚠️

  Tutti i tuoi script e libri generati vengono salvati in semplici file di testo (.txt), che puoi facilmente aprire nel Blocco Note.

  Come Regista hai PIENO DIRITTO (e anzi l'obbligo) di modificare questo file! Se l'intelligenza artificiale si spinge troppo oltre e ad esempio risolve da sola il problema dei protagonisti alla fine del frammento generato, apri il file, elimina le ultime righe e lascia il testo interrotto nel momento più teso, prima di svuotare la memoria, ricaricare il file per ricaricare la finestra contestuale e cliccare su "{rezyser.btn_wyslij_label}" per continuare.

  🔴 TUTTAVIA - COSA NON PUOI TOCCARE:

  Non modificare mai, eliminare o cambiare le righe contenenti la struttura (ad esempio, Atto 1, Scena 2, Capitolo 1, Prologo). Se rovini queste intestazioni:
  1. La tua storia si disintegrerà nei lettori di schermo (NVDA).
  2. L'Architetto dell'audiolibro, e quindi anche lo Studio Eleven Labs, non sarà in grado di dividere correttamente il tuo libro in frammenti da leggere.
  3. Il Convertitore interno dell'applicazione non genererà un indice corretto nel file Word né sulla timeline in ElevenLabs.

  Modifica i dialoghi, taglia l'azione, ma lascia la struttura intatta!


  Come usare la Regia?

  - Libro del Mondo (barra laterale a sinistra): Qui inserisci le regole dell'universo. Ogni progetto ha ora il proprio Libro associato al nome del file — se il tuo file di storia è ad esempio emilia_heist_audiobook.txt, il Libro del Mondo si salverà come script/emilia_heist_audiobook.md. Pertanto, l'ordine è importante: prima inserisci il nome del file del progetto nel campo "Nome del file del progetto", e solo dopo puoi salvare il Libro. Il pulsante "{rezyser.btn_zapisz_ksiege_label}" rimane grigio finché non fornisci un nome. Caricare un progetto esistente con il pulsante "{rezyser.btn_wczytaj_label}" caricherà automaticamente anche il file .md corrispondente — non devi fare nulla manualmente. Nota: Senza il Libro del Mondo compilato, l'applicazione bloccherà l'invio di richieste all'AI — è una protezione deliberata che ti protegge dal generare testo senza alcuna regola.
  - Memoria a Lungo Termine (barra laterale a sinistra): Il secondo campo nella barra laterale. Qui l'AI salva automaticamente il riassunto della trama quando la memoria inizia a riempirsi. Puoi anche inserire qui le tue note manualmente — il modello le tratterà come "cosa già so" prima di leggere la scena corrente.
  - Modalità Brainstorming: Inserisci un'idea vaga e l'AI ti darà 3 opzioni di sviluppo della trama. Per ogni opzione genererà subito un blocco "--- BOZZA PROMPT ---". Dopo aver scelto una di esse, incolla questo prompt nella Modalità Script o Audiobook e inserisci eventuali commenti o informazioni per il modello. La memoria della trama non cambia durante il Brainstorming — puoi sperimentare senza rischi!
  - Modalità Script Grezzo: Incolli qui la "Bozza Prompt" generata nel Brainstorming. L'AI scriverà un lungo frammento con tag completi [Speaker X: Nome - emozione] per i dialoghi e effetti [SFX: ...] per i suoni. Il testo si aggiunge automaticamente al tuo file (ad esempio nuova_scena.txt) nella cartella script/.
  - Modalità Audiobook Tradizionale: Modalità per scrittori. L'AI genera prosa letteraria pura — zero tag, zero fonetica, dialoghi classici intrecciati nella narrazione. Il testo si aggiunge al file allo stesso modo della Modalità Script.
  - Creazione automatica dei personaggi: Lo script è programmato per creare automaticamente nuovi tag [Speaker] se la trama richiede un nuovo personaggio. Suggerimento: Se l'AI crea un personaggio interessante, copia il suo tag e incollalo nel Libro del Mondo, così il modello lo ricorderà per sempre!

  Gestione del progetto — tre pulsanti di azione:
  - {rezyser.btn_wczytaj_label}: Carica un file di progetto esistente nella memoria. Disponibile solo quando la memoria è vuota e il nome del file è stato inserito.
  - Cancella corrente (lascia Riassunto): Cancella solo la storia corrente. Il riassunto nella Memoria a Lungo Termine e il Libro del Mondo rimangono conservati — ideale per continuare un lungo libro dopo aver generato il riassunto.
  - Chiudi Progetto (Reset Completo): Cancella completamente il progetto. Rimuove la storia, il riassunto, il Libro del Mondo e azzera tutti i contatori. Usalo quando cambi progetto o inizi una nuova storia.

  Nota storica — perché le modalità sono ora protette da cambiamenti accidentali:

  Nelle versioni precedenti dell'applicazione, nessuno controllava la coerenza del modo creativo all'interno di un singolo progetto. Il risultato era una certa possibilità creativa sottile, che si potrebbe descrivere così: inizi la storia in Modalità Script, inserisci "Atto 1" e "Scena 1" (l'applicazione è entusiasta della tua coerenza), generi alcune schermate di tensione con tag [SFX: Scricchiolio di porta] e [Speaker 1: Marco - rassegnato]... e poi — perché ti è venuta l'ispirazione — clicchi su "Inserisci taglio Capitolo 1". L'applicazione senza battere ciglio aggiunge l'intestazione "Capitolo 1" al file, subito dopo "Scena 3". Ora hai nel file un ibrido tra un radiodramma degli anni '50 e un romanzo di costume. ElevenLabs guarda questa struttura, vede l'intestazione del capitolo nel mezzo di un atto e decide che probabilmente è un errore nella matrice. L'indice appare come un'opera di un artista d'avanguardia. L'Architetto Audiolibri, d'altra parte, presume che tu sia un adulto e lo elabora semplicemente senza dire nulla — ma anche senza alcuna garanzia di risultato. Dalla versione 12.0, l'interfaccia blocca semplicemente la possibilità di cambiare modalità di registrazione quando c'è già una storia in memoria. Il Brainstorming è sempre disponibile — puoi tramare senza limiti.

  Prompt da Showrunner — AI come sceneggiatore di serie TV (dalla versione 7, mantenuto)

  Questo è il cambiamento più grande introdotto nella versione 7, mantenuto senza modifiche. Non è visibile nell'interfaccia, ma cambia radicalmente la qualità della trama generata.

  Lo Showrunner è, nell'industria televisiva, la persona responsabile dell'intera serie — si assicura che la trama non tenda mai a una facile risoluzione, ma si infittisca costantemente, accumuli conflitti e tenga lo spettatore in tensione per molte stagioni. Nella versione 7, questa filosofia è stata incorporata direttamente nelle istruzioni di sistema dell'AI.

  Direttiva Anti-Closure — stato nella versione 8

  Nonostante il test di diversi approcci, il divieto Anti-Closure viene spesso infranto dal modello, specialmente in Modalità Audiolibro Tradizionale. L'AI ha una forte tendenza a "chiudere" la storia a ogni occasione — inserisce frasi che riassumono la trama, crea falsi happy ending o chiude i fili narrativi nel mezzo di un capitolo, come se ogni frammento fosse l'ultimo. Il risultato è che il frammento successivo inizia da zero, senza continuità naturale.

  Ecco perché è così importante la regola del montatore descritta sopra: se l'AI infrange il divieto e chiude la scena da sola, il tuo compito come Regista è aprire il file .txt, eliminare quelle ultime frasi e lasciare il testo interrotto in un momento di tensione prima di ricaricarlo nell'applicazione.

  Ogni modalità ha una direttiva Anti-Closure incorporata:

  - Brainstorming: L'AI agisce come uno sceneggiatore di una serie multi-stagione. Ognuna delle 3 opzioni proposte DEVE accumulare ostacoli, introdurre nuovi dilemmi, fili narrativi aperti e cliffhanger. Assoluto divieto di proporre opzioni in cui i protagonisti si riconciliano permanentemente, superano l'ostacolo principale senza conseguenze significative o la storia tende a una fine affrettata. Divieto di inventare luoghi magici economici che infrangono l'architettura del mondo.
  - Modalità Script Grezzo: Assoluto divieto di concludere il testo con riassunti, morali o chiusure. L'AI deve interrompere l'azione naturalmente in un momento di tensione (cliffhanger), evitando conclusioni, affinché il frammento successivo possa prendere il controllo della narrazione senza problemi.
  - Modalità Audiolibro Tradizionale: Assoluto divieto di concludere il testo con riassunti patetici, chiusure di fili narrativi o suggerimenti di fine storia (es. "Era pronta per nuove sfide", "Capì che era ora di andare avanti"). Il testo deve interrompersi nel mezzo dell'azione in corso, della tensione o di un pensiero aperto.

  Eccezione alla regola: Se chiedi esplicitamente una conclusione, un finale o un epilogo, l'AI genererà una chiusura soddisfacente della storia — il divieto non si applica quando lo richiedi tu stesso.

  Gestione di Atti e Scene (Modalità Script, dalla versione 7, mantenuto)

  La Modalità Script Grezzo ha un pannello dedicato "{rezyser.struktura_heading}" con pulsanti per costruire la struttura del radiodramma in tempo reale.

  - Inserisci Atto X: Inserisce l'intestazione dell'atto (es. "Atto 2") E automaticamente aggiunge sotto di esso "Scena 1" — perché ogni nuovo atto inizia con la prima scena. Il contatore degli atti passa al numero successivo e il contatore delle scene si resetta a 2 (pronto per la scena successiva in quell'atto).
  - Inserisci Scena X: Inserisce solo l'intestazione della scena (es. "Scena 3") all'interno dell'atto corrente. Il contatore delle scene aumenta automaticamente.

  Caricamento intelligente del file: Quando carichi un file di script esistente, l'applicazione lo scansiona automaticamente e imposta i contatori di atti e scene sui numeri corretti. Il contatore delle scene è sempre calcolato all'interno dell'ultimo atto nel file.

  Prologo ed Epilogo: I pulsanti "{rezyser.btn_prolog_label}" e "{rezyser.btn_epilog_label}" sono comuni a entrambe le modalità e disponibili nello stesso pannello.

  L'Architetto Audiolibri convertirà automaticamente gli Atti in punti di navigazione principali (Heading 1) per ElevenLabs e NVDA — le Scene diventeranno testo in grassetto visibile nel documento, ma invisibile nell'indice.

  Gestione Intelligente dei Capitoli (Modalità Audiolibro, dalla versione 5, mantenuto)

  LLM genera al massimo circa 5000 caratteri per richiesta — troppo poco per un capitolo completo. Pertanto, lavori iterativamente: generi frammenti successivi con il pulsante "Invia a AI" fino a quando non ritieni che il capitolo sia pronto. Poi clicchi su "Inserisci taglio capitolo" — l'applicazione aggiunge l'intestazione al file e alla memoria, e il contatore dei capitoli passa automaticamente al numero successivo.

  Pulsanti nel pannello:

  - Inserisci taglio (Capitolo X): Inserisce l'intestazione (es. "Capitolo 3") nel file e nella memoria. Il contatore dei capitoli si aggiorna automaticamente.
  - Inserisci Prologo: Funziona solo all'inizio, quando la memoria è vuota. Protezione contro l'inserimento accidentale del Prologo nel mezzo della storia.
  - Inserisci Epilogo: Chiude la storia. Dopo aver inserito l'Epilogo con contenuto, l'applicazione bloccherà la generazione di nuovi frammenti — è intenzionale, perché dopo la conclusione della storia non c'è più nulla da aggiungere.

  Caricamento intelligente del file: Quando carichi un file esistente, l'applicazione lo scansiona automaticamente e imposta il contatore dei capitoli sul numero corretto. Se il file ha un Prologo e tre capitoli, il contatore mostrerà "Capitolo 4" — senza contare manualmente.

  Accumulator di Trama — come funziona la memoria AI

  Nella memoria del modello va solo il testo pulito della storia — ciò che l'AI ha effettivamente scritto. Le istruzioni, le opzioni e i piani scompaiono dopo l'uso e non ingombrano il contesto. Risultato? Il modello mantiene la concentrazione più a lungo, ricorda meglio gli accenti dei personaggi e raramente "sfugge" alle regole del Libro del Mondo.

  L'indicatore "Memoria del Modello" sullo schermo mostra quanto spazio occupa già la tua storia:
  - Verde (fino a 150.000 caratteri): Il modello è completamente concentrato, hai un margine di sicurezza.
  - Giallo (150.000 – 175.000 caratteri): Ti stai avvicinando al limite. L'AI potrebbe iniziare a ridurre le dichiarazioni e ignorare le regole. Inizia a chiudere lentamente il filo narrativo.
  - Rosso (oltre 175.000 caratteri): Sovraccarico critico!

  Memoria Infinita (dalla versione 6, mantenuto)

  Quando si accende l'allarme rosso, non devi più copiare manualmente il riassunto. Inserisci nel Brainstorming un comando contenente la parola "riassunto" o "sommario" — l'AI genererà una pillola concisa di conoscenza sull'intera trama fino a quel momento. Poi clicca sul pulsante "Salva Riassunto (permanente)" — l'applicazione crea automaticamente un file _riassunto.txt nella cartella script/ e lo protegge da sovrascrittura accidentale. Dopo aver salvato, svuota la memoria e puoi continuare a creare nel file corrente. Caricherai il riassunto nel campo Memoria a Lungo Termine prima della prossima sessione — e puoi continuare la storia all'infinito, senza alcun limite di lunghezza. Devi solo ricordare che se l'intero file della storia supera i 175.000 caratteri, per poter interrompere il lavoro in sicurezza e tornarci in seguito, devi generare e salvare il Riassunto della storia. L'AI ora aggiunge anche alcuni degli ultimi paragrafi della storia al momento della scrittura del riassunto.

  Riassunto automatico: Quando la memoria entra in stato di allarme, il Brainstorming si commuta automaticamente in modalità di emergenza — invece di generare subito opzioni, crea prima un riassunto dettagliato dell'intera trama fino a quel momento e lo salva nei tag <RIASSUNTO>. L'applicazione rileva questi tag e trasferisce automaticamente il riassunto nel campo Memoria a Lungo Termine. Zero lavoro manuale!

  Caricamento intelligente con file di riassunto: Quando carichi un progetto che ha già un file di riassunto salvato (es. anestesia_riassunto.txt), l'applicazione carica automaticamente il riassunto nella Memoria a Lungo Termine e lascia la Memoria Corrente vuota. In questo modo non sprechi token per ricaricare l'intera storia — il modello conosce il contesto dal riassunto ed è pronto per una continuazione infinita.

  PASSO 4: Post-produzione in Regia

  Dopo aver scritto la storia, hai a disposizione uno strumento di post-produzione disponibile nella parte inferiore del pannello di Regia (compare solo in Modalità Audiolibro).

  Assegnazione dei Titoli ai Capitoli (Modalità Audiolibro)

  L'AI analizzerà l'intera storia e proporrà titoli descrittivi e letterari per ogni capitolo (e eventuale Prologo ed Epilogo). Il modulo itera sui capitoli del file salvato e assegna loro un breve titolo, analizzando solo l'inizio di ogni capitolo (fino a 6000 caratteri). Restituisce solo un elenco numerato di titoli — senza riscrivere il contenuto del libro.

  Nota: Il modulo richiede che il file sia già salvato sul disco (generato o caricato). Se il file non esiste, l'applicazione mostrerà un messaggio appropriato.

  PASSO 5: Poliglotta AI

  Applicazione per traduzioni e imposizione di accenti forti sui sintetizzatori dei lettori di schermo. Accedi a essa cliccando sul pulsante "{main.btn.poliglota}" sulla barra dei pulsanti o selezionando Strumenti → {main.menu.poliglota} dal menu (scorciatoia: Ctrl+2).

  Modalità 1: Traduttore Semplice (Usa AI - A Pagamento)

  Ideale per ascoltare storie in una lingua straniera bella e corretta.

  - Carica il file con il pulsante "{poliglota.btn_wczytaj}" o utilizzando il pulsante "Sfoglia..." per selezionare il file nella finestra di sistema.
  - Seleziona la modalità "Traduttore AI", inserisci la lingua di destinazione (es. "Finlandese").
  - Lo script tradurrà il contenuto. Se carichi un file .html, tradurrà solo il testo visibile al lettore e aggiornerà il codice della lingua nel tag html.

  - Se carichi un normale file .txt o .md (ad esempio, uno script generato dalla Regia), lo script, dopo la traduzione, salverà automaticamente il risultato come file .html con il tag linguistico incorporato — pronto per essere letto da NVDA senza alcun lavoro aggiuntivo.
  - Supporta anche file .docx.

  Divisione intelligente in blocchi: I testi lunghi vengono automaticamente suddivisi in blocchi fino a 10.000 caratteri e tradotti sequenzialmente con una barra di avanzamento.

  Salvataggio del progresso a prova di guasto (NOVITÀ nella versione 9): Ogni blocco tradotto viene immediatamente salvato in un file temporaneo nascosto nella cartella di sistema dell'applicazione. Se la traduzione viene interrotta a causa dell'esaurimento del limite API, al successivo avvio l'applicazione rileverà automaticamente questo file, ripristinerà il progresso già pagato e completerà tranquillamente il lavoro dal punto di interruzione — senza alcuna copia manuale. Dopo il completamento con successo, il file temporaneo viene automaticamente eliminato.

  Perché è importante? Nella versione 8, l'approccio alla ripresa della traduzione aveva un errore critico e silenzioso: se non si rinominava il file con la traduzione parziale e si tagliava il frammento tradotto secondo le istruzioni, e poi si riprendeva immediatamente la traduzione del resto — l'applicazione apriva il file di output in modalità sovrascrittura. Il progresso pagato veniva cancellato in modo irreversibile e inconsapevole, prima che potessi accorgertene. La versione 9 elimina completamente questa trappola: il salvataggio è permanente dopo ogni blocco, indipendentemente da ciò che fai dopo.

  Modalità 2: Modalità Regia / Accenti (Gratuita - Funziona localmente)

  Strumento per "alterare" il testo. Impone accenti spezzati sui sintetizzatori di lettura dello schermo.

  Il menu a tendina integrato della Modalità Regia consente di selezionare l'accento direttamente da un'unica lista. Le opzioni disponibili sono:
  Inglese (Samantha / Mark — Vocalizer/Apple, Zira / Hazel — OneCore)
  Russo (Milena — Vocalizer/Apple, Irina / Pavel / Yuri — OneCore, eSpeak)
  Francese (Thomas / Amelie — Vocalizer/Apple, Julie — OneCore)
  Tedesco (Markus / Stefan — Vocalizer/Apple, Hedda / Katja — OneCore)
  Spagnolo (Jorge / Monica — Vocalizer/Apple, Helena — OneCore)
  Islandese (Gudrun — OneCore, eSpeak; nota: Vocalizer non supporta questa lingua!)
  Italiano (Alice / Luca — Vocalizer/Apple, Elsa — OneCore)
  Finlandese (Satu / Mikko — Vocalizer/Apple, Heidi — OneCore)
  E anche due opzioni di pulizia senza accento:
  "Nessuno (Pulizia SENZA normalizzazione dei numeri)"
  "Nessuno (Pulizia CON normalizzazione dei numeri)"
  L'opzione con normalizzazione dei numeri converte automaticamente le cifre nel loro equivalente verbale (es. 15 diventa "quindici") prima dell'elaborazione — in modo che NVDA legga i numeri in modo fluido, e se il testo ha un accento forzato, anche il numero lo avrà, senza eccezioni.
  Vi chiederete se il sintetizzatore sarà in grado di declinare tali numeri normalizzati a seconda del contesto? La risposta è: no. E questo è un feature intenzionale. Come è noto: "la lingua polacca è difficile" — e uno straniero che storpia la nostra grammatica aggiunge solo autenticità all'accento spezzato!

  Correttore di Tag (NOVITÀ nella versione 9): Alla fine della lista troverai un'opzione aggiuntiva — Correttore di Tag. Non applica alcuna regola fonetica o di pulizia. Fa una sola cosa: inietta nel file il codice ISO a due lettere della lingua che hai fornito (es. "fi" per il finlandese, "en" per l'inglese). Utile quando hai già un file pronto — ad esempio tradotto in precedenza dal Traduttore AI — ma per qualche motivo è uscito con un tag linguistico errato o mancante. Invece di tradurlo di nuovo, basta eseguire il Correttore con il codice ISO corretto e in pochi istanti avrai un file corretto.

  Lo script pulisce le didascalie registiche tra parentesi — rimuove interi frammenti di testo racchiusi tra parentesi tonde (es. "(con respiri incorporati)", "(sussurrando)", "(ironicamente)"). ElevenLabs deve leggere solo dialoghi e narrazione, non istruzioni registiche incorporate nel testo.

  Lo script pulisce anche i marcatori Markdown — rimuove gli hashtag dei titoli (es. #, ##, ###), i segni di uguale usati come sottolineature dei titoli e le virgole orfane che potrebbero disturbare il ritmo di lettura del sintetizzatore.

  - Scudo protettivo: Lo script protegge tutti i tag HTML. Alterano solo dialoghi e narrazione.
  - Funziona localmente e non costa nulla!

  Modalità 3: Cifrante (NOVITÀ nella 13.0 — giochi di testo, gratuiti, locali)

  Il terzo RadioButton in Poliglotta, accanto al Traduttore AI e alla Modalità Regia: "Modalità Cifrante (giochi di testo, inceppamenti casuali)". Attiva sei algoritmi locali che distorcono il testo — per giochi, enigmi, rompicapi linguistici. Dopo aver selezionato la modalità, appare un menu a tendina di algoritmi, e per uno di essi (Cifrario di Cesare) un campo numerico aggiuntivo per lo spostamento.

  Algoritmi disponibili (seleziona nel menu "Scegli algoritmo distorcente"):

  - Invertitore di Testo (Lettura al contrario con lettera maiuscola) — ogni frase viene invertita carattere per carattere, mantenendo il punto/esclamativo/punto interrogativo alla fine e la lettera maiuscola all'inizio. Prima di invertire, lo script espande gli acronimi comuni (es., ad es., cosiddetto, cioè, dott. ecc.), in modo che il risultato dopo l'inversione abbia ancora senso — senza questo, "es." dopo l'inversione diventa l'assurdo ".se".

    Ispirazione: missione dal programma "The Traitors. Traditori". Quando la conduttrice senza preavviso ha mostrato ai partecipanti una popolare canzone polacca da un cartone animato — semplicemente riprodotta al contrario — le reazioni erano del tipo "che lingua è?", "sembra armeno", "ungherese o finlandese". La missione vera e propria consisteva nel fatto che una squadra riceveva nel bosco il testo della canzone scritto al contrario, doveva cantarlo in questa forma invertita, l'altra squadra lo registrava, lo riproduceva dall'inizio alla fine — e in teoria recuperava la canzone originale da indovinare. Esattamente lo stesso divertente malinteso fonetico genera il nostro Invertitore, quando fai passare il file elaborato attraverso un sintetizzatore TTS.

  - Tipoglicemia (Centro delle parole mescolato) — classico effetto psicologico-linguistico: "Non puoi leggere il testo in qualsiasi ordine di lettere, se la prima e l'ultima lettera sono al loro posto". Lo script mescola casualmente il centro di ogni parola più lunga di 4 caratteri, la prima e l'ultima lettera rimangono intatte. Ottimo per il test "quanto vedo davvero e quanto il mio cervello si immagina".

  - Telefono Rotto / Dialetto Serpente — ogni "s", "z" o digramma "sz" viene allungato casualmente in un sibilo lungo 4-8 caratteri ("ssssss", "zzzzzz", "ssssssz"). Ispirazione: Snecko dal gioco "Slay the Spire". Effetto: il testo suona come se fosse letto da un serpente con un difetto di pronuncia.

  - Vocalizzatore (Tutto rimbomba su "O") — ogni vocale nel testo viene sostituita con "o", mantenendo le morbidezze polacche. "Buongiorno" → "Buongiorno". Più lungo è il testo, più divertente è l'effetto (e il lettore di schermo lo legge con piena convinzione).

  - Forte Balbuzie / Robot Danneggiato — aggiunge balbuzie all'inizio delle parole: "co-co-co-computer", "do-do-do-doccia". Per le parole brevi (meno di 3 caratteri) l'algoritmo le ignora. Se la seconda lettera della parola è una consonante, ripete le prime due lettere (effetto più naturale); se è una vocale, ripete solo la prima.

  - Cifrario di Cesare (spostamento dell'alfabeto PL) — classico cifrario a sostituzione: ogni lettera viene spostata di N posizioni nell'alfabeto polacco (AĄBCĆ…ZŻŹ, 35 caratteri). Inserisci il valore di spostamento nel campo numerico "Spostamento cifrario di Cesare (0 = casuale, intervallo -35…35)". Se inserisci 0 — l'applicazione sceglierà casualmente uno spostamento nell'intervallo 1-34 e lo mostrerà in un messaggio al termine (in modo che tu possa poi decifrare). I caratteri al di fuori dell'alfabeto (numeri, punteggiatura, spazi) rimangono invariati.

  Applicazione pratica: i cifrari salvano il risultato nello stesso formato della Modalità Regia (.html con tag lang o .docx con tag XML), quindi NVDA li leggerà con la voce della lingua appropriata. In particolare, l'Invertitore e il Vocalizzatore suonano nel sintetizzatore molto più interessanti che quando li leggi con gli occhi — perché il cervello durante la lettura visiva cerca automaticamente di "decodificare" il testo, mentre il TTS lo legge esattamente come è scritto.

  Tutti e sei i cifrari sono descritti anche in un linguaggio più ampio e accessibile nel file docs/dictionaries.pl.txt nel pacchetto dell'applicazione — insieme a consigli su come aggiungere un proprio cifrario del tipo "sostituzione lettere" senza conoscenze di programmazione (es. linguaggio gergale scolastico, linguaggio-trava).

  Rilevamento della lingua

  Prima che lo script "alteri" il testo, verifica in quale lingua è scritto. Se rileva che non è polacco, visualizzerà un avviso. Le regole fonetiche sono adattate alla lingua polacca — applicarle a un testo in lingua straniera darebbe effetti imprevedibili.

  Accenti ottimizzati per i sintetizzatori locali (NVDA)

  Gli accenti sono stati progettati al 100% per i sintetizzatori di lettura dello schermo locali, gratuiti e a pagamento — Vocalizer ed eSpeak in NVDA. Questo garantisce stabilità e prevedibilità dell'effetto su ogni computer.

  Perché non ElevenLabs? I test su documenti più lunghi hanno dimostrato che l'alterazione fonetica del testo in motori come ElevenLabs non impone l'accento desiderato — il motore semplicemente "indovina" la lingua e da essa piuttosto crea un accento slavo occidentale/meridionale. I sintetizzatori locali NVDA sono molto più obbedienti in questo senso.

  Specificità dei sintetizzatori locali (TTS)

  Diversi motori TTS si comportano in modo diverso. Di seguito le differenze chiave che influenzano direttamente il funzionamento degli accenti:

  eSpeak (Open Source)
  Motore leggero e gratuito con un'enorme base di lingue — supporta, tra gli altri, l'islandese. Molto rigoroso nella codifica dei caratteri, il che lo rende prevedibile. Ha però difetti fonetici: spesso condivide i fonemi tra le lingue, per cui ad esempio l'ucraino suona con un accento russo.

  Nuance Vocalizer
  Motore commerciale a pagamento, integrato gratuitamente nei dispositivi Apple (VoiceOver). Offre una qualità di pronuncia molto naturale. Importante limitazione: NON SUPPORTA tutte le lingue — MANCANZA di voce islandese. Per il finlandese è disponibile Satu, per l'italiano Alice.

  Come scaricare Vocalizer su Windows?
  Vocalizer non è integrato nel sistema Windows — sono componenti aggiuntivi a pagamento per NVDA distribuiti dalla società Tiflotecnia. L'installazione si compone di due fasi: scaricare il driver e le voci stesse.

  - Acquisto e download del driver: Vai sul sito tiflotecnia.com (il modulo di acquisto è in inglese), acquista la licenza e accedi alla sezione "Downloads" per scaricare il file del driver. Nota importante per NVDA: La sottopagina "Downloads" è un incubo architettonico — le intestazioni sono in inglese, la navigazione in portoghese, e l'intera pagina ha un tag linguistico portoghese iniettato nel codice! Anche se attivi il traduttore nel browser, tradurrà il contenuto, ma di solito non rimuoverà il tag linguistico dal codice. Di conseguenza, il lettore di schermo potrebbe tentare di leggere la pagina in inglese-polacco con un accento portoghese molto spezzato. Non lasciarti scoraggiare da questo e disabilita temporaneamente il cambio automatico della lingua, poi semplicemente traduci la pagina e scarica il driver!
  - Download delle voci: Il solo driver non è sufficiente — dopo la sua installazione, NVDA mostrerà un errore di caricamento del sintetizzatore. Per risolvere questo problema, devi scaricare separatamente i pacchetti delle voci che intendi utilizzare (ad esempio, la voce polacca Ewa per la lettura fluida dei controlli di sistema e la voce finlandese Satu per gli accenti in Poliglotta).
  Nota: Ricorda di riattivare il cambio automatico della lingua dopo aver chiuso la sottopagina, per evitare delusioni in seguito!
  - Installazione rapida: I file scaricati sono pacchetti di plugin NVDA (hanno estensione .nvda-addon). Non è necessario cercare la loro installazione tramite NVDA -> Strumenti -> Add-on Store. Se NVDA è attivo, basta "aprire" questi file nel modo consueto (premendo Invio). Windows potrebbe nascondere la loro estensione, ma il tooltip li leggerà correttamente come "File pacchetto plugin NVDA". Il lettore chiederà se desideri installare il plugin.
  Dopo aver installato il driver e le voci e riavviato il lettore, Vocalizer apparirà nell'elenco dei sintetizzatori nelle impostazioni di NVDA e non dovrebbe mostrare errori.

  Microsoft OneCore
  Voci gratuite integrate nel sistema Windows (Mobile Voices). Un buon compromesso tra qualità e disponibilità delle lingue. Offre alta qualità e supporta la lingua islandese (Gudrun), finlandese (Heidi) e italiana (Elsa). Nota: OneCore non supporta nativamente il cambio automatico della lingua basato sui tag lang (a meno che non si utilizzi il lettore di schermo integrato nel sistema, Narratore) — vedi la sezione seguente.

  Come scaricare le voci OneCore su Windows? Le voci OneCore sono gratuite, ma la maggior parte delle lingue non è installata di default. Per scaricare le lingue mancanti, vai su Impostazioni di Windows → Ora e lingua → Voce → Gestisci voci (o "Aggiungi voci"). Seleziona la lingua dall'elenco (ad esempio, Islandese, Finlandese, Italiano) e fai clic su Scarica. Dopo il download, la voce apparirà automaticamente in NVDA — senza alcuna configurazione aggiuntiva.

  Apple (iPhone / iPad / Mac) — VoiceOver con Vocalizer
  Nei dispositivi Apple, il motore Vocalizer è integrato nativamente nel sistema operativo e supporta tutte le lingue senza acquisti aggiuntivi. Tuttavia, di default sono installate le versioni compatte delle voci, che suonano un po' meccaniche. Per ottenere un suono molto migliore e più naturale, vale la pena scaricare le versioni estese o premium:
  - Su iPhone/iPad: Impostazioni → Accessibilità → VoiceOver → Voce → seleziona la lingua (ad esempio, Finlandese) → tocca il nome della voce (ad esempio, Satu) → vedrai le opzioni "Estesa" e "Premium". Scarica la versione scelta — occupa più spazio su disco, ma la differenza di qualità è evidente.
  - Su Mac: Preferenze di sistema (o Impostazioni di sistema) → Accessibilità → VoiceOver → Apri Utility VoiceOver → Voce → clicca su "Personalizza" accanto alla voce selezionata e scarica la versione estesa o premium.

  Android — Vocalizer a pagamento per ogni voce
  Su Android, Vocalizer è disponibile come app nel Google Play Store (cerca "Vocalizer TTS"). Nota: ogni lingua e voce si acquista separatamente — non esiste una licenza unica per tutto. Prima dell'acquisto, puoi testare la voce per alcuni minuti in modalità demo. Dopo l'acquisto, la voce è associata al tuo account Google e può essere installata su qualsiasi dispositivo con lo stesso account.

  Funzione Killer per non vedenti: File con tag linguistici

  Questa è una vera rivoluzione. I file elaborati ora si salvano come:

  - .html con attributo lang (ad esempio, lang="fi" per il finlandese) — NVDA legge questo tag e cambia automaticamente la voce sul sintetizzatore linguistico appropriato. Zero configurazione manuale!
  - .docx mantenendo la formattazione — ogni run di testo ha iniettato il tag linguistico nel documento XML, quindi Word e NVDA sanno con quale voce leggere ogni frammento.

  I file elaborati si salvano sempre come NUOVI documenti (ad esempio, accento_Finlandese.html).

  Cambio automatico della lingua in NVDA — cosa devi sapere

  Perché NVDA cambi effettivamente la voce in base al tag lang, deve essere abilitata l'impostazione "Cambia automaticamente la lingua quando supportato". La trovi in Preferenze NVDA → Voce. Di default è abilitata al primo avvio del lettore — ma vale la pena controllare se qualcuno l'ha disabilitata.

  Importante limitazione delle voci OneCore: Le voci Microsoft OneCore non supportano nativamente questo meccanismo con NVDA, ma solo con il lettore di schermo integrato nel sistema Windows, Narratore. Esiste un plugin non ufficiale per NVDA chiamato "One Core Autolang", che cerca di risolvere questo problema — ma il suo sviluppo è stato rapidamente interrotto. La ragione è semplice: ogni anno, con la prima versione di NVDA dell'anno, ci sono cambiamenti che rompono la compatibilità delle API (cosiddetti API Breaking Changes). A volte basta aggiornare il campo "last tested version" nel manifesto del plugin, ma a volte sono richieste vere modifiche nel codice — e l'autore non riesce a tenere il passo con gli aggiornamenti. Se ti interessa il cambio automatico della lingua, una scelta più sicura sono Vocalizer o eSpeak, che supportano questo meccanismo nativamente, anche se nel primo caso devi anche considerare la temporanea indisponibilità del driver aggiornato delle voci Vocalizer per l'ultima versione di NVDA a causa di quanto descritto qualche frase prima. In tal caso avrai la scelta:
  - Non aggiornare NVDA - le voci funzioneranno sicuramente, ma non avrai accesso a nuove potenziali funzionalità, miglioramenti o correzioni di bug.
  - Aggiornare NVDA e forzare l'attivazione del plugin sovrascrivendo la compatibilità (introdotto abbastanza recentemente, funzionerà se finora era necessario solo aggiornare il manifesto). Altrimenti... beh, c'era l'avvertimento che lo fai a tuo rischio.

  PASSO 6: Architetto degli Audiolibri

  Strumento per preparare una struttura professionale del file per i lettori di schermo e ElevenLabs. Accedi cliccando il pulsante "{main.btn.konwerter}" sulla barra dei pulsanti o selezionando Strumenti → {main.menu.konwerter} dal menu (scorciatoia: Ctrl+3).

  Come funziona?

  1. Inserisci il percorso del file sorgente nel campo di testo o clicca il pulsante "Sfoglia..." per selezionare un file nella finestra di dialogo di sistema. Lo script accetta sia .txt che .docx, oltre a file .html e .htm.
  2. Clicca "{konwerter.btn_buduj}".
  3. Lo script scansiona ogni riga di testo e trasforma le parole chiave (Atto, Capitolo, Prologo, Epilogo, Introduzione) in intestazioni "Heading 1" nel documento Word.
  4. Le scene (righe che iniziano con la parola "Scena") si trasformano in testo in grassetto — visibili nel documento, ma invisibili nell'indice di ElevenLabs.
  5. Tutto il resto del testo (dialoghi, descrizioni) passa senza modifiche.
  6. Riceverai un file architettura_[nome_originale].docx — un Word professionale pronto per ulteriori lavori. Ad esempio, se il tuo file di input si chiamava insensibilità.txt, il file di output sarà chiamato architettura_insensibilità.docx e apparirà nella stessa cartella dell'originale.

  Pulizia contestuale: Lo script rimuove automaticamente i tag HTML (se il testo proviene dal browser o da un file .html locale, ad esempio generato da Poliglotta) e i marcatori di intestazione Markdown (ad esempio, ### o ####) prima dell'elaborazione. Non è necessario pulire il file manualmente.

  Grande vantaggio per gli utenti NVDA e ElevenLabs

  Il formato "Heading 1" per i capitoli non è solo estetica. In NVDA puoi navigare rapidamente tra le intestazioni premendo il tasto H (o 1 per le intestazioni di primo livello). Invece di scorrere centinaia di pagine, salti da un capitolo all'altro in una frazione di secondo. Questo cambia il modo di lavorare con documenti lunghi. In ElevenLabs hai la certezza che il motore inserirà automaticamente i tagli e non si bloccherà durante la regia dei clip audio.

  PASSO 7: Come scrivere il Libro del Mondo (Prompt dell'Architetto e Mini-corso Markdown)

  L'intelligenza artificiale che alimenta lo Studio Principale comprende meglio i comandi quando sono formattati nel linguaggio di markup Markdown. Se fornisci all'AI nel Regista solo un'idea vaga (ad esempio, "due sorelle nell'aldilà"), la macchina andrà in panico per mancanza di dettagli e creerà una storia banale e prevedibile, ignorando la logica.

  Per evitare ciò, usa un chatbot esterno (ad esempio, il gratuito ChatGPT o Claude) come tuo Architetto personale. Nella versione 13.0 non devi più trascrivere il prompt dalle istruzioni — nel pannello del Regista, appena sotto il pulsante "{rezyser.btn_zapisz_ksiege_label}", troverai il pulsante "{rezyser.btn_prompt_architekta_label}". Cliccalo e si aprirà una finestra di dialogo con il testo del prompt pronto nel campo "solo lettura" e un pulsante "Copia negli appunti". NVDA annuncia l'intero contenuto appena si apre la finestra — basta cliccare "Copia", incollare (Ctrl+V) in ChatGPT/Claude e sostituire il frammento "[QUI INSERISCI LA TUA IDEA]" con il tuo spunto di trama.

  Perché così e non copiando dalle istruzioni? Il dialogo nell'interfaccia grafica ha un vantaggio chiave in termini di accessibilità: è nativo e letto senza interruzioni dal lettore di schermo, non richiede di passare a un editor di testo (dove le "virgolette" polacche e le virgolette possono essere copiate male) e funziona identicamente su ogni sistema operativo. Lo stesso schema — dialogo con prompt da copiare — è utilizzato anche nel Gestore delle Regole (vedi PASSO 7b sotto).

  Come risponde l'AI: In risposta riceverai un testo in due parti. La prima è il Libro del Mondo racchiuso in un blocco di codice Markdown (marcatori ```markdown … ```). Copia SOLO il contenuto del blocco di codice (senza i marcatori stessi ```) e incollalo nel campo "Libro del Mondo" nel Regista, quindi clicca "{rezyser.btn_zapisz_ksiege_label}". La seconda parte è una raccomandazione su quale dei modi creativi (Script o Audiolibro) si adatta meglio alla tua idea — considerala come un suggerimento quando selezioni la modalità nel RadioBox.

  Mini-corso Markdown nel Libro: un singolo hashtag (#) rappresenta una sezione principale (es. "# Personaggi"), un doppio hashtag (##) indica una sottosezione, i trattini (-) creano elenchi, e le doppie asterischi (**testo**) evidenziano regole assolute e inviolabili (es. "**Il protagonista NON mente MAI**"). Per un personaggio straniero, aggiungi un tag con l'accento, ad esempio "[Speaker 1: Marek] - ha un accento francese". La parola chiave "accento" è NECESSARIA — il motore dell'applicazione la rileva automaticamente e applica le corrette regole fonetiche ai dialoghi di quel personaggio.

  Suggerimento: Ricorda di aggiornare periodicamente il tuo Libro del Mondo man mano che la trama si arricchisce di nuovi luoghi o personaggi importanti. Puoi farlo manualmente o con l'aiuto di un chatbot esterno. Più ricco è il fondamento, migliori saranno i risultati nella Regia!

  PASSO 7b: Gestore delle Regole (Ctrl+4) — dizionari per linguisti senza Python

  La versione 13.0 introduce il quarto strumento sulla barra: il Gestore delle Regole. Lo apri con il tasto Ctrl+4 o dal menu Strumenti. È un esploratore visivo della cartella dictionaries/, dove l'applicazione conserva tutte le regole fonetiche (accenti), cifrari e modalità del Regista in file YAML (formato leggibile dall'uomo, più semplice del JSON).

  Perché YAML? Fino alla versione 12.0 tutti gli accenti, modalità creative e filtri erano "incorporati" nel codice Python. Aggiungere un nuovo accento richiedeva un programmatore. Nella versione 13.0 tutto è stato spostato nei file .yaml nella cartella dictionaries/ — chiunque sappia aprire il Blocco Note può regolare un accento esistente ("sostituisci sz con sh con sch") o aggiungerne uno completamente nuovo (svedese, danese, dialetto russo).

  Cosa trovi nel Gestore delle Regole:
  - Albero dei file — elenco completo di tutti i file YAML in dictionaries/ suddivisi per lingue di base (attualmente completamente implementate: {lista_kompletnych_jezykow_natywnie}) e categorie (accenti/, cifrari/, regista/). Navigazione con le frecce come in Esplora file di Windows, pieno supporto NVDA.
  - Pulsante "{manager.btn_otworz_label}" — apre il file selezionato nel Blocco Note predefinito del sistema. Modifica, salva, clicca "{manager.btn_odswiez_label}" ed è fatto.
  - Pulsante "{manager.btn_duplikuj_label}" — il modo più veloce per un nuovo accento: prendi un file esistente (es. finski.yaml), dai un nuovo nome (es. svedese), il Gestore crea una copia con il commento "cambia i campi etichetta e descrizione" e lo apre nell'editor.
  - Pulsante "{manager.btn_nowy_label}" — wizard con scelta del tipo (accento, cifrario, modalità Regista, nuova lingua di base, cifrario algoritmico). Per i casi comuni (accento, cifrario tipo "sostituzione lettere") il wizard crea un modello YAML pronto per la modifica. Per i casi che richiedono un programmatore (nuova lingua di base, algoritmo tipo "mescolamento interno delle parole") il wizard genera un prompt per un chatbot AI — incolli in ChatGPT, ottieni un file YAML pronto, lo salvi in dictionaries/ ed è fatto.

  Applicazione pratica: Vuoi aggiungere un accento svedese? Apri il Gestore delle Regole, seleziona dictionaries/pl/accenti/finski.yaml, clicca "Duplica", nomina il file svedese, cambia il campo etichetta in "Svedese (Alva / Oskar)", il codice iso in sv, modifica alcune regole di sostituzione e salva. Torna alla Pagina principale, clicca "{home.btn_odswiez_label}" e riavvia l'applicazione. Il nuovo accento apparirà nel menu Poliglotta (in Modalità Regista) e — se lo aggiungi al Libro del Mondo del personaggio ("[Marek] - ha un accento svedese") — anche nel rilevamento automatico degli accenti del Regista.

  Dove cercare ulteriore documentazione sulla cartella dictionaries/:
  - File `docs/dictionaries.pl.txt` (disponibile nel pacchetto per gli utenti finali dalla scheda Releases) — breve descrizione in linguaggio semplice di ogni sottocartella, 6 cifrari pronti, 8 accenti pronti e idee su cosa si può fare autonomamente, senza conoscenza di Python.
  - File `dictionaries/README.md` (disponibile solo clonando il repository da GitHub — i pacchetti di rilascio filtrano i file .md) — documentazione tecnica dettagliata del formato YAML con esempi, elenchi di campi, regole del pipeline, regex. Questo documento è indirizzato a linguisti con conoscenze di base di programmazione e a sviluppatori.

  Importanti suggerimenti per gli utenti di lettori di schermo (NVDA)

  1. Messaggi di successo e errori

  Quando l'applicazione termina un'operazione (es. salva un file o incontra un errore), appare una finestra di dialogo con un titolo come "Successo", "Avviso" o "Errore". NVDA annuncerà immediatamente questa finestra e ne leggerà il contenuto. Non devi fare nulla — le finestre di dialogo sono completamente accessibili dalla tastiera, e il focus si posiziona automaticamente sul pulsante "OK". Non ci sono più trucchi con il prefisso "Alert" — le finestre di dialogo native wxPython sono gestite direttamente dal lettore.

  2. Importante avviso: elaborazione silenziosa in background

  Dopo aver cliccato pulsanti come "{rezyser.btn_wyslij_label}" o "{poliglota.btn_process}", il programma inizia immediatamente l'elaborazione in background. Sullo schermo appare una barra di avanzamento (Gauge), ma NVDA NON legge il suo valore in tempo reale — il lettore di schermo rimane silenzioso durante il lavoro. Non cliccare nuovamente il pulsante. Attendi che appaia una finestra di dialogo con il risultato o un messaggio di errore — NVDA li annuncerà automaticamente.

  3. Navigazione tra gli strumenti

  Muoversi tra gli strumenti (Regista, Poliglotta, Convertitore, Gestore delle Regole) avviene in una sola finestra del programma tramite quattro pulsanti sulla barra degli strumenti o tramite il menu Strumenti (Alt, poi N). Scorciatoie da tastiera disponibili: Ctrl+0 (Pagina principale), Ctrl+1 (Regista), Ctrl+2 (Poliglotta), Ctrl+3 (Convertitore), Ctrl+4 (Gestore delle Regole — novità nella 13.0). Dopo aver cambiato strumento, il focus si posiziona automaticamente sulla descrizione del nuovo modulo — NVDA inizia subito a leggere la nuova vista.

  4. Ordine del tabulatore e nomi dei widget

  Ogni elemento dell'interfaccia ha un nome polacco leggibile — NVDA lo leggerà quando viene focalizzato. L'ordine del tabulatore è logico: dalla descrizione dello strumento, attraverso i campi di configurazione, fino ai pulsanti di azione. Non ci sono sorprese — la navigazione da tastiera funziona come in qualsiasi altro programma nativo di Windows. Tutti i menu e i pulsanti sono in polacco e NVDA li leggerà con voce polacca senza ulteriori impostazioni.

  Note importanti per la versione 9.0 / Changelog

  Nuove funzionalità e cambiamenti nella versione 9

  Salvataggio resistente ai guasti del progresso della traduzione (CAMBIAMENTO — correzione di un bug critico)
  Nella versione 8, la ripresa di una traduzione interrotta era soggetta a una trappola silenziosa e distruttiva: se l'utente seguiva le istruzioni (tagliando manualmente il frammento tradotto) e poi riprendeva immediatamente la traduzione del resto, l'applicazione apriva il file di output in modalità sovrascrittura — cancellando irrevocabilmente e inconsapevolmente tutto il progresso pagato. Nella versione 9, l'intero meccanismo è stato riprogettato. Ogni blocco tradotto è ora immediatamente salvato in un file temporaneo (.jsonl) con un indice assegnato. La ripresa è completamente automatica — l'applicazione rileva il file e ripristina il progresso senza alcun intervento dell'utente. Al termine con successo, il file temporaneo viene automaticamente eliminato.

  Correttore di Tag in Modalità Regista (NOVITÀ)
  Nel menu della Modalità Regista è stata aggiunta una nuova opzione — il Correttore di Tag. Inietta nel file solo il codice lingua ISO a due lettere fornito dall'utente, senza applicare alcuna regola fonetica o pulizia. Uno strumento di emergenza nel caso in cui un file già pronto esca con un tag linguistico errato o mancante.

  Conversione automatica .txt in .html in Modalità Traduttore (CAMBIAMENTO)
  I file di testo (.txt e .md) tradotti dal Traduttore AI sono ora automaticamente salvati in formato .html con un tag linguistico incorporato. In questo modo NVDA legge immediatamente il file con la voce corretta — senza ulteriori passaggi da parte dell'utente.

  Denominazione intelligente del file nell'Architetto (CAMBIAMENTO)
  L'Architetto degli Audiolibri non salva più il file risultante sempre con lo stesso nome architettura_pronta.docx. Ora il nome deriva dal file di input — ad esempio, per insensibilità.txt il file risultante sarà architettura_insensibilità.docx. Il file appare nella stessa cartella dell'originale.

  Funzionalità mantenute senza cambiamenti dalla versione 8

  Ritorno al formato .txt per i file di progetto (CAMBIAMENTO)
  I file di progetto e i riassunti ora si salvano in formato .txt invece di .md (Markdown). L'esperimento con il formato .md come barriera psicologica contro l'editing si è rivelato inefficace — l'AI spesso infrange notoriamente la regola anti-closure e spesso è meglio modificare il file in corso e poi ricaricare la memoria, affinché l'AI, per quanto possibile, non riceva un permesso nascosto di infrangere il divieto. Il formato .txt è più intuitivo e leggibile per chiunque.

  Regola del Montatore — nuovo avviso
  Nelle istruzioni (e nelle future versioni dell'interfaccia) è stato aggiunto un chiaro avviso che spiega cosa è permesso e cosa non è permesso modificare nei file di progetto. L'utente ha pieno diritto di modificare dialoghi e contenuti, ma assolutamente non può modificare le linee di struttura (Atto, Scena, Capitolo, Prologo, Epilogo) — danneggiarle compromette la navigazione NVDA, la divisione in ElevenLabs e l'indice in Word.

  Prompt aggiornato dell'Architetto (CAMBIAMENTO)
  Il prompt per il chatbot esterno (ChatGPT/Claude) è stato riprogettato. Invece di restituire codice Markdown grezzo, l'AI ora restituisce una risposta in due parti chiaramente separate: Parte 1 è il Libro del Mondo racchiuso in un blocco di codice Markdown (facile da copiare senza marcatori), e Parte 2 è una Raccomandazione del Modo come testo normale fuori dal blocco — consiglia se è meglio usare il Modo Script Grezzo o il Modo Audiolibro Tradizionale. È stato anche cambiato il descrittore dei tag dei personaggi: invece di "sonori" ora si parla di accento e tono di voce nel tag, es. [Speaker 1: Nome] - balbetta e accento francese.

  Spiegazione dello stato della direttiva Anti-Closure (DOCUMENTAZIONE)
  Le istruzioni ora contengono una spiegazione sincera che, nonostante i divieti Anti-Closure incorporati, il modello continua a infrangere notoriamente questa regola, specialmente in Modalità Audiolibro. Invece di nascondere questo problema, la versione 8 mette le cose in chiaro e restituisce la responsabilità del "chiudere manualmente" al Regista — da qui la Regola del Montatore come strumento di lavoro ufficiale e il ritorno al normale formato di testo.

  Funzionalità mantenute senza cambiamenti dalla versione 7

  Prompt Showrunner — Direttiva Anti-Closure (Regia — tutte le modalità)

  Tutti e tre i modi di Regia mantengono le direttive showrunner incorporate. Brainstorming funziona come sceneggiatore di una serie multi-stagione. Il Modo Script Grezzo e il Modo Audiolibro hanno il divieto di concludere il testo con riassunti, morali e chiusure narrative — tranne quando l'utente richiede esplicitamente un finale o un epilogo.

  Gestione degli Atti e delle Scene in tempo reale (Regia — Modo Script)
  Il Modo Script Grezzo dispone di un pannello con pulsanti "Inserisci Atto X" e "Inserisci Scena X". I contatori si aggiornano automaticamente. Il caricamento di un file esistente imposta entrambi i contatori sui numeri corretti.

  Pulizia delle didascalie tra parentesi (Poliglotta — Modo Regista)
  Lo script rimuove interi frammenti di testo racchiusi tra parentesi tonde (es. "(sottovoce)", "(con respiri incorporati)"). ElevenLabs legge solo dialoghi e narrazione.

  Memoria Infinita e Riassunto Automatico (Regia — Accumulatore di Trama)
  Quando l'indicatore di memoria entra in stato di allarme rosso, Brainstorming genera automaticamente un riassunto della trama e lo salva nel campo Memoria a Lungo Termine. Cliccando "Salva Riassunto (in modo permanente)" si crea un file _riassunto.txt. Dopo aver svuotato la memoria e caricato il riassunto, è possibile continuare la storia senza alcuna limitazione di lunghezza.

  Architetto degli Audiolibri
  Lo strumento supporta le parole chiave Atto, Capitolo, Prologo, Epilogo e Intro come intestazioni di primo livello. Le scene si trasformano in testo in grassetto. Lo script pulisce automaticamente i tag HTML e i marcatori Markdown prima dell'elaborazione.

  Gestione Intelligente dei Capitoli (Modo Audiolibro)
  Pannello dedicato con pulsanti per inserire Prologo, Epiloghi e divisioni dei capitoli direttamente dall'interfaccia. Il contatore dei capitoli si aggiorna automaticamente. Il caricamento di un file esistente imposta il contatore sul numero corretto senza conteggio manuale.

  Assegnazione dei Titoli ai Capitoli (Post-produzione — Modo Audiolibro)
  Il modulo itera sui capitoli del file salvato e assegna loro un titolo breve e letterario utilizzando un modello AI veloce, analizzando solo l'inizio di ciascun capitolo.

  Funzioni rimosse (invariato dalla versione 7)

  Mappa dei Tagli (Modo Script) — sostituita dal pannello di gestione degli Atti e delle Scene in tempo reale.
  Adattamento dello Script in Audiolibro (Modo Script) — rimosso per motivi finanziari. Il flusso di lavoro generava tre costi separati: generazione dello script, potenziale riassunto in caso di sovraccarico di memoria, e infine rigenerazione dell'intero come prosa audiobook. Si consiglia di scrivere direttamente in Modo Audiolibro Tradizionale fin dall'inizio.

  Funzioni dalla versione 10.0 (mantenute senza cambiamenti nelle versioni 11.0 e 12.0)

  - Generatore automatico del file di configurazione golden_key.env integrato direttamente nell'interfaccia principale dell'applicazione. L'utente non deve più creare manualmente il file né preoccuparsi della trappola dell'estensione .txt — basta un clic sul pulsante disponibile nella schermata iniziale e il sistema crea un file pulito e pronto nel posto giusto.
  - Eliminazione totale dello script obsoleto napraw_api.bat, che non è più necessario. Il problema che questo script risolveva (errata estensione del file assegnata da Blocco Note) è ora completamente eliminato grazie al generatore integrato.
  - Multilibro del Libro del Mondo — ogni progetto ha ora il proprio file lore (NOVITÀ). In precedenza esisteva un unico file comune moje_lore.md, che veniva caricato ad ogni avvio dell'applicazione — indipendentemente dal progetto su cui stavi lavorando. Dalla versione 10, il Libro del Mondo è strettamente legato al nome del file del progetto: se la tua trama è script/emilia_heist_audiobook.txt, il suo Libro è script/emilia_heist_audiobook.md. Il pulsante "Salva Libro in modo permanente" è disattivato finché non inserisci il nome del file — l'ordine è qui intenzionale e imposto dall'interfaccia. Cliccando "Carica storia" si carica automaticamente il file .md corrispondente dal disco, se esiste. Il cambiamento ha anche una dimensione pratica organizzativa: ora puoi gestire diversi progetti contemporaneamente, e ognuno avrà le proprie regole del mondo e lista di personaggi isolate — senza il rischio che Emilia del colpo alla banca finisca improvvisamente in un'opera spaziale.

  Nuove funzioni e cambiamenti nella versione 11.0

  - Nuovi accenti nel Poliglotta (NOVITÀ — quattro nuove lingue europee). Al menu del Modo Regista sono state aggiunte quattro nuove opzioni di "corruzione" fonetica del testo: Inglese (Samantha / Mark / Zira / Hazel), Francese (Thomas / Amelie / Julie), Tedesco (Stefan / Markus / Katja / Hedda), Spagnolo (Jorge / Monica / Helena). Ogni nuovo accento inietta automaticamente il codice ISO appropriato (en, fr, de, es) nel file .html o .docx generato — NVDA utilizzerà immediatamente la voce corretta per il testo elaborato.

  - Cross-platform: Supporto per macOS e Linux (CAMBIO documentazione). La sezione "Primo avvio" è stata completamente riscritta. Ora distingue tre percorsi: gli utenti finali Windows scaricano il pacchetto ZIP pronto dalla scheda Releases e avviano run.bat; gli sviluppatori Windows configurano l'ambiente tramite setup_dev.bat; gli utenti macOS e Linux configurano l'ambiente tramite ./setup_dev.sh e avviano ./run.sh. (Nota: nelle versioni 11.x–13.0 questi stessi script avevano nomi diversi — `Uruchom_Rezysera.bat`, `skonfiguruj_dev.bat`, `skonfiguruj_dev.sh`, `uruchom_rezysera.sh` — sono stati rinominati nella 13.1 in equivalenti inglesi, poiché gli sviluppatori stranieri che clonano il repo segnalavano che i nomi dei file polacchi rendevano difficile digitare i comandi nel terminale.)

  - Cartella runtime/ — spiegazione dello stato (DOCUMENTAZIONE). La sezione "Primo avvio" ora contiene una spiegazione esplicita che la cartella runtime/ (ambiente Python per i pacchetti ZIP) è distribuita esclusivamente nei pacchetti pronti per Windows dalla scheda Releases. Nel repository Git questa cartella non esiste e non dovrebbe esistere.

  - Aggiornamento dei nomi dei sintetizzatori nel menu Poliglotta (CAMBIO). Aggiornati i nomi delle voci nel menu selectbox per le lingue esistenti: Italiano ha ora anche Luca (Vocalizer), Finlandese ha ora anche Mikko (Vocalizer). Islandese ha mantenuto il nome senza caratteri diacritici (Gudrun invece di Gudrun con il segno eth) per una migliore compatibilità.

  Funzioni mantenute senza cambiamenti dalla versione 10

  - Generatore automatico del file golden_key.env integrato nell'interfaccia.
  - Multilibro del Libro del Mondo (ogni progetto ha il proprio file .md con le regole del mondo).
  - Meccanismo di ripresa della traduzione resistente ai guasti (salvataggio in .jsonl).
  - Correttore di Tag nel Modo Regista (iniezione del codice ISO).

  Nuove funzioni e cambiamenti nella versione 12.0 — Release Candidate

  - Completa ricostruzione dell'interfaccia utente (CAMBIO ARCHITETTONICO). L'applicazione ha smesso di essere uno strumento web che funziona nel browser. L'intera interfaccia è stata riscritta da zero come applicazione desktop nativa basata sul framework wxPython. Non c'è più un server locale, non c'è più un browser, non c'è più una finestra terminale che funziona in background — c'è una sola, normale finestra del programma. Il punto di ingresso è main.py.

  - Barra di navigazione con tasti di scelta rapida (NOVITÀ). Gli strumenti si cambiano tramite tre pulsanti sulla barra (Regista, Poliglotta, Convertitore) o tramite il menu Strumenti. Scorciatoie da tastiera disponibili: Ctrl+0 (Pagina principale con System Check), Ctrl+1 (Regista), Ctrl+2 (Poliglotta), Ctrl+3 (Convertitore). Lo strumento attivo è visivamente evidenziato con un pulsante in grassetto.

  - Ottimizzazione completa per i lettori di schermo fin dall'inizio (NVDA, VoiceOver). Ogni widget ha un nome di accessibilità polacco leggibile. Il focus dopo il cambio di strumento si posiziona automaticamente sulla descrizione del modulo — NVDA inizia subito a leggere la nuova vista. Le finestre di dialogo wx.MessageBox sono annunciate nativamente dal lettore di schermo senza trucchi. L'ordine del tabulatore è logico e coerente in tutta l'interfaccia. Scompaiono le limitazioni storiche di Streamlit e del framework React.

  - Nessuna configurazione del firewall di rete (CAMBIO). L'eliminazione del server web locale significa che Windows Firewall non mostra più la finestra chiedendo il permesso di accesso alla rete al primo avvio. L'applicazione si avvia semplicemente.

  - Finestre di dialogo native per la selezione dei file (NOVITÀ). I moduli Poliglotta e Convertitore hanno ora un pulsante "Sfoglia..." che apre la finestra di dialogo di selezione del file di sistema invece di inserire manualmente il percorso.

  - Protezione del modo creativo (NOVITÀ). Nel Regista non è più possibile cambiare accidentalmente il modo di lavoro (es. da Audiobook a Script) quando la memoria è occupata — l'interfaccia blocca il passaggio a un secondo modo di scrittura finché la storia o il riassunto non vengono cancellati. Il Modo Brainstorming è sempre disponibile.

  - Pulsante di Reset Duro nel Regista (NOVITÀ). Nuovo pulsante "Chiudi Progetto (Reset Duro)" permette con un solo clic di cancellare l'intero progetto: storia, riassunto, Libro del Mondo e tutti i contatori — senza dover azzerare manualmente ogni campo separatamente.

  - Caricamento automatico del modo creativo (NOVITÀ). Al caricamento del progetto, l'applicazione ripristina automaticamente l'ultimo modo di lavoro utilizzato (Script o Audiobook) dal file di metadati gestito dall'applicazione. In questo modo, dopo aver riaperto il progetto, il RadioBox si imposta da solo — non devi ricordare in quale modo stavi lavorando.

