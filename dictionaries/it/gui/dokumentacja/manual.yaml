  - Accenti fonetici nel Poliglotta (Inglese, Francese, Tedesco, Spagnolo, Italiano, Finlandese, Islandese).
  - Generatore automatico del file golden_key.env integrato nella schermata iniziale.
  - Multilibro del Libro del Mondo (ogni progetto ha il proprio file .md).
  - Meccanismo di ripresa della traduzione resistente ai guasti (salvataggio in .jsonl).
  - Correttore di Tag nel Modo Regista (iniezione del codice ISO).
