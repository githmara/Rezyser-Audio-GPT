# -----------------------------------------------------------------------------
# HOME – panel startowy (HomePanel w main.py)
# -----------------------------------------------------------------------------
home:
  panel_name: "Pannello iniziale – Pagina principale"
  welcome_text: |-
    Questo è il tuo studio di registrazione integrato.
    Scegli uno strumento dalla barra dei pulsanti o dal menu Strumenti:

      •  Regista       –  Scrivi script e prosa con AI; gestisci dinamicamente il Libro del Mondo.
      •  Poliglotta     –  Applica accenti forti per i sintetizzatori locali (NVDA/Vocalizer) e traduci testi.
      •  Convertitore     –  Crea rapidamente file Word professionali con intestazioni di livello 1.
      •  Gestore Regole –  Esplora e crea regole lessicali senza entrare manualmente nei file YAML.
  heading_system_check: "System Check"
  checking: "Verifica configurazione…"
  # Błędy walidacji golden_key.env
  err_brak_pliku: |-
    🚨 File di configurazione ambientale mancante!

    Rilevato primo avvio del programma. I moduli sono bloccati per motivi di sicurezza.
    Per sbloccare tutti gli strumenti, clicca il pulsante qui sotto — il programma genererà automaticamente il file golden_key.env e lo aprirà nell'editor di testo predefinito.
  err_odczyt: "🚨 Impossibile leggere il file golden_key.env:\n{tresc_bledu}"
  err_struktura: |-
    🚨 Errore nella struttura del file!
    Manca il parametro richiesto OPENAI_API_KEY=.
    Probabilmente hai cancellato il segno di uguale o il nome della variabile.
    Elimina il file, rigeneralo e incolla la chiave con attenzione.
  err_tekst_zastepczy: |-
    ⚠️ Chiave non inserita!
    Nel file golden_key.env è ancora presente il testo segnaposto.
    Apri il file nell'editor di testo, rimuovi il testo segnaposto e incolla la tua vera chiave API.
  err_cudzyslowy: |-
    🚨 Virgolette superflue attorno alla chiave!
    La chiave API è stata incollata tra virgolette (es. "sk-…").
    Apri il file nell'editor di testo e rimuovi i caratteri di virgolette —
    la chiave deve essere inserita direttamente dopo il segno '=', senza caratteri aggiuntivi.
  err_niedozwolone_znaki: |-
    🚨 Caratteri non consentiti attorno alla chiave!
    Rilevato uno spazio o un altro carattere invisibile prima o dopo la chiave API.
    Apri il file nell'editor di testo e assicurati che il valore inizi
    immediatamente dopo il segno '=', senza spazi.
  err_format: |-
    🚨 Formato chiave sospetto!
    La chiave OpenAI corretta inizia sempre con i caratteri sk- (es. sk-proj-…).
    Assicurati di aver copiato la stringa corretta e che non ci siano spazi prima di essa.
  err_zbyt_krotki: |-
    ⚠️ La chiave sembra troppo corta (rilevati {liczba_znakow} caratteri, attesi almeno {minimum_znakow}).
    Probabilmente hai copiato solo una parte della chiave.

    Se hai già chiuso la finestra con la chiave su platform.openai.com,
    devi tornare al tuo account, usare l'opzione 'Revoke secret key' per questa
    chiave troncata e generare una nuova. Ricorda di copiare l'intera chiave
    prima di cliccare 'Done'.
  ok_klucz_wykryty: |-
    ✅ Chiave API (golden_key.env) rilevata e formattata correttamente.
    Tutti i moduli sono pronti per l'uso.
  # Przyciski akcji panelu startowego
  btn_generate: "Genera il file golden_key.env e apri l'editor di testo"
  btn_open: "📝 Apri il file golden_key.env nell'editor di testo"
  blad_tworzenia_env_tytul: "Errore"
  blad_tworzenia_env_tresc: "Impossibile creare il file golden_key.env:\n{tresc_bledu}"
  ok_plik_wygenerowany: |-
    ✅ Il file {nazwa_pliku} è stato generato!
    L'editor di testo si apre automaticamente.
    Incolla la tua chiave API, salva il file (Ctrl+S) e riavvia l'applicazione.
  blad_otwarcia_pliku_tytul: "Informazione"
  blad_otwarcia_pliku_tresc: "Impossibile aprire automaticamente il file.\nAprilo manualmente:\n{sciezka_pliku}"
  # Sekcja: Narzędzia słownikowe
  heading_narzedzia_slownikowe: "Strumenti lessicali"
  narzedzia_slownikowe_name: "Descrizione degli strumenti lessicali"
  tools_info: |-
    Vuoi aggiungere un nuovo accento, cifrario o modalità Regista?
    Apri il Gestore Regole (Ctrl+4) – troverai l'albero di tutti i file YAML in dictionaries/ e un creatore che genererà automaticamente un modello o un prompt per il chatbot AI.

    Dopo aver aggiunto un nuovo ACCENTO, clicca inoltre il pulsante "Aggiorna accenti Regista da YAML" qui sotto – questo permetterà alla Modalità Regista di rilevare il nuovo accento (Poliglotta rileva automaticamente i YAML). Dopo l'aggiornamento, riavvia l'applicazione.
  btn_open_manager_label: "📚 Apri Gestore Regole"
  btn_open_manager_name: "Pulsante Apri Gestore Regole"
  btn_open_manager_tooltip: "Passa al Gestore Regole – esploratore di file YAML e creatore di nuovi accenti / modalità / cifrari (Ctrl+4)."
  btn_odswiez_label: "🔄 Aggiorna accenti Regista da YAML"
  btn_odswiez_name: "Pulsante Aggiorna accenti Regista da YAML"
  btn_odswiez_tooltip: "Scansiona dictionaries/*/accenti/ e rigenera i wrapper accenti_* in core_poliglota.py e core_rezyser.py. Dopo un aggiornamento riuscito, è necessario riavviare l'applicazione."
  # Raport po kliknięciu „Odśwież akcenty Reżysera z YAML"
  raport_niespodziewany_tytul: "Errore aggiornamento accenti"
  raport_niespodziewany_tresc: "Si è verificato un errore imprevisto:\n{tresc_bledu}"
  raport_tytul_blad: "Aggiorna accenti Regista – ERRORE"
  raport_header_blad: "⛔ Il generatore ha incontrato errori – vedi log qui sotto."
  raport_tytul_sukces: "Aggiorna accenti Regista – Successo"
  raport_header_sukces: |-
    ✅ Modificati i file per {liczba_akcentow} accenti.
    Per far apparire i nuovi accenti nella Modalità Regista, riavvia l'applicazione.
  raport_tytul_bez_zmian: "Aggiorna accenti Regista – Nessuna modifica"
  raport_header_bez_zmian: "ℹ️ Nessuna modifica. Rilevati {liczba_akcentow} accenti – i wrapper sono già aggiornati."
  raport_lbl_log: "Log completo (Ctrl+A, Ctrl+C copia negli appunti):"
  raport_log_name: "Log del generatore di accenti Regista"

# -----------------------------------------------------------------------------
# REZYSER – panel modułu Reżyser (gui_rezyser.py)
# -----------------------------------------------------------------------------
rezyser:
  panel_name: "Pannello Regista Audio GPT"
  heading: "🎬  Regista Audio GPT – Studio Creativo Ibrido"
  description_name: "Descrizione del modulo Regista Audio GPT"
  tool_description: |-
    Regista Audio GPT è uno studio creativo ibrido.

    Modalità Brainstorming  – pianifica la trama, genera 3 opzioni (SENZA salvataggio su file).
    Modalità Script        – scrivi uno script audio grezzo con tag [SFX] e [Personaggio: emozione] (SALVATAGGIO SU FILE).
    Modalità Audiolibro     – genera prosa letteraria densa e classica (SALVATAGGIO SU FILE).

    I progetti vengono salvati nella sottocartella 'skrypty/' accanto al programma.
    Fornisci il nome del progetto SENZA estensione (es. cronache_arkonii).
    Per cambiare progetto, devi prima svuotare la memoria corrente.
  prompt_architekta_content: |-
    Sei un eccezionale architetto di mondi (Worldbuilder) e consulente letterario. Ho un'idea vaga per una trama: [INSERISCI QUI LA TUA IDEA]. Il tuo compito è espanderla in un "Libro del Mondo" professionale.
    Adatta il tono e le regole alla mia idea. Evita scorciatoie fiabesche e cliché AI.

    REGOLE DI FORMATTAZIONE (CRITICHE):
    Devi restituire la risposta in due parti separate:

    PARTE 1: LIBRO DEL MONDO
    Questa parte deve essere rigorosamente chiusa in UN blocco di codice Markdown (usa i marcatori ```markdown all'inizio e ``` alla fine). All'interno del blocco di codice, applica queste regole:
    1. Inizia con un'emoji di libro aperto e un titolo di lavoro, es. 📖 Libro del Mondo: [Titolo].
    2. Usa un singolo hashtag (#) per le sezioni principali (es. # Regole del Mondo, # Personaggi).
    3. Usa un doppio hashtag (##) per le sottosezioni.
    4. Usa trattini (-) per creare elenchi leggibili.
    5. Usa doppie asterischi (**testo**) per evidenziare regole assolute e inviolabili (es. **L'eroe NON mente MAI**).
    6. Descrivi la psicologia dei personaggi, i loro maggiori difetti e motivazioni. Per i personaggi di lingua straniera, aggiungi informazioni sull'accento direttamente accanto al tag, es. `[Speaker 1: Nome] - balbetta e ha un accento francese`. **Suggerimento tecnico:** L'uso della parola chiave `accento` è assolutamente richiesto, poiché è su questa base che uno script esterno dell'applicazione rileva automaticamente e applica le corrette regole fonetiche ai dialoghi del personaggio.

    PARTE 2: RACCOMANDAZIONE MODALITÀ
    Questa parte deve essere inserita FUORI dal blocco di codice, come testo normale sotto. Consigliami quale delle modalità della mia applicazione sarà la migliore per realizzare questa idea: 🎬 Modalità Script Grezzo (dramma radiofonico, SFX, fonetica), o 📖 Modalità Audiolibro Tradizionale (prosa letteraria classica).

  # Pasek pliku
  lbl_nazwa_pliku: "Nome del file del progetto (senza estensione, es. cronache_arkonii):"
  txt_nazwa_pliku_name: "Campo nome file del progetto"
  txt_nazwa_pliku_hint: "es. cronache_arkonii"
  txt_nazwa_pliku_tooltip: |-
    Inserisci il nome del progetto SENZA estensione.
    Il file della storia viene salvato come: skrypty/<nome>.txt
    Campo bloccato quando la memoria è occupata.
  btn_wczytaj_label: "Carica storia"
  btn_wczytaj_tooltip: |-
    Carica un file di progetto esistente (skrypty/<nome>.txt) in memoria.
    Attivo solo quando la memoria è vuota e viene fornito un nome.
  btn_wyczysc_biezaca_label: "Cancella corrente (lascia Sommario)"
  btn_wyczysc_biezaca_tooltip: |-
    Cancella solo la storia corrente dalla memoria.
    Il Sommario (Memoria a Lungo Termine) e il Libro del Mondo vengono conservati.
    Usa per continuare un libro lungo dopo aver generato il sommario.
  btn_hard_reset_label: "Chiudi Progetto (Reset Completo)"
  btn_hard_reset_tooltip: |-
    Cancellazione COMPLETA del progetto: storia, sommario, Libro del Mondo.
    Azzera tutti i contatori e sblocca il campo nome file.
    Usa quando cambi progetto o inizi una storia completamente nuova.
  # Sidebar
  sidebar_heading: "📖 Barra Laterale del progetto"
  lbl_ksiega_swiata: "Libro del Mondo – Regole e Personaggi:"
  txt_ksiega_name: "Campo Libro del Mondo – regole e personaggi"
  txt_ksiega_hint: |-
    Inserisci le regole del mondo, la descrizione dei personaggi e i loro accenti fonetici…
    Es. [Geralt: accento islandese]
    Il contenuto viene aggiunto a ogni richiesta AI.
  txt_ksiega_tooltip: |-
    Contesto sempre aggiunto all'AI: regole del mondo, personaggi, accenti fonetici.
    Il salvataggio su disco richiede il nome del file del progetto.
  btn_zapisz_ksiege_label: "💾 Salva il Libro in modo permanente"
  btn_zapisz_ksiege_tooltip: |-
    Salva il Libro del Mondo nel file: skrypty/<nome>.md
    Richiede il nome del file del progetto.
  btn_prompt_architekta_label: "📖 Prompt dell'Architetto per AI…"
  btn_prompt_architekta_name: "Pulsante Mostra Prompt dell'Architetto per chatbot esterno"
  btn_prompt_architekta_tooltip: |-
